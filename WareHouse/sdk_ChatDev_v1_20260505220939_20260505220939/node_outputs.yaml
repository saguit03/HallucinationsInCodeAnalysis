        text: '# Checkers (Draughts) Game Manual


          ## Introduction

          Welcome to our Checkers (Draughts) game! This manual provides you with detailed
          instructions on how to set up the environment, install necessary dependencies,
          and start playing the game.


          ## Environment Setup


          ### Initialize Python Environment

          To initialize a Python virtual environment for running our game, execute
          the following command:


          ```json

          {"name": "init_python_env", "arguments": {"python_version": "3.9"}}

          ```


          This will create a new Python 3.9 virtual environment and activate it within
          your workspace.


          ## Installing Dependencies


          ### Install Python Packages

          To install required packages for our game, run the following command:


          ```json

          {"name": "install_python_packages", "arguments": {"packages": ["checkers"],
          "upgrade": true}}

          ```


          This will install the `checkers` package and ensure all dependencies are
          up to date.


          ## Playing the Game


          ### Starting a New Game

          To start a new game, navigate to the game directory:


          ```bash

          cd checkers

          ```


          Then, run the game using Python:


          ```bash

          python game.py

          ```


          This will initialize the game board, set up the pieces, and prompt the first
          player for their move.


          ### Making Moves

          During your turn, you will be prompted to enter a move in standard notation.
          For example, to move a piece from `e2` to `e4`, simply type:


          ```bash

          e2-e4

          ```


          If the move is valid and results in a capture, you may continue making additional
          captures by chaining moves:


          ```bash

          e2-e4 e4-e6

          ```


          ### Kinging Pieces

          When a piece reaches the opposite end of the board, it will automatically
          be kinged. No special notation is required to perform this action.


          ### Ending the Game

          The game will automatically detect win or draw states based on the standard
          rules:


          - **Win**: A player captures all of the opponent''s pieces.

          - **Draw**: The game ends in a stalemate if no legal moves are available.


          At the end of the game, you will be notified of the outcome and given the
          option to start a new game or exit the application.


          ## Conclusion

          Congratulations on successfully setting up and playing our Checkers (Draughts)
          game! We hope you enjoy the strategic gameplay and appreciate the clean,
          modular codebase that powers this application. If you encounter any issues
          or have suggestions for improvement, please feel free to reach out to our
          support team.


          Happy gaming!'
      metadata:
        source: Chief Product Officer
