          \ (board[row2][col2] != \"\" and board[row2][col2].islower() == board[row1][col1].islower()):\n\
          \        return False\n    \n    # Check for diagonal moves\n    if abs(row2\
          \ - row1) != 1 or abs(col2 - col1) != 1:\n        return False\n    \n \
          \   return True\n\n# Example usage\nif is_valid_move(board, start_pos, end_pos):\n\
          \    print(\"Move is valid\")\nelse:\n    print(\"Move is invalid\")\n```\n\
