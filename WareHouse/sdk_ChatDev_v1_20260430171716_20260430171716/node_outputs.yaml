          \ - 1\n    row2, col2 = ord(end_pos[0]) - ord('a'), int(end_pos[1]) - 1\n\
          \    \n    # Check if the move is on the board\n    if not (0 <= row1 <\
          \ 8 and 0 <= col1 < 8 and 0 <= row2 < 8 and 0 <= col2 < 8):\n        return\
          \ False\n    \n    # Check if the piece exists at the start position\n \
          \   if board[row1][col1] == \"\":\n        return False\n    \n    # Check\
