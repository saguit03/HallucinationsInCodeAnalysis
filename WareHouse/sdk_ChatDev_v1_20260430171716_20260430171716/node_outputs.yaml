          \ = ' '\\n    game_board[end_row][end_col] = piece\\n    if player == 'W'\
          \ and end_row == 0:\\n        game_board[end_row][end_col] = 'W K'\\n  \
          \  elif player == 'B' and end_row == 7:\\n        game_board[end_row][end_col]\
          \ = 'B K'\\n    return start_row, start_col, end_row, end_col\\n\\ndef check_winner():\\\
          n    global game_board, player\\n    if player == 'W' and any('B ' in row\
