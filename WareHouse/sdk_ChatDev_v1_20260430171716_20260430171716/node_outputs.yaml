          \            click.echo('Invalid move. No piece to capture.')\n        \
          \    return None\n    else:\n        if abs(end_row - start_row) != 1 or\
          \ abs(end_col - start_col) != 1:\n            click.echo('Invalid move.\
          \ Must move by one square.')\n            return None\n\n    game_board[start_row][start_col]\
