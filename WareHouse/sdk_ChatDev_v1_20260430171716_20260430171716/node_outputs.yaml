          \ game_board\n    print('  ', end='')\n    for i in range(8):\n        print(chr(i\
          \ + ord('a')), end=' ') if i != 7 else print(chr(i + ord('a')))\n    print()\n\
          \    for row in range(8):\n        print(Fore.WHITE + str(8 - row), end='')\n\
          \        for col in range(8):\n            piece = game_board[row][col].strip()\n\
          \            if piece == 'W ': color = Fore.RED\n            elif piece\
