          \ i in range(8):\\n        print(chr(i + ord('a')), end=' ') if i != 7 else\
          \ print(chr(i + ord('a')))\\n\\ndef get_move():\\n    global capturing_mode,\
          \ player\\n    click.echo(f'{player}, enter your move (e.g., a1-b2): ',\
          \ nl=False)\\n    move = click.get_text()\\n    start_col, start_row = ord(move[0].lower())\
          \ - ord('a'), 8 - int(move[1])\\n    end_col, end_row = ord(move[3].lower())\
          \ - ord('a'), 8 - int(move[4])\\n    piece = game_board[start_row][start_col]\\\
          n    if capturing_mode:\\n        if abs(end_row - start_row) != 2 or abs(end_col\
          \ - start_col) != 2:\\n            click.echo('Invalid move. Must capture\
          \ a piece.')\\n            return None\\n        captured_piece = game_board[(start_row\
          \ + end_row) // 2][(start_col + end_col) // 2]\\n        if captured_piece\
          \ == \\' \\':\\n            click.echo('Invalid move. No piece to capture.')\\\
          n            return None\\n    else:\\n        if abs(end_row - start_row)\
          \ != 1 or abs(end_col - start_col) != 1:\\n            click.echo('Invalid\
