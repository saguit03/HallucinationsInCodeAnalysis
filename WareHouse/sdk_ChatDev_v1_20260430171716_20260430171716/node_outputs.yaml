          \        return True\n    elif player == 'B' and any('W ' in row for row\
          \ in game_board):\n        click.echo('Black wins!')\n        return True\n\
          \    if all(all(cell.strip() != ' ' for cell in row) for row in game_board):\n\
          \        click.echo('Draw!')\n        return True\n    return False\n\n\n\
