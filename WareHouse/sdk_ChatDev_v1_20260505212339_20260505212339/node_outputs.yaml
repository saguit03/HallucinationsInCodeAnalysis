          immediately after the initial move. For instance, if capturing diagonally
          forward from (0, 1), you might enter `(0, 1)-(2, 3)` and then confirm the
          capture.

          - **Kinging**: When a piece reaches the opposite end of the board, it is
          automatically kinged.


          ### Special Rules

          - **Jumps**: Multiple jumps can be made in a single turn if they are possible.
          Enter each jump command in sequence.

          - **Turns**: Players take turns moving pieces. The game alternates between
          black and white pieces.


          ## Game States

          The game will automatically detect the following states:

          - **Win**: When one player has no legal moves left or their opponent''s
          king is captured.

          - **Draw**: When both players have reached a stalemate.


          ## Conclusion

          That''s it! You''re now ready to enjoy playing Checkers with your friends.
          Have fun and happy gaming!


          ---


          This user manual provides a comprehensive guide on how to set up and play
          the Checkers (Draughts) game using ChatDev''s software.'
      metadata:
        source: Chief Product Officer
