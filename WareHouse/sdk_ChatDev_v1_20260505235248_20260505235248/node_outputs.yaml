          \ \"content\": \"#!/usr/bin/env python3\\n\\nimport numpy as np\\n\\nclass\
          \ Piece:\\n    def __init__(self, color):\\n        self.color = color\\\
          n        self.king = False\\n\\nclass Board:\\n    def __init__(self):\\\
