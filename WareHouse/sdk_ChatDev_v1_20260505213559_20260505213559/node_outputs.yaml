          path\": \"manual.md\",\n    \"content\": \"# Manual.md\\n\\n## Introduction\\\
          n\\nWelcome to Checkers (Draughts) Game! This software provides an interactive\
          \ and easy-to-use platform for playing checkers on an 8x8 board with standard\
          \ capture and kinging rules. \\n\\nThe game allows you to play against another\
          \ player in real-time, making it a great tool for enthusiasts looking to\
          \ enhance their skills or just have some fun.\\n\\n## Main Functions\\n\\\
          n### 1. Game Initialization\\nTo start the game, you need to initialize\
          \ a new game environment:\\n```json\\n{\\n  \\\"name\\\": \\\"init_python_env\\\
          \",\\n  \\\"arguments\\\": {\\n    \\\"python_version\\\": \\\"3.9\\\"\\\
          n  }\\n}\\n```\\n\\n### 2. Installing Dependencies\\nBefore you can start\
          \ playing, install the required Python packages:\\n```json\\n{\\n  \\\"\
          name\\\": \\\"install_python_packages\\\",\\n  \\\"arguments\\\": {\\n \
          \   \\\"packages\\\": [\\\"checkers_game\\\"],\\n    \\\"upgrade\\\": true\\\
          n  }\\n}\\n```\\n\\n### 3. Running the Game\\nTo launch the game, run the\
          \ following command:\\n```json\\n{\\n  \\\"name\\\": \\\"uv_run\\\",\\n\
          \  \\\"arguments\\\": {\\n    \\\"module\\\": \\\"checkers_game.main\\\"\
          \\n  }\\n}\\n```\\n\\n## How to Install Environment Dependencies\\n\\n1.\
          \ **Initialize Python Environment**:\\n   Use the `init_python_env` function\
          \ to create a Python environment with version 3.9.\\n\\n2. **Install Python\
          \ Packages**:\\n   After creating the environment, install the game dependencies\
          \ using the `install_python_packages` function. This will ensure all necessary\
          \ packages are installed in your workspace.\\n\\n## How to Play\\n\\n1.\
          \ **Start the Game**:\\n   - Initialize the Python environment by running\
          \ the `init_python_env` command.\\n   - Install the required packages with\
          \ `install_python_packages`.\\n   - Launch the game by executing the `uv_run`\
          \ command for the main module.\\n\\n2. **Game Rules and Controls**:\\n \
          \  - The game starts with two players, alternating turns.\\n   - Players\
          \ must make moves in standard notation (e.g., \\\"a1-b2\\\").\\n   - Standard\
          \ capture rules apply: a piece can jump over an opponent's piece diagonally\
          \ and land on the empty square beyond it.\\n   - Kinging is automatically\
          \ handled by moving a piece to the other end of the board.\\n\\n3. **Win\
          \ or Draw**:\\n   - The game detects win conditions (e.g., no legal moves\
          \ for one player) and declares the winner.\\n   - If all pieces are captured,\
          \ the game ends in a draw.\\n\\n## Example Usage\\n\\n1. Initialize the\
          \ Python environment:\\n    ```json\\n    {\\n      \\\"name\\\": \\\"init_python_env\\\
          \",\\n      \\\"arguments\\\": {\\n        \\\"python_version\\\": \\\"\
          3.9\\\"\\n      }\\n    }\\n    ```\\n\\n2. Install dependencies:\\n   \
          \ ```json\\n    {\\n      \\\"name\\\": \\\"install_python_packages\\\"\
          ,\\n      \\\"arguments\\\": {\\n        \\\"packages\\\": [\\\"checkers_game\\\
          \"],\\n        \\\"upgrade\\\": true\\n      }\\n    }\\n    ```\\n\\n3.\
          \ Start the game:\\n    ```json\\n    {\\n      \\\"name\\\": \\\"uv_run\\\
          \",\\n      \\\"arguments\\\": {\\n        \\\"module\\\": \\\"checkers_game.main\\\
          \"\\n      }\\n    }\\n    ```\\n\\nBy following these steps, you can enjoy\
          \ a challenging and engaging Checkers (Draughts) experience right from your\
          \ workspace.\\n\\nHappy gaming!\"\n  }\n}\n```"
