          n        for row in range(3):\\n            for col in range(0, 8, 2):\\\
          n                self.state[row][col] = Piece('black')\\n        for row\
          \ in range(5, 8):\\n            for col in range(1, 9, 2):\\n          \
          \      self.state[row][col] = Piece('white')\\n\\n    def print_board(self):\\\
          n        from termcolor import colored\\n        header = \\\"   A B C D\
          \ E F G H\\\"\\n        print(header)\\n        for row in range(8):\\n\
          \            line = f\\\"{row+1} | \\\"\\n            for col in range(8):\\\
