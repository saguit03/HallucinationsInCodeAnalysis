          \ played on an 8x8 checkerboard. This manual provides a detailed guide on\
          \ how to set up the environment, install dependencies, and play the game.\n\
          \n## Table of Contents\n1. [Setting Up the Environment](#setting-up-the-environment)\n\
          2. [Installing Dependencies](#installing-dependencies)\n3. [Playing the\
          \ Game](#playing-the-game)\n\n---\n\n## Setting Up the Environment\n\nTo\
          \ ensure you have a consistent development environment, we recommend initializing\
          \ a Python virtual environment and installing the required packages.\n\n\
          1. **Initialize Python Environment**:\n    ```json\n    {\n        \"name\"\
          : \"init_python_env\",\n        \"arguments\": {\"python_version\": \"3.8\"\
          }\n    }\n    ```\n\n2. **Install Python Packages**:\n    ```json\n    {\n\
          \        \"name\": \"install_python_packages\",\n        \"arguments\":\
          \ {\"packages\": [\"checkers\"]}\n    }\n    ```\n\n---\n\n## Installing\
          \ Dependencies\n\nTo install the necessary dependencies for the Checkers\
          \ game, follow these steps:\n\n1. Initialize a Python virtual environment:\n\
          \    ```json\n    {\n        \"name\": \"init_python_env\",\n        \"\
          arguments\": {\"python_version\": \"3.8\"}\n    }\n    ```\n\n2. Install\
          \ the `checkers` package using `uv add`:\n    ```json\n    {\n        \"\
          name\": \"install_python_packages\",\n        \"arguments\": {\"packages\"\
          : [\"checkers\"], \"upgrade\": true}\n    }\n    ```\n\n---\n\n## Playing\
          \ the Game\n\nTo play the Checkers game, you can execute the game script\
          \ within your Python environment:\n\n1. **Run the Checkers Game**:\n   \
          \ ```json\n    {\n        \"name\": \"uv_run\",\n        \"arguments\":\
          \ {\"module\": \"checkers.game\"}\n    }\n    ```\n\n### How to Play\n\n\
          - **Game Setup**: The game initializes an 8x8 checkerboard and sets up the\
          \ initial positions of the pieces for both players.\n- **Player Turns**:\
          \ Players take turns, alternating between Red and White. Red always starts\
          \ first.\n- **Move Notation**: Players input their moves using standard\
          \ notation (e.g., from-to positions). For example:\n    - Moving a piece\
          \ from E7 to E5: `E7-E5`\n    - Capturing an opponent's piece from E7 to\
          \ C5: `E7-C5`\n\n### Special Rules\n- **Capture**: A player can capture\
          \ an opponent's piece by jumping over it diagonally. Multiple jumps in the\
          \ same turn are allowed as long as the jumps land on unoccupied squares.\n\
          - **Kings**: When a player moves a piece to the opposite end of the board,\
          \ it becomes a King. Kings can move forward and backward diagonally.\n\n\
          ### Game End\n- The game ends when one player has no valid moves or when\
          \ all pieces of one player have been captured. The other player wins in\
          \ these scenarios.\n- If neither player can make a legal move, the game\
