          \ Represents a checker piece with attributes like color (black or white)\
          \ and whether it is kinged.\n4. **Player**: Handles player moves and interactions.\n\
          5. **Move**: Represents a move made by a player, including capture rules.\n\
          \n### Core Classes, Functions, Methods\n\n1. **Game Class**\n   - `__init__`:\
          \ Initializes the game state.\n   - `setup_board`: Sets up the initial board\
          \ configuration.\n   - `switch_player`: Switches turns between players.\n\
          \   - `make_move`: Executes a move and updates the board state.\n   - `is_game_over`:\
          \ Checks if the game is over (win or draw).\n   - `display_board`: Prints\
          \ the current board state.\n\n2. **Board Class**\n   - `__init__`: Initializes\
          \ an 8x8 board.\n   - `print_board`: Displays the board to the console.\n\
          \   - `move_piece`: Moves a piece from one position to another, applying\
          \ capture rules.\n   - `is_valid_move`: Checks if a move is legal.\n\n3.\
          \ **Piece Class**\n   - `__init__`: Initializes a piece with its color and\
          \ king status.\n   - `king_me`: Kings the piece when it reaches the other\
          \ side of the board.\n\n4. **Player Class**\n   - `make_turn`: Prompts the\
          \ player for input and makes a move.\n   - `is_valid_input`: Validates the\
          \ player's input.\n\n5. **Move Class**\n   - `__init__`: Initializes a move\
          \ with start and end positions.\n   - `validate_capture`: Checks if capture\
          \ is required and performs it.\n\n### Step-by-Step Implementation\n\n1.\
