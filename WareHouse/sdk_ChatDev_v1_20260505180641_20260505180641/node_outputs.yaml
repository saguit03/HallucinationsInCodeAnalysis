          = start\n    end_x, end_y = end\n    piece = board_state[start_x][start_y]\n    if
          piece is None or player_turn != (''w'' if piece == ''b'' else ''b''):\n        return
          False\n    if not (abs(start_x - end_x) == 1 and abs(start_y - end_y) in
          [1, 2]):\n        return False\n    return True\n\n# Function to handle
