      - type: text
        text: '# Checkers (Draughts) Game User Manual


          Welcome to the Checkers (Draughts) game developed by ChatDev! This manual
          will guide you through setting up your environment and playing the game.


          ## Table of Contents

          1. Introduction

          2. Installation

          3. How to Play

          4. Game Rules

          5. Conclusion


          ---


          ## 1. Introduction


          The Checkers (Draughts) game is a classic board game for two players. This
          manual provides you with detailed instructions on how to set up the environment,
          install dependencies, and play the game.


          ---


          ## 2. Installation


          ### Prerequisites

          - Python 3.8 or higher


          ### Installing Dependencies

          To start playing, you need to install the required Python packages. Run
          the following command in your terminal:


          ```bash

          uv add checkers_game_package

          ```


          This will create a virtual environment and install all necessary dependencies.


          ---


          ## 3. How to Play


          ### Starting the Game

          Once the installation is complete, you can start playing Checkers (Draughts)
          by running:


          ```bash

          uv run checkers.py

          ```


          ### Basic Rules

          - The game is played on an 8x8 board with alternating light and dark squares.

          - Each player starts with 12 pieces in their respective color''s row at
          the back of the board.

          - Players take turns moving their pieces diagonally forward to the opposing
          side until they reach the opposite end or are captured.


          ### Moving Pieces

          To move a piece, you need to input its current position followed by its
          destination position. For example:


          ```

          Move from A2 to B3: A2-B3

          ```


          ### Capturing Pieces

          When a player lands on an opponent''s piece diagonally, that piece is captured
          and removed from the board. To jump over an opponent''s piece, input both
          steps:


          ```

          Jump over B4 with C3: C3-D4

          ```


          ### Kinging Pieces

          A piece becomes a king when it reaches the opposite end of the board. When
          a player moves their piece to the farthest row, they can declare it as a
          king by appending "K" at the end of the move:


          ```

          King piece from B7: B7-B8-K

          ```


          ### Ending the Game

          The game ends when one player has no more pieces left or all of their opponent''s
          pieces are captured. The remaining player wins.


          ---


          ## 4. Game Rules


          - **Objective**: Capture all of your opponent''s pieces.

          - **Diagonal Movement**: Pieces can only move diagonally forward.

          - **Jumping**: Capturing is mandatory; players must jump over the opponent''s
          piece and land on an empty square.

          - **Kings**: Kings can move diagonally in any direction, including backwards.
          They are crowned by reaching the opposite side of the board.


          ---


          ## 5. Conclusion


          Thank you for using the Checkers (Draughts) game! Enjoy playing and challenging
          your opponent.


          For more details and advanced features, please refer to the source code
          documentation within the virtual environment.'
      metadata:
        source: Chief Product Officer
