          + '' wins!'')\n                    self.game_over = True\n                else:\n                    self.switch_player()\n            else:\n                print(''Invalid
          move. Try again.'')\n\nif __name__ == ''__main__'':\n    game = Checkers()\n    game.main_loop()"}}

