          \ position is empty or contains an opponent's piece\\n        if self.board[end_row][end_col]\
          \ != ' ' and self.board[end_row][end_col].islower() == self.board[start_row][start_col].islower():\\\
          n            return False\\n\\n        # Simple move check (non-capture)\\\
          n        if end_row == start_row + 1 or end_row == start_row - 1:\\n   \
          \         if abs(end_col - start_col) == 1:\\n                return True\\\
          n\\n        # Capture move check\\n        if end_row == start_row + 2 or\
          \ end_row == start_row - 2:\\n            if abs(end_col - start_col) ==\
          \ 2:\\n                mid_piece = self.board[(start_row + end_row) // 2][(start_col\
          \ + end_col) // 2]\\n                return mid_piece != ' ' and mid_piece.islower()\
          \ != self.board[start_row][start_col].islower()\\n\\n        return False\\\
          n\\n    def make_move(self, start, end):\\n        start_row, start_col\
          \ = start\\n        end_row, end_col = end\\n\\n        # Move the piece\\\
          n        self.board[end_row][end_col] = self.board[start_row][start_col]\\\
          n        self.board[start_row][start_col] = ' '\\n\\n        # Check for\
          \ promotion to king\\n        if self.board[end_row][end_col] == 'B' and\
          \ end_row == 0:\\n            self.board[end_row][end_col] = 'b'\\n    \
          \    elif self.board[end_row][end_col] == 'W' and end_row == 7:\\n     \
