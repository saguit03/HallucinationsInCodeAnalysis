          \        # Logic for determining if the game is over\n        return False\n\
          \n    def run(self):\n        while not self.is_game_over():\n         \
          \   current_player = self.players[self.current_player_index]\n         \
          \   print(f\"Player {current_player.color}'s turn\")\n            from_pos\
          \ = input(\"Enter start position (e.g., a1): \")\n            to_pos = input(\"\
          Enter end position (e.g., b2): \")\n            self.make_move(from_pos,\
          \ to_pos)\n            current_player.switch_turn()\n```\n\n#### `main.py`\n\
