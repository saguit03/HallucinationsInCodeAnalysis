          \n1. **Environment Setup**\n   - `init_python_env`: Initializes the Python\
          \ virtual environment.\n   - `install_python_packages`: Installs required\
          \ Python packages using `uv add`.\n\n2. **Game Operations**\n   - The game\
          \ is played through a command-line interface (CLI). You will be prompted\
          \ to input moves in standard notation.\n\n### Installation\n\n1. **Initialize\
          \ Python Environment**\n   ```json\n   {\"name\": \"init_python_env\", \"\
          arguments\": {\"python_version\": \"3.8\"}}\n   ```\n\n2. **Install Required\
          \ Packages**\n   ```json\n   {\"name\": \"install_python_packages\", \"\
          arguments\": {\"packages\": [\"checkers_game\"], \"upgrade\": true}}\n \
          \  ```\n\n### How to Play\n\n1. **Starting the Game**\n   - After setting\
          \ up your environment and installing dependencies, start the game by running:\n\
          \     ```sh\n     python checkers_game.py\n     ```\n\n2. **Game Loop**\n\
          \   - The game will prompt players to input their moves in standard notation\
          \ (e.g., `a1-a3`).\n   - For capturing pieces, use the capture notation\
          \ (e.g., `b4xb6`).\n\n3. **Standard Capture and Kinging Rules**\n   - Pieces\
          \ can only move diagonally.\n   - Capturing is mandatory if possible. If\
          \ multiple captures are available on a turn, the player must complete all\
          \ captures.\n   - When a piece reaches the opposite side of the board, it\
          \ becomes a king.\n\n4. **Winning and Losing Conditions**\n   - The game\
          \ ends when one player has no pieces left or their opponent cannot make\
          \ a legal move.\n   - The game declares a draw if both players agree or\
          \ neither can force a win.\n\n### Example Gameplay\n\n1. **Initial Setup**\n\
          \   ```sh\n   python checkers_game.py\n   ```\n\n2. **Game Loop**\n   ```plaintext\n\
          \   Player 1's turn (W): Enter your move: b5-b3\n   Player 2's turn (B):\
          \ Enter your move: c4-c6\n   Player 1's turn (W): Enter your move: a5-a7\n\
          \   Player 2's turn (B): Enter your move: d5-d3\n   ...\n   ```\n\n### Troubleshooting\n\
          \n- **Environment Issues**: If you encounter environment issues, ensure\
          \ that all dependencies are correctly installed.\n- **Move Errors**: Check\
          \ that your moves follow standard notation and are legal according to the\
          \ game rules.\n\nFor more advanced features and customization options, refer\
          \ to the source code documentation. Enjoy playing Checkers (Draughts)!"
