          \ guide on how to set up the game, install necessary dependencies, and play\
          \ against another player using our software.\n\n## Main Functions of the\
          \ Software\n\n### 1. Setting Up the Environment\n- **Function:** `init_python_env`\n\
          - **Description:** Initializes a Python environment in your workspace with\
