          Introduction to Checkers Game\nWelcome to the Checkers game! This game is
          designed to be played on an 8x8 board with two players taking alternating
          turns. The objective of the game is to capture all of your opponent''s pieces
          or block their kinging. This manual will guide you through setting up and
          playing the game.\n\n## Setting Up the Environment\nBefore starting the
          game, you need to set up your environment by installing Python packages
          and initializing a virtual environment.\n\n1. **Install Python Packages**\n   ```json\n   {\"name\":
          \"install_python_packages\", \"arguments\": {\"packages\": [\"uv\", \"uv-venv\"],
          \"upgrade\": true}}\n   ```\n\n2. **Initialize Python Environment**\n   ```json\n   {\"name\":
          \"init_python_env\", \"arguments\": {}}\n   ```\n\n## Running the Game\nOnce
          your environment is set up, you can run the Checkers game using the following
          command:\n\n```bash\nuv run checkers_game.py\n```\nThis will execute the
          `checkers_game.py` script and start a new game.\n\n### Main Functions of
          the Software\n\n1. **init_python_env**\n   - Initializes a Python environment
          with necessary tools.\n\n2. **install_python_packages**\n   - Installs specified
          Python packages using `uv add`.\n\n3. **uv_run**\n   - Runs a module or
          script inside the workspace root.\n\n### How to Play\n\n1. **Move Prompt**\n   During
          your turn, the game will prompt you for a move in notation (e.g., from-to
          positions).\n\n2. **Legal Moves Enforcement**\n   The game will only accept
          legal moves based on standard Checkers rules.\n\n3. **Capture and Kinging
          Rules**\n   Capture pieces diagonally by jumping over them, and king your
          piece when it reaches the opposite end of the board.\n\n4. **Win or Draw
          States**\n   The game will detect win states (one player has no pieces left)
          and draw states (no legal moves for either player).\n\n### Example Game
          Play\n```plaintext\nStarting Checkers Game...\nYour turn: A1-C3\nA1-C3\nYour
          turn: B2-B4\nB2-B4\nYour turn: A3-C5\nA3-C5\nYour turn: B4-B6\nB4-B6\nYour
          turn: C1-E3\nC1-E3\nYour turn: D2-D4\nD2-D4\n...\nGame Over! Player 2 wins!\n```\n\n##
