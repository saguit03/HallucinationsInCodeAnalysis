          \ start, end):\n    x_start, y_start = start\n    x_end, y_end = end\n \
          \   dx, dy = (x_end - x_start), (y_end - y_start)\n    \n    if abs(dx)\
          \ != 2 or abs(dy) != 2:\n        return False\n    \n    capture_piece_x,\
          \ capture_piece_y = (x_start + dx // 2), (y_start + dy // 2)\n    if board.get_piece(capture_piece_x,\
