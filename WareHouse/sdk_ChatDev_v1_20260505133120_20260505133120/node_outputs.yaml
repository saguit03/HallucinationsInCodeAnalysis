          \        print(board)\n        move = input(f\"{current_player.name}, enter\
          \ your move (e.g., a1-b2): \")\n        \n        try:\n            board.move(current_player,\
          \ move)\n        except ValueError as e:\n            print(e)\n       \
          \     continue\n        \n        if board.is_game_over():\n           \
          \ print(board)\n            winner = player1 if board.winner == 1 else player2\n\
          \            print(f\"{winner.name} wins!\")\n            break\n      \
          \  \n        current_player = player1 if current_player == player2 else\
          \ player2\n\nif __name__ == \"__main__\":\n    run()\n```\n\n#### `board.py`\
          \ - Board Class\n\n```python\nclass Board:\n    def __init__(self):\n  \
          \      self.state = [\n            ['B' if (i + j) % 2 == 0 else ' ' for\
