          \ False\n\n    piece = self.board[x1][y1]\n    if piece is None or piece[0]\
          \ != self.player_turn:\n        return False\n\n    if (x2, y2) in [(x1\
          \ + 1, y1 + 1), (x1 - 1, y1 + 1)] and piece == 'w':\n        return False\n\
          \    if (x2, y2) in [(x1 + 1, y1 - 1), (x1 - 1, y1 - 1)] and piece == 'b':\n\
          \        return False\n\n    if abs(x1 - x2) == 2:\n        middle_piece\
          \ = self.board[(x1 + x2) // 2][(y1 + y2) // 2]\n        if middle_piece\
