          range(1, BOARD_SIZE, 2):\n            board[i][j] = ''w''\n    return board\n\n#
          Print the board with row and column labels\ndef print_board(board):\n    print(''   '',
          end='''')\n    for col in range(BOARD_SIZE):\n        print(chr(col + ord(''A'')),
          end=''  '')\n    print()\n    for row in range(BOARD_SIZE):\n        print(row
          + 1, end='' | '')\n        for piece in board[row]:\n            if piece
          is None:\n                print(''.'', end=''  '')\n            else:\n                print(piece,
          end=''  '')\n        print()\n\n# Get the row and column index from user
          input\ndef get_move_input(player):\n    while True:\n        move = input(f''Player
          {player}, enter your move (e.g., A1-C3): '').upper().strip()\n        if
          len(move) == 4 and move[0] in ''ABCDEFGH'' and move[2] in ''ABCDEFGH'' and
          move[1].isdigit() and move[3].isdigit():\n            start_col = ord(move[0])
          - ord(''A'')\n            end_col = ord(move[2]) - ord(''A'')\n            start_row
          = int(move[1]) - 1\n            end_row = int(move[3]) - 1\n            if
          (start_col, start_row) in get_piece_positions(board, player):\n                return
          start_row, start_col, end_row, end_col\n            else:\n                print(''Invalid
          move. Please enter a valid move.'')\n        else:\n            print(''Invalid
          input format. Please use A1-C3 notation.'')\n\n# Get all positions of pieces
          for the given player\ndef get_piece_positions(board, player):\n    positions
          = []\n    for row in range(BOARD_SIZE):\n        for col in range(BOARD_SIZE):\n            if
          board[row][col] is not None and (board[row][col].lower() == player.lower()):\n                positions.append((row,
          col))\n    return positions\n\n# Check if a move is valid according to the
          rules\ndef is_valid_move(board, start_row, start_col, end_row, end_col,
          player):\n    piece = board[start_row][start_col]\n    direction = 1 if
          player == ''b'' else -1\n    # Move forward one square\n    if end_row ==
          start_row + direction and (end_col == start_col - 1 or end_col == start_col
          + 1) and board[end_row][end_col] is None:\n        return True\n    # Move
          forward two squares for first move\n    elif start_row in range(3) if player
          == ''b'' else start_row in range(5, BOARD_SIZE) and piece == player.lower()
          and end_row == start_row + 2 * direction and (end_col == start_col - 1 or
          end_col == start_col + 1) and board[end_row][end_col] is None:\n        return
          True\n    # Capture an opponent''s piece diagonally forward one square\n    elif
          abs(end_row - start_row) == 1 and abs(end_col - start_col) == 2 and board[(start_row
          + end_row) // 2][(start_col + end_col) // 2] is not None and board[end_row][end_col]
          is None:\n        return True\n    # Capture an opponent''s piece diagonally
          forward two squares\n    elif abs(end_row - start_row) == 2 and abs(end_col
          - start_col) == 4 and board[(start_row + end_row) // 2][(start_col + end_col)
          // 2] is not None and board[end_row][end_col] is None:\n        return True\n    return
          False\n\n# Perform a move on the board\ndef make_move(board, start_row,
          start_col, end_row, end_col):\n    board[start_row][start_col] = None\n    board[end_row][end_col]
          = board[start_row][start_col]\n\n# Main game loop\ndef main():\n    board
          = init_board()\n    current_player = ''b''\n    while True:\n        print_board(board)\n        start_row,
          start_col, end_row, end_col = get_move_input(current_player)\n        if
          is_valid_move(board, start_row, start_col, end_row, end_col, current_player):\n            make_move(board,
          start_row, start_col, end_row, end_col)\n            # Check for win or
          draw\n            if check_win_or_draw(board, current_player):\n                print_board(board)\n                print(f''Player
          {current_player.upper()} wins!'')\n                break\n            #
          Switch to the other player\n            current_player = ''w'' if current_player
          == ''b'' else ''b''\n        else:\n            print(''Invalid move. Please
          try again.'')\n\n# Check for win or draw conditions\ndef check_win_or_draw(board,
          player):\n    opponent = ''w'' if player == ''b'' else ''b''\n    # Check
          if the current player has no pieces left\n    if not get_piece_positions(board,
          player):\n        return True\n    # Check if the opponent has no legal
          moves left\n    for row in range(BOARD_SIZE):\n        for col in range(BOARD_SIZE):\n            if
          (row, col) in get_piece_positions(board, player) and any(is_valid_move(board,
          row, col, end_row, end_col, player) for end_row, end_col in [(row + 1, col
          - 1), (row + 1, col + 1), (row - 1, col - 1), (row - 1, col + 1)]):\n                return
          False\n    # If opponent has no legal moves and current player also has
          no legal moves, it''s a draw\n    if not any(is_valid_move(board, row, col,
          end_row, end_col, player) for row in range(BOARD_SIZE) for col in range(BOARD_SIZE)
          for end_row, end_col in [(row + 1, col - 1), (row + 1, col + 1), (row -
          1, col - 1), (row - 1, col + 1)]):\n        return True\n    return False\n\nif
