          \        if piece.king and col_diff != 1:\n            return False\n  \
          \      return True\n\n    def is_in_bounds(self, row, col):\n        return\
          \ 0 <= row < 8 and 0 <= col < 8\n```\n\n### Step 3: Define the `Player`\
