          n                self.board[row_to][col_to] = self.board[row_from][col_from]\\\
          n                self.board[row_from][col_from] = '.'\\n               \
          \ self.board[mid_row][mid_col] = '.'\\n                return True\\n  \
          \      return False\\n\\n    def play(self):\\n        while True:\\n  \
          \          self.print_board()\\n            from_pos = input(f'Player {self.current_player},\
          \ enter your move (from-to): ')\\n            to_pos = input(f'Player {self.current_player},\
          \ enter your move (to-to): ')\\n\\n            if not self.move_piece(from_pos,\
