          n        if self.board[row_from][col_from] != self.current_player:\\n  \
          \          return False\\n        # Check if the move is a capture and update\
          \ the board\\n        if abs(row_to - row_from) == 2 and abs(col_to - col_from)\
          \ == 2:\\n            mid_row, mid_col = (row_from + row_to) // 2, (col_from\
