          \   print('Invalid move. Please try again.')\\n                continue\\\
          n\\n            if self.check_winner():\\n                self.print_board()\\\
          n                print(f'Player {self.current_player} wins!')\\n       \
          \         break\\n\\n            self.switch_player()\\n\\n    def check_winner(self):\\\
          n        # Check if there are any pieces left for the current player\\n\
