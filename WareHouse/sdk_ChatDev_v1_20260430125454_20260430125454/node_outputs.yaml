          \ Game! This game is designed for two players to play against each other\
          \ on an 8x8 board, using standard rules for capturing and kinging pieces.\n\
          \n### Main Functions of the Software\n\n- **`init_python_env`**: Initializes\
          \ a Python environment with a specific version.\n- **`install_python_packages`**:\
          \ Installs Python packages required for the game.\n- **`uv_run`**: Runs\
          \ a Python module or script within the workspace.\n- **`apply_text_edits`**:\
          \ Applies line edits to a file, preserving encoding and handling trailing\
          \ newlines.\n\n### Installing Environment Dependencies\n\n1. Open your terminal.\n\
          2. Run the following command to initialize the Python environment with Python\
          \ 3.8:\n    ```json\n    {\"name\": \"init_python_env\", \"arguments\":\
          \ {\"python_version\": \"3.8\"}}\n    ```\n3. Install necessary Python packages\
          \ by running:\n    ```json\n    {\"name\": \"install_python_packages\",\
          \ \"arguments\": {\"packages\": [\"checkers-game\"], \"upgrade\": true}}\n\
          \    ```\n\n### How to Use the Game\n\n1. **Start the Game**:\n    - Ensure\
          \ your environment is set up as described in the previous section.\n   \
          \ - Run the game by executing the following command in your terminal:\n\
          \        ```json\n        {\"name\": \"uv_run\", \"arguments\": {\"module\"\
          : \"checkers_game\"}}\n        ```\n\n2. **Game Play**:\n    - The game\
          \ will prompt players for moves in notation (e.g., from-to positions).\n\
          \    - Players must enter valid move notations to capture and advance the\
          \ game.\n    - The game will automatically handle capturing, kinging, and\
          \ invalid move situations.\n\n3. **Win or Draw Detection**:\n    - The game\
          \ will detect win states when a player has no legal moves left.\n    - It\
          \ will also detect draw states if all legal moves result in stalemates.\n\
          \n### Example Moves\n\n- Capture: `e2-e4`\n- King: `a1-a8`\n\n### Troubleshooting\n\
          \n- **Invalid Move**: If you enter an invalid move, the game will prompt\
          \ again for a valid move.\n- **No Legal Moves**: The game ends when a player\
          \ has no legal moves left.\n\nEnjoy your game of Checkers (Draughts)!"
