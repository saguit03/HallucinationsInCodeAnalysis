          \n    def make_move(self, start_pos, end_pos):\n        if self.is_valid_move(start_pos,\
          \ end_pos):\n            self.board.move_piece(start_pos, end_pos)\n   \
          \         self.switch_turn()\n        else:\n            print(\"Invalid\
