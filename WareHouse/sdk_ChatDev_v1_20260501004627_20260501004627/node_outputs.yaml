          \ - 1\n        return (row, col)\n```\n\n#### `main.py`\n\n```python\n\"\
          \"\"\nThis is the main module to launch the program.\n\"\"\"\n\nfrom game_logic\
          \ import CheckersGame\n\ndef run():\n    game = CheckersGame()\n    game.run()\n\
