          \ functions for handling user input and output.\n\n### Core Components\n\
          \n1. **GameBoard**: Manages the 8x8 grid and piece positions.\n2. **Piece**:\
          \ Represents a single checker piece, including its position and type (normal\
          \ or king).\n3. **Player**: Handles player actions and piece movement.\n\
          4. **Game**: Orchestrates the game flow, alternating turns between players\
          \ and handling captures and kings.\n\n### Functionality\n\n- Create an 8x8\
          \ board with alternating light and dark squares.\n- Initialize pieces in\
          \ their starting positions.\n- Handle user input for moves in notation (e.g.,\
          \ 'A1-C3').\n- Update the board state based on valid moves.\n- Implement\
