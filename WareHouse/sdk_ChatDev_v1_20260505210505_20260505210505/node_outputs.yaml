          "start_line": 40, "replacement": "    def make_move(self, move):\n        #
          Execute a move\n        from_col, from_row = ord(move[0]) - ord(''A''),
          int(move[1]) - 1\n        to_col, to_row = ord(move[3]) - ord(''A''), int(move[4])
