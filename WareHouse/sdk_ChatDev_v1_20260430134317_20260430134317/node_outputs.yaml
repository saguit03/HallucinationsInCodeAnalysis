          \ and selected_piece.color == players[current_player].color:\n         \
          \               board.select_piece(selected_piece)\n\n        if board.selected_piece:\n\
          \            for event in pygame.event.get():\n                if event.type\
          \ == pygame.MOUSEBUTTONDOWN:\n                    x, y = pygame.mouse.get_pos()\n\
