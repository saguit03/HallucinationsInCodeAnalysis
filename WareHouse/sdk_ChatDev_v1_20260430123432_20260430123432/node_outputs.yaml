          \nWelcome to Checkers (Draughts)! This game allows you to play against another\
          \ player on an 8x8 board with alternating turns, following standard capture\
          \ and kinging rules. The manual provides detailed instructions on how to\
          \ install the necessary environment dependencies and how to play the game.\n\
          \n## Main Functions\n\nThe software consists of a Python script designed\
