          \ turns to make moves on the board. Moves are entered in notation format\
          \ (e.g., \"a2-a4\").\n\n3. **Capture and Kinging Rules**:\n   - Captures\
          \ are made by jumping over opponent's pieces and landing on the other side.\n\
          \   - Kings can be created by moving a piece to the opposite end of the\
          \ board.\n\n4. **Win/Draw Detection**:\n   The game automatically detects\
