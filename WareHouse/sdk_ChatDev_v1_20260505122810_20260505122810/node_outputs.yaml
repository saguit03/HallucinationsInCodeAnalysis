          n    def __init__(self, color, position):\\n        self.color = color\\\
          n        self.position = position\\n        self.king = False\\n\\n    def\
          \ is_king(self):\\n        return self.king\\n\\n    def set_king(self):\\\
          n        self.king = True\\n\\n    def get_color(self):\\n        return\
          \ self.color\\n\\n    def move(self, end_pos):\\n        # Update the piece's\
