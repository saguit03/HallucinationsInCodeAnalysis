          (Draughts) Game Manual\n\n## Introduction\n\nWelcome to the Checkers (Draughts)
          game! This manual provides instructions on how to set up your development
          environment, install necessary dependencies, and play the game using our
          provided codebase.\n\n## Environment Setup\n\n### Installing Python Dependencies\n\nTo
          run the Checkers game, you need to have Python installed on your system.
          If not already installed, download and install it from [python.org](https://www.python.org/downloads/).\n\nOnce
          Python is installed, create a virtual environment for the project:\n\n```bash\ninit_python_env
          {\"python_version\": \"3.9\"}\n```\n\nActivate the virtual environment:\n\n-
          On Windows:\n  ```bash\n  .\\venv\\Scripts\\activate\n  ```\n- On macOS/Linux:\n  ```bash\n  source
          venv/bin/activate\n  ```\n\n### Installing Game Dependencies\n\nInstall
          the required Python packages using `uv add`:\n\n```bash\ninstall_python_packages
          {\"packages\": [\"numpy\", \"pygame\"]}\n```\n\n## Running the Checkers
          Game\n\n1. **Launch the Game**:\n\n   Run the game by executing the following
          command:\n\n   ```bash\n   uv_run {\"module\": \"main\"}\n   ```\n\n2. **Gameplay
          Instructions**:\n    \n   - The game starts with an 8x8 board, alternating
          black and white pieces.\n   - Players take turns moving their pieces from
          one square to another.\n   - Capturing is mandatory; a piece must capture
          an opponent''s piece when possible.\n   - When a piece reaches the opposite
          end of the board, it can be \"kinged\" (promoted to a queen), allowing it
          to move in any direction.\n\n3. **Move Notation**:\n    \n   Enter moves
          in algebraic notation. For example:\n   ```\n   A2-A4\n   B7-B5\n   ```\n   -
          Capitalize row letters (A-H) and number columns (1-8).\n   - From the starting
          square to the destination square.\n\n## Game Completion\n\nThe game will
          automatically detect win or draw states:\n- **Win**: When one player has
          no legal moves left.\n- **Draw**: If both players have no legal moves or
          if all pieces are kinged by one side.\n\n## Additional Features\n\n### Save
          and Load Games\n\n- Save the current game state using `uv_run` with the
          `module: save_game` option.\n- Load a saved game state using `uv_run` with
          the `module: load_game` option.\n\n### Display Board State\n\nto display
          the current board state, run:\n\n```bash\nuv_run {\"script\": \"display_board.py\"}\n```\n\nThis
          will open a graphical window showing the current board configuration and
          pieces.\n\n## Conclusion\n\nThat''s it! With this manual, you should be
          able to set up your development environment, install necessary dependencies,
          and enjoy playing Checkers (Draughts) using our provided codebase. Happy
          gaming!"}}

          ```'
