          \ be denoted as `d4-d5`.\\n\\n#### Capture Moves\\nIf a capture is available,\
          \ the game will indicate it and prompt you to perform the capture. A valid\
          \ capture might look like `a3-a5xb4`, where `b4` is the piece being captured.\\\
          n\\n#### Kinging a Piece\\nWhen a piece reaches the opposite end of the\
          \ board (the 8th rank for black or the 1st rank for white), it can be kinged\
          \ by moving it to the desired position. For example, to king a piece from\
          \ square `f2` to `f7`, you would enter `f2-f7=K`.\\n\\n### End Game Conditions\\\
          nThe game will automatically detect win or draw conditions based on the\
          \ rules of Checkers (Draughts). The game may end due to:\\n- A player being\
