          \ `a3-a5xb4`, where `b4` is the piece being captured.\n\n#### Kinging a\
          \ Piece\nWhen a piece reaches the opposite end of the board (the 8th rank\
          \ for black or the 1st rank for white), it can be kinged by moving it to\
          \ the desired position. For example, to king a piece from square `f2` to\
          \ `f7`, you would enter `f2-f7=K`.\n\n### End Game Conditions\nThe game\
          \ will automatically detect win or draw conditions based on the rules of\
          \ Checkers (Draughts). The game may end due to:\n- A player being unable\
          \ to make a legal move.\n- All pieces of one player being captured.\n\n\
          The game will display the winner or if the game is a draw, and then prompt\
          \ for a new game or exit.\n\n## Conclusion\nThis manual provides a comprehensive\
          \ guide on how to set up and play the Checkers (Draughts) game. Enjoy your\
          \ strategic gameplay!"
      metadata:
        source: Chief Product Officer
