          n   ```\\n   Install necessary Python packages for handling the game board\
          \ and logic.\\n\\n### List Accessible Files\\nTo explore what files are\
          \ available in your environment, use:\\n```json\\n{\\\"name\\\": \\\"describe_available_files\\\
