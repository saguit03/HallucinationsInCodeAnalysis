          \ of Contents\n1. [Introduction](#introduction)\n2. [Features](#features)\n\
          3. [Installation](#installation)\n4. [Usage](#usage)\n\n## Introduction\n\
          \nThe Checkers (Draughts) game is designed for two players to engage in\
          \ a classic board game played on an 8x8 grid. Players alternate turns moving\
          \ their pieces from one square to another, capturing the opponent's pieces\
          \ with jumps, and converting them into kings under specific conditions.\n\
          \n## Features\n\n- **Standard Rules**: The game adheres to standard Draughts\
          \ rules for movement, capture, and kinging.\n- **Turn Management**: Tracks\
          \ turns between two players and ensures that moves are made in alternating\
          \ order.\n- **Move Input**: Accepts move input in notation format (e.g.,\
          \ A1-B2).\n- **Game State Detection**: Detects win or draw states based\
          \ on available legal moves.\n\n## Installation\n\nTo play the Checkers game,\
          \ you need to set up your Python environment and install any required packages.\
          \ Follow these steps:\n\n### Step 1: Initialize Python Environment\nRun\
          \ the following command to initialize a Python environment using `uv`:\n\
          ```json\n{\"name\": \"init_python_env\", \"arguments\": {\"python_version\"\
          : \"3.8\"}}\n```\n\n### Step 2: Install Required Packages\nInstall necessary\
          \ packages for the game by running:\n```json\n{\"name\": \"install_python_packages\"\
          , \"arguments\": {\"packages\": [\"chess\"], \"upgrade\": true}}\n```\n\n\
          ## Usage\n\nTo play the Checkers game, follow these steps:\n\n1. **Launch\
          \ the Game**:\n   Start the game by importing and running the main script.\n\
          \   ```python\n   from checkers import checkers_main\n\n   if __name__ ==\
          \ \"__main__\":\n       checkers_main()\n   ```\n\n2. **Make Moves**:\n\
          \   During your turn, enter moves in notation format (e.g., A1-B2).\n  \
          \ - The game will automatically capture opponent pieces if possible.\n \
          \  - Kings can move diagonally backward as well as forward.\n\n3. **Kinging\
          \ Pieces**:\n   When a piece reaches the farthest row of its color's side,\
          \ it is automatically kinged to promote to a king.\n\n4. **Win or Draw Detection**:\n\
          \   The game will announce when a player wins by capturing all of their\
          \ opponent's pieces or if there are no legal moves left.\n   - A draw can\
          \ occur if both players have no legal moves and cannot force a win.\n\n\
          ## Example\n\nHere’s an example of how to play the game:\n\n1. **Launch\
          \ the Game**:\n   ```python\n   from checkers import checkers_main\n\n \
          \  if __name__ == \"__main__\":\n       checkers_main()\n   ```\n\n2. **Make\
          \ Moves**:\n   - Player 1: A2-A4\n   - Player 2: B7-B5\n   - Player 1: C2-C4\n\
          \n3. **Capture and Kinging**:\n   - Player 2 captures a piece on D4.\n \
          \  - Player 1 captures a piece on E6 and kings it.\n\n4. **Game State Detection**:\n\
          \   - The game will announce the winner or declare a draw if no legal moves\
          \ are available.\n\nFeel free to explore the game and enjoy playing Checkers\
          \ (Draughts) with your friend!"
