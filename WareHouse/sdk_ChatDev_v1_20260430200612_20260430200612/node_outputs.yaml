          \   \n    return False\n\ndef make_move(board, start, end):\n    board[start[0]][start[1]]\
          \ = ' '\n    board[end[0]][end[1]] = board[end[0]][end[1]].lower() if abs(end[0]\
          \ - start[0]) == 2 else board[end[0]][end[1]]\n    return board\n\ndef is_capture(board,\
          \ start, end):\n    dx, dy = end[0] - start[0], end[1] - start[1]\n    mid\
          \ = (start[0] + end[0]) // 2, (start[1] + end[1]) // 2\n    return board[mid[0]][mid[1]]\
          \ != ' ' and board[end[0]][end[1]] == ' '\n\ndef capture_piece(board, start,\
          \ end):\n    dx, dy = end[0] - start[0], end[1] - start[1]\n    mid = (start[0]\
          \ + end[0]) // 2, (start[1] + end[1]) // 2\n    board[mid[0]][mid[1]] =\
          \ ' '\n    return board\n\ndef has_valid_moves(board, color):\n    for i\
          \ in range(8):\n        for j in range(8):\n            if board[i][j].lower()\
          \ == color:\n                if any(is_valid_move(board, (i, j), (i + x,\
          \ j + y)) for x, y in [(-1, -1), (-1, 1), (1, -1), (1, 1)]: \n         \
          \           return True\n    return False\n\ndef check_win_or_draw(board):\n\
          \    if not has_valid_moves(board, 'b'):\n        print(\"White wins!\"\
          )\n        return True\n    elif not has_valid_moves(board, 'w'):\n    \
          \    print(\"Black wins!\")\n        return True\n    elif all(cell.lower()\
          \ != cell for row in board for cell in row):\n        print(\"Draw!\")\n\
          \        return True\n    return False\n\n# Call the function to initialize\
          \ the board\ninitial_board = initialize_board()\nprint_board(initial_board)\n\
          ```\n\n### Step 3: Prompt Players to Make Moves\n\nWe need a loop to prompt\
          \ players to make moves and update the board state accordingly.\n\n```python\n\
          def get_user_move(board, color):\n    print(f\"{color.capitalize()} player's\
          \ move (from-to): \")\n    move = input().strip().split()\n    if len(move)\
          \ != 2:\n        print(\"Invalid move format. Please use 'row col row col'.\"\
          )\n        return None\n    start, end = tuple(map(int, move))\n    if not\
