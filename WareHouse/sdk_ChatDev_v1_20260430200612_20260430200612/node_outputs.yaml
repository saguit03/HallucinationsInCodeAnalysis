          \ in 'bw':\n        dx, dy = end[0] - start[0], end[1] - start[1]\n    \
          \    if abs(dx) != 1 or abs(dy) != 1:\n            return False\n    \n\
          \    # Check direction and distance for captures\n    if board[start[0]][start[1]]\
          \ in 'bw':\n        dx, dy = end[0] - start[0], end[1] - start[1]\n    \
          \    if abs(dx) == 2 and abs(dy) == 2:\n            mid = (start[0] + end[0])\
