          \ == 1 and abs(from_pos[1] - to_pos[1]) == 1:\n            return True\n\
          \        return False\n```\n\n##### `game_logic.py`\n\n```python\nfrom board\
          \ import Board\nfrom move_validator import MoveValidator\n\nclass GameLogic:\n\
          \    def __init__(self):\n        self.board = Board()\n        self.current_player\
          \ = 'B'\n        self.move_validator = MoveValidator(self.board)\n\n   \
