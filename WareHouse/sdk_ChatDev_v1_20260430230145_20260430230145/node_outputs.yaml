          : \"3.9\"\n     }\n   }\n   ```\n\n2. **Install Required Packages**:\n \
          \  Install any necessary packages using `uv add`.\n\n   ```json\n   {\n\
          \     \"name\": \"install_python_packages\",\n     \"arguments\": {\n  \
          \     \"packages\": [\"checkers-game\"]\n     }\n   }\n   ```\n\n### Usage\n\
          \n1. **Run the Game**:\n   Execute the main module to start the game.\n\n\
          \   ```json\n   {\n     \"name\": \"uv_run\",\n     \"arguments\": {\n \
          \      \"module\": \"main\"\n     }\n   }\n   ```\n\n2. **Gameplay Instructions**:\n\
          \   - **Turn-based Gameplay**: Players take turns making moves.\n   - **Move\
          \ Notation**: Provide the move in algebraic notation (e.g., `d4-e5` for\
          \ a piece moving from `d4` to `e5`).\n   - **Capturing**: If capturing is\
          \ possible, specify the capture move in one step. Multiple captures are\
          \ done in one turn.\n\n3. **Game End**:\n   - The game will automatically\
          \ detect win or draw states and announce the result.\n\n## User Manual\n\
          \n### Main Functions\n\n- `init_python_env`: Initializes a Python environment\
