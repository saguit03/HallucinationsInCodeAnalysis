          \ within the workspace root.\n\n### Example Workflow\n\n1. **Set Up Environment**:\n\
          \n   ```json\n   {\n     \"name\": \"init_python_env\",\n     \"arguments\"\
          : {\n       \"python_version\": \"3.9\"\n     }\n   }\n   ```\n\n2. **Install\
