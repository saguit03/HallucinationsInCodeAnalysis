          \ and capturing opponents' pieces.\n\n3. **Game Progression**:\n   - The\
          \ game will update the board state based on the valid moves.\n   - If an\
          \ invalid move is entered, the player will be prompted again until a legal\
          \ move is made.\n\n## Conclusion\n\nThis manual provides the necessary instructions\
