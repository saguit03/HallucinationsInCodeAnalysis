          : {\"script\": \"main.py\"}}\n   ```\n\n## Game Rules and Controls\n\n###\
          \ Board Layout\n\nThe board is an 8x8 grid with alternating dark and light\
          \ squares. Each player controls 12 pieces, which are initially positioned\
          \ on the darker squares.\n\n### Player Turns\n\nPlayers take turns moving\
          \ their pieces. On each turn, a player must move one of their own pieces\
          \ to a legal square according to the following rules:\n\n- Pieces can only\
          \ be moved diagonally.\n- If an opponent's piece is located in the adjacent\
          \ diagonal square, that piece can be captured by jumping over it.\n- Multiple\
          \ captures are allowed if possible, but they must follow consecutive jumps\
          \ without stopping.\n\n### Capturing and Kinging\n\n- When a player captures\
          \ an opponent's piece, it is removed from the board.\n- A player's piece\
          \ becomes a king when it reaches the opposite side of the board. Kings can\
          \ move in any direction diagonally.\n\n### Win and Draw Conditions\n\nThe\
          \ game ends when one player has no legal moves remaining. In this case,\
          \ the other player wins. If both players have no legal moves, the game is\
          \ declared a draw.\n\n## Playing the Game\n\n1. **Game Start**:\n   - The\
          \ game begins with a randomly determined turn for each player.\n   \n2.\
          \ **Move Input**:\n   - Players are prompted to enter their move in algebraic\
