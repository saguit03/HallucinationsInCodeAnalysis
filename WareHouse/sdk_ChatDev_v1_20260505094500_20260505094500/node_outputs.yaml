          arguments\\\": {\\n    \\\"packages\\\": [\\\"checkers_game\\\"],\\n   \
          \ \\\"upgrade\\\": true\\n  }\\n}\\n```\\n\\n## Main Functions\\n\\nThe\
          \ Checkers game is built on a Python script named `checkers.py`. The main\
          \ functions you will interact with are:\\n\\n### Running the Game\\nTo start\
          \ playing, execute the following command:\\n```json\\n{\\n  \\\"name\\\"\
          : \\\"uv_run\\\",\\n  \\\"arguments\\\": {\\n    \\\"script\\\": \\\"checkers.py\\\
          \"\\n  }\\n}\\n```\\n\\n## How to Play\\n\\n1. **Starting the Game**: Launch\
          \ the game using the command mentioned above.\\n2. **Player Turns**: The\
          \ game alternates turns between two players (typically Black and White).\
          \ You will be prompted to enter your move in the format `from-to`, e.g.,\
          \ `e7-e5`.\\n3. **Standard Rules**:\\n   - Moves are made by sliding a piece\
          \ diagonally from one square to an adjacent unoccupied square.\\n   - A\
          \ jump over an opponent's piece is mandatory if it results in a capture\
          \ and is possible, otherwise the game is considered illegal unless you have\
          \ no other legal moves.\\n   - Captured pieces are removed from the board.\\\
          n   - A piece can be promoted to a king when it reaches the opponent’s side\
          \ of the board. Promoting happens automatically upon reaching the end.\\\
          n4. **Game Completion**:\\n   - The game ends in one of two ways:\\n   \
          \  - One player is out of legal moves and loses.\\n     - All the pieces\
