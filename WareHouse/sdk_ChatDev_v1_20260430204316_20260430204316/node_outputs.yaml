          n                    self.board[row][col].promote()\\n\\n    def print_board(self):\\\
          n        for row in self.board:\\n            print(' '.join(['{}' if cell\
          \ else '--' for cell in row]))\\n\",\n    \"mode\": \"overwrite\",\n   \
          \ \"encoding\": \"utf-8\"\n  }\n}\n```\n\nCreate a file for the piece logic:\n\
          \n```json\n{\n  \"name\": \"save_file\",\n  \"arguments\": {\n    \"path\"\
          : \"game/piece.py\",\n    \"content\": \"# coding=utf-8\\n\\nclass Color:\\\
