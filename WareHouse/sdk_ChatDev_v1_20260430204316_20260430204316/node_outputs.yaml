          n\\nfrom .board import Board\\nfrom .piece import Color\\n\\nclass Game:\\\
          n    def __init__(self):\\n        self.board = Board()\\n        self.current_player\
          \ = Color.WHITE\\n\\n    def get_valid_moves(self, position):\\n       \
