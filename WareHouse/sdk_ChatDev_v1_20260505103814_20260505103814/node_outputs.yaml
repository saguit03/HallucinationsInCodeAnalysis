          \ using a 2D list.\n   - Initialize the board with pieces in their starting\
          \ positions.\n   - Print the current state of the board.\n\n```python\n\
          import enum\n\nclass Piece(enum.Enum):\n    EMPTY = 0\n    BLACK_MAN = 1\n\
          \    BLACK_KING = 2\n    RED_MAN = 3\n    RED_KING = 4\n\nclass Board:\n\
