        text: "# Checkers (Draughts) Game User Manual\n\n## Introduction\nWelcome\
          \ to the Checkers (Draughts) game! This is a simple text-based version designed\
          \ for two players to play on an 8x8 board. The game follows standard rules,\
          \ including capturing and kinging pieces.\n\n## Main Functions\n- **play_game()**:\
          \ Starts a new game and handles player turns, move validation, and game\
          \ state detection.\n- **display_board()**: Prints the current state of the\
          \ game board to the console.\n- **validate_move(from_pos, to_pos)**: Checks\
          \ if the proposed move is legal according to standard Checkers rules.\n\
          - **make_move(from_pos, to_pos)**: Updates the board with the new position\
          \ of the piece after a valid move.\n- **check_winner()**: Determines if\
          \ there's a winner or if the game is in a draw.\n\n## Installation\n###\
          \ Prerequisites\nEnsure you have Python installed on your system. The game\
          \ has no external dependencies beyond Python.\n\n### Setup Environment\n\
          1. **Initialize Python Environment**:\n   ```json\n   {\"name\": \"init_python_env\"\
          , \"arguments\": {\"python_version\": \"3.9\"}}\n   ```\n\n2. **Install\
          \ Required Packages** (if any needed):\n   Since there are no external packages\
          \ required, this step is not necessary for running the game.\n\n## Usage\
          \ Instructions\n\n### Starting a Game\nTo begin playing:\n```python\nplay_game()\n\
          ```\nThis function will start the game and prompt the players to enter their\
          \ moves in notation.\n\n### Playing Moves\nDuring your turn, you'll be prompted\
          \ to enter a move in \"from-to\" notation. For example, moving a piece from\
          \ position A1 to B2 is written as `A1-B2`. If you need to capture an opponent's\
          \ piece, use the \"jump\" notation, e.g., `C3-E5`.\n\n### Example of a Game\
          \ Session\n```plaintext\nWelcome to Checkers! Player 1 plays White, Player\
          \ 2 plays Black.\nCurrent Board:\na b c d e f g h\n8 . . . . . . .\n7 .\
          \ . . . . . .\n6 . . . . . . .\n5 . . . w . . .\n4 . . . . . . .\n3 . .\
          \ . . . . .\n2 . . B . . . .\n1 . . . . . . .\n\nPlayer 1's turn (White),\
          \ enter move: C3-E5\nCurrent Board:\na b c d e f g h\n8 . . . . . . .\n\
          7 . . . . . . .\n6 . . . . . . .\n5 . . . w . . .\n4 . . . . . . .\n3 .\
          \ . . . . . .\n2 . . B . . . .\n1 . . . b . . .\n\nPlayer 2's turn (Black),\
          \ enter move: D7-F5\nCurrent Board:\na b c d e f g h\n8 . . . . . . .\n\
          7 . . . . . . .\n6 . . . . . . .\n5 . . . w . . .\n4 . . . . . . .\n3 .\
          \ . . . . . .\n2 . . B b . . .\n1 . . . . . . .\n\nPlayer 1's turn (White),\
          \ enter move: C4-G8\nGame Over! Player 1 wins!\n```\n\n### Handling Errors\n\
          If you enter an invalid move, the game will prompt you again. Make sure\
          \ to follow the rules and notation correctly.\n\n## Game Rules Recap\n-\
          \ **Capture**: Pieces can jump over opponents' pieces, landing on the square\
          \ directly opposite. Multiple captures in a row are allowed.\n- **Kinging**:\
          \ A piece becomes a king by reaching the opponent's back row. Kings can\
          \ move forward and backward along any diagonal.\n- **End of Game**: The\
          \ game ends when one player has no legal moves or all their opponent's pieces\
          \ have been captured.\n\nEnjoy playing Checkers with ChatDev!"
      metadata:
        source: Chief Product Officer
