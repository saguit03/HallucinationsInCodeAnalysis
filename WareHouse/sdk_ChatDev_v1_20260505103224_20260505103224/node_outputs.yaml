          ```python\nclass Piece:\n    def __init__(self, color):\n        self.color\
          \ = color\n        self.kinged = False\n\n    def king(self):\n        self.kinged\
          \ = True\n\n    def get_symbol(self):\n        if self.kinged:\n       \
          \     return 'K' if self.color == 'white' else 'k'\n        return 'P' if\
