          \ for the board, pieces, moves, captures, kinging, and win/draw conditions.\
          \ Below is the implementation in Python:\n\n```python\n# checkers.py\n\n\
          class Board:\n    def __init__(self):\n        self.board = self.create_board()\n\
          \        self.current_player = 'R'\n\n    def create_board(self):\n    \
          \    board = [[None for _ in range(8)] for _ in range(8)]\n        for row\
          \ in range(3):\n            for col in range((row + 1) % 2, 8, 2):\n   \
          \             board[row][col] = 'r'\n        for row in range(5, 8):\n \
          \           for col in range(row % 2, 8, 2):\n                board[row][col]\
          \ = 'b'\n        return board\n\n    def print_board(self):\n        for\
          \ row in self.board:\n            print(' '.join(piece or '-' for piece\
          \ in row))\n\n    def is_valid_move(self, start, end):\n        start_row,\
          \ start_col = start\n        end_row, end_col = end\n        piece = self.board[start_row][start_col]\n\
          \n        if not piece:\n            return False\n\n        if piece.islower()\
          \ and self.current_player == 'R':\n            return False\n        if\
          \ piece.isupper() and self.current_player == 'B':\n            return False\n\
          \n        row_diff = abs(start_row - end_row)\n        col_diff = abs(start_col\
          \ - end_col)\n\n        if row_diff != 1 or col_diff not in (1, 2):\n  \
          \          return False\n\n        if col_diff == 1:\n            if piece.islower()\
          \ and start_row > end_row:\n                return False\n            if\
          \ piece.isupper() and start_row < end_row:\n                return False\n\
          \n        if col_diff == 2:\n            jump_piece = self.board[(start_row\
          \ + end_row) // 2][(start_col + end_col) // 2]\n            if not jump_piece\
          \ or jump_piece.islower() == piece.islower():\n                return False\n\
          \n        return True\n\n    def move(self, start, end):\n        start_row,\
          \ start_col = start\n        end_row, end_col = end\n        piece = self.board[start_row][start_col]\n\
          \n        if not self.is_valid_move(start, end):\n            raise ValueError(\"\
          Invalid move\")\n\n        self.board[end_row][end_col] = piece\n      \
          \  self.board[start_row][start_col] = None\n\n        jump_piece = self.board[(start_row\
          \ + end_row) // 2][(start_col + end_col) // 2]\n        if jump_piece:\n\
          \            self.board[(start_row + end_row) // 2][(start_col + end_col)\
          \ // 2] = None\n            if abs(end_row - start_row) == 2 and (end_row\
          \ == 0 or end_row == 7):\n                piece = piece.upper()\n\n    \
          \    self.current_player = 'B' if self.current_player == 'R' else 'R'\n\n\
          \    def is_game_over(self):\n        # Check for valid moves\n        for\
          \ row in range(8):\n            for col in range(8):\n                if\
          \ self.board[row][col] and self.is_valid_move((row, col), (row + 1, col\
          \ - 1)):\n                    return False\n                if self.board[row][col]\
          \ and self.is_valid_move((row, col), (row + 1, col + 1)):\n            \
          \        return False\n\n        # Check for win condition\n        red_pieces\
          \ = sum(row.count('r') for row in self.board)\n        black_pieces = sum(row.count('b')\
          \ for row in self.board)\n\n        if not red_pieces:\n            print(\"\
          Black wins!\")\n            return True\n        elif not black_pieces:\n\
          \            print(\"Red wins!\")\n            return True\n\n        return\
          \ False\n\n\nclass Game:\n    def __init__(self):\n        self.board =\
          \ Board()\n\n    def play(self):\n        while not self.board.is_game_over():\n\
          \            self.board.print_board()\n            player = 'R' if self.board.current_player\
          \ == 'R' else 'B'\n            move_from = input(f\"{player}'s turn. Enter\
          \ the move (from-to): \").split('-')\n            try:\n               \
          \ start, end = tuple(map(int, move_from[0].strip()), int(move_from[1].strip()))\n\
          \                self.board.move((start // 8, start % 8), (end // 8, end\
          \ % 8))\n            except ValueError as e:\n                print(e)\n\
          \n        self.board.print_board()\n\n\nif __name__ == \"__main__\":\n \
          \   game = Game()\n    game.play()\n```\n\n### Explanation:\n\n1. **Board\
          \ Class**:\n   - `__init__`: Initializes the board with pieces and sets\
          \ the current player.\n   - `create_board`: Creates an 8x8 board with alternating\
          \ red ('r') and black ('b') pieces.\n   - `print_board`: Prints the current\
          \ state of the board.\n   - `is_valid_move`: Checks if a move from start\
          \ to end is valid according to the rules of Checkers.\n   - `move`: Executes\
          \ a move, handling jumps and kinging.\n   - `is_game_over`: Checks if the\
          \ game is over by ensuring no valid moves are left or determining a winner.\n\
          \n2. **Game Class**:\n   - `__init__`: Initializes the game with an instance\
          \ of the Board class.\n   - `play`: Manages the game loop, taking user input\
