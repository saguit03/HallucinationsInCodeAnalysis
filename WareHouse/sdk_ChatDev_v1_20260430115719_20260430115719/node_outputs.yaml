          n\\n    dx, dy = abs(x_end - x_start), abs(y_end - y_start)\\n    if (dx\
          \ != 1 or dy != 1) and (dx != 2 or dy != 2):\\n        return False\\n\\\
          n    # Movement direction for white and black pieces\\n    if board[x_start][y_start]\
