          \ \"packages\": [\"checkers_game\"]\n     }\n   }\n   ```\n\n## How to Play\n\
          \n### Starting the Game\n\n1. **Import and Initialize the Game:**\n\n  \
          \ Import the game module and initialize a new game:\n\n   ```python\n  \
          \ from checkers_game import CheckersGame\n\n   game = CheckersGame()\n \
          \  ```\n\n2. **Print the Initial Board State:**\n\n   Display the current\
          \ state of the board:\n\n   ```python\n   print(game.board)\n   ```\n\n\
          ### Making Moves\n\n1. **Enter a Move in Notation:**\n\n   Players enter\
          \ moves using notation (e.g., \"a2-a4\" for a simple move, or \"b3-c5\"\
          \ for a capture). Use the following format:\n\n   ```python\n   game.move(\"\
          from-to\")\n   ```\n\n2. **Check Validity of the Move:**\n\n   The game\
          \ will check if the entered move is valid according to the rules. If not,\
          \ it will prompt you to enter another move.\n\n3. **Print Updated Board\
          \ State:**\n\n   After each valid move, print the updated board state:\n\
          \n   ```python\n   print(game.board)\n   ```\n\n### Game Completion\n\n\
          1. **Detect Win or Draw:**\n\n   The game automatically detects if a player\
          \ has captured all of their opponent's pieces (win) or if there are no legal\
          \ moves left (draw). The game will announce the result and exit.\n\n## Example\
          \ Playthrough\n\n```python\nfrom checkers_game import CheckersGame\n\n#\
