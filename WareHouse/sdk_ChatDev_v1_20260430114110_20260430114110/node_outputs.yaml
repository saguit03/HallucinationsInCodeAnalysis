          \       x1, y1 = map(int, move_from.split('-'))\n        move_to = input(\"\
          Enter move to: \")\n        x2, y2 = map(int, move_to.split('-'))\n    \
          \    \n        self.board.make_move((x1, y1), (x2, y2))\n```\n\n### 7. `game.py`\
          \ - Class: `Game`, Method: `_switch_player`\n\n```python\ndef _switch_player(self):\n\
