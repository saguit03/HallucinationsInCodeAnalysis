          \ how to set up the environment, use the main functions, and play the game\
          \ according to standard rules.\n\n## 2. Installation of Environment Dependencies\n\
          \nBefore you can start playing, you need to set up the Python environment\
          \ with all necessary dependencies. Use the following commands:\n\n```bash\n\
          # Initialize a Python virtual environment (optional but recommended)\npython_version=\"\
