          \n  }\n}\n```\n\n### Step 4: Create the GameEngine Class\nThis class will\
          \ manage the game state, turn-based play, and win/draw conditions.\n\n```json\n\
          {\n  \"name\": \"save_file\",\n  \"arguments\": {\n    \"path\": \"checkers_game/game_engine.py\"\
          ,\n    \"content\": \"from .board import CheckersBoard\\nfrom .player import\
          \ CheckersPlayer\\nimport re\\n\\nclass GameEngine:\\n    def __init__(self):\\\
          n        self.board = CheckersBoard()\\n        self.current_player = CheckersPlayer('white')\\\
          n\\n    def get_board(self):\\n        return self.board\\n\\n    def switch_player(self):\\\
          n        if self.current_player.get_color() == 'white':\\n            self.current_player\
          \ = CheckersPlayer('black')\\n        else:\\n            self.current_player\
          \ = CheckersPlayer('white')\\n\\n    def is_valid_move(self, move):\\n \
          \       pattern = r'^([a-h][1-8])-([a-h][1-8])$'\\n        if not re.match(pattern,\
          \ move):\\n            return False\\n        from_row, from_col, to_row,\
          \ to_col = self._move_to_coordinates(move)\\n        piece = self.board.get_piece(from_row,\
          \ from_col)\\n        if piece is None or piece.color != self.current_player.get_color():\\\
          n            return False\\n        return True\\n\\n    def perform_move(self,\
          \ move):\\n        if self.is_valid_move(move):\\n            from_row,\
          \ from_col, to_row, to_col = self._move_to_coordinates(move)\\n        \
          \    self.board.move_piece(from_row, from_col, to_row, to_col)\\n      \
          \      self.switch_player()\\n            return True\\n        return False\\\
          n\\n    def _move_to_coordinates(self, move):\\n        letters = 'abcdefgh'\\\
          n        numbers = '12345678'\\n        from_pos, to_pos = move.split('-')\\\
          n        from_row = 8 - int(numbers.index(from_pos[1]))\\n        from_col\
          \ = letters.index(from_pos[0])\\n        to_row = 8 - int(numbers.index(to_pos[1]))\\\
          n        to_col = letters.index(to_pos[0])\\n        return from_row, from_col,\
          \ to_row, to_col\\n\\n    def check_winner(self):\\n        winner = self.board.check_winner()\\\
          n        if winner:\\n            print(winner)\\n            return True\\\
          n        return False\",\n    \"encoding\": \"utf-8\",\n    \"mode\": \"\
