          \ captures in one turn are allowed.\n- A jump can be made if there's an\
          \ enemy piece diagonally adjacent to your piece and another piece directly\
          \ on the other side.\n\nExample of a capture:\n```bash\nmv (3, 4)-(5, 6)\n\
          ```\n\n#### Kinging Rules\n\nWhen a piece reaches the opposite end of the\
          \ board, it becomes a king. A king can move in any direction diagonally\
          \ and must be explicitly declared when moving:\n\n- To move a regular piece\
          \ to `(7, 0)`:\n  ```bash\n  mv (3, 4)-(5, 6)\n  ```\n\n- To move a regular\
          \ piece to become a king at `(7, 0)`:\n  ```bash\n  mv (3, 4)-(5, 6) king\n\
          \  ```\n\n### Checking Game Status\n\n1. **Win or Draw:**\n   - The game\
          \ automatically detects when one player has captured all of the opponent's\
          \ pieces and declares that player as the winner.\n   - If neither player\
          \ can make a legal move, the game is declared a draw.\n\n## Conclusion\n\
          \nThat's it! Enjoy playing Checkers (Draughts) with your friends. Happy\
          \ gaming!\n\n## Additional Features\n\n- **Undo Move:** \n  ```bash\n  undo\n\
          \  ```\n  \n- **Redo Move:**\n  ```bash\n  redo\n  ```\n\nFeel free to explore\
          \ more functionalities by running `uv run checkers_game --help` for detailed\
          \ information."
      metadata:
        source: Chief Product Officer
