          will install or upgrade the necessary packages to run the game smoothly.\n\n##
          Playing the Game\n### Launching the Game\nAfter setting up the environment
          and installing dependencies, you can launch the Checkers game. Run:\n```json\n{\"name\":
          \"uv_run\", \"arguments\": {\"module\": \"checkers.main\"}}\n```\nThis command
          will execute the main module of the Checkers game.\n\n### Making Moves\nThe
          game will prompt players to make moves in standard notation (e.g., A1-C3).
          Players need to enter their move and press Enter. For example, if a player
          wants to move from square A1 to C3, they would input `A1-C3`.\n\n### Special
          Rules\n- **Capture**: If a move results in the capture of an opponent''s
