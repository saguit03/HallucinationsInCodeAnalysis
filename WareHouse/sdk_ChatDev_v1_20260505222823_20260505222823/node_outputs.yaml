          \ a piece from square `C3` to square `D4`, you would input `C3-D4`.\n  \
          \ - The game will validate the move and update the board accordingly.\n\
          \   - If the move is invalid or results in an illegal state, the game will\
          \ prompt for another move.\n\n3. **Capture and Kinging**\n   - When a piece\
          \ captures an opponent's piece, it will be automatically removed from the\
          \ board.\n   - If a piece reaches the opposite end of the board (either\
          \ row 1 for player 1 or row 8 for player 2), it will be promoted to a king.\
          \ The game will prompt you to indicate that the piece has been crowned by\
          \ entering `promote`.\n\n4. **Winning and Drawing**\n   - The game detects\
          \ win conditions when a player:\n     - Captures all of the opponent's pieces.\n\
          \     - Has no legal moves left.\n   - In case of a draw, the game will\
          \ prompt both players to agree or automatically declare it based on rules.\n\
          \n## Conclusion\n\nThat's it! You're now ready to play Checkers (Draughts)\
          \ with ChatDev's software. Enjoy the game and have fun competing against\
          \ another player!\n\nIf you encounter any issues, please refer to the README\
          \ file or contact support for assistance."
      metadata:
        source: Chief Product Officer
