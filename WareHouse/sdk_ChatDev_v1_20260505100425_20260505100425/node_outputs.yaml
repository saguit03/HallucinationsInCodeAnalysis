          \ -> None:\\n        while True:\\n            print('Current Board State:')\\\
          n            self.print_board()\\n            moves = self.current_player.get_moves(self.board)\\\
          n            if not moves:\\n                break\\n            print(f'{self.current_player.name},\
          \ enter your move (from-to):')\\n            from_pos, to_pos = input().split('-')\\\
          n            from_pos = int(from_pos[0]), int(from_pos[1])\\n          \
          \  to_pos = int(to_pos[0]), int(to_pos[1])\\n            if not is_valid_move(self.board,\
          \ from_pos, to_pos):\\n                print('Invalid move. Try again.')\\\
          n                continue\\n            self.board.move_piece(from_pos,\
          \ to_pos)\\n            self.switch_player()\\n        print('Game over!')\\\
          n\\n    def print_board(self) -> None:\\n        for row in self.board.pieces:\\\
          n            print(row)\\n\\n    def switch_player(self) -> None:\\n   \
          \     self.current_player = self.players[1] if self.current_player == self.players[0]\
          \ else self.players[0]\\n\"\n  }\n}\n```\n\nNow, let's run the game to see\
          \ it in action.\n\n```json\n{\n  \"name\": \"uv_run\",\n  \"arguments\"\
          : {\n    \"script\": \"game.py\"\n  }\n}\n```\n\n<INFO> FINISHED"
      metadata:
        source: Programmer Code Complete
