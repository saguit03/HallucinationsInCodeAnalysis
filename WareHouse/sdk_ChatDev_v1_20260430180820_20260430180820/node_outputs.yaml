          \ to_pos = map(int, move.split('-'))\n        return (from_pos // 10, from_pos\
          \ % 10), (to_pos // 10, to_pos % 10)\n\n    def make_move(self):\n     \
          \   from_pos, to_pos = self.get_user_input()\n        if not self.board.is_valid_move(from_pos,\
