          \           print('..', end=' ')\n            print()\n        colorama.deinit()\n\
          \n    def move_piece(self, from_pos, to_pos):\n        x1, y1 = from_pos\n\
          \        x2, y2 = to_pos\n        piece = self.board[x1][y1]\n        if\
          \ abs(x2 - x1) == 2 and abs(y2 - y1) == 2:\n            # Capture move\n\
          \            mid_x = (x1 + x2) // 2\n            mid_y = (y1 + y2) // 2\n\
          \            self.board[mid_x][mid_y] = ' '\n        self.board[x1][y1]\
          \ = ' '\n        self.board[x2][y2] = piece\n\n    def is_valid_move(self,\
          \ from_pos, to_pos):\n        x1, y1 = from_pos\n        x2, y2 = to_pos\n\
          \        if abs(x2 - x1) != 1 or abs(y2 - y1) not in (1, 2):\n         \
          \   return False\n        piece = self.board[x1][y1]\n        if piece ==\
          \ ' ':\n            return False\n        if (piece.islower() and x2 > x1)\
          \ or (piece.isupper() and x2 < x1):\n            return False\n        if\
          \ abs(x2 - x1) == 2 and abs(y2 - y1) == 2:\n            # Check for valid\
          \ capture move\n            mid_x = (x1 + x2) // 2\n            mid_y =\
          \ (y1 + y2) // 2\n            if self.board[mid_x][mid_y] == ' ':\n    \
          \            return False\n        return True\n\n    def king_piece(self,\
          \ pos):\n        x, y = pos\n        piece = self.board[x][y]\n        if\
          \ (x == 0 and piece.islower()) or (x == 7 and piece.isupper()):\n      \
          \      self.board[x][y] = piece.upper()\n```\n\n#### 3.2. Game Class\nNext,\
