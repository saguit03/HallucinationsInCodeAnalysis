          \          break\\n                self.switch_turn()\\n            except\
          \ ValueError as e:\\n                print(e)\",\n        \"encoding\":\
          \ \"utf-8\",\n        \"mode\": \"overwrite\"\n    }\n}\n```\n\n### Step\
          \ 3: Run the Game\n\nNow we can run the game:\n\n```json\n{\n    \"name\"\
