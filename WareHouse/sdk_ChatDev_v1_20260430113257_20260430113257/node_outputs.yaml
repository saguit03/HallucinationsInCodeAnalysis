        text: '# Checkers (Draughts) Game User Manual


          ## Introduction


          Welcome to the Checkers game! This document provides you with a detailed
          guide on how to play the game, understand its rules, and use the provided
          software effectively.


          ## Features


          1. **8x8 Board**: The game is played on an 8x8 checkerboard.

          2. **Alternating Turns**: Players take turns making moves.

          3. **Standard Capture Rules**: Pieces can jump over opponents'' pieces diagonally.

          4. **Kinging Rules**: A piece reaches the opposite end of the board by moving
          to the farthest row and becomes a king.

          5. **Move Notation**: Players provide moves in notation (e.g., from-to positions).


          ## Installation


          Before you begin, ensure that your Python environment is set up properly.
          You will need Python 3.x installed on your machine.


          ### Initialize Python Environment


          Run the following command to create and activate a Python virtual environment:


          ```sh

          init_python_env python_version="3.8"

          ```


          ### Install Required Packages


          Next, install the necessary Python packages using `uv add`. For this game,
          you might need packages like `numpy` for board management and `re` for pattern
          matching:


          ```sh

          install_python_packages ["numpy", "re"]

          ```


          ## Usage


          To play the Checkers (Draughts) game, follow these steps:


          ### Load the Source Code


          Ensure that the game source code is loaded into your workspace. You can
          do this by using a file editor or by downloading it from an attachment store.


          ```sh

          create_folder ["src"]

          save_file {"path": "src/checkers.py", "content": "<Your Source Code Here>",
          "encoding": "utf-8"}

          ```


          ### Run the Game


          Navigate to the game directory and execute the game using `uv run`. The
          game will prompt you for moves.


          ```sh

          cd src

          uv_run ["checkers.py"]

          ```


          ## Gameplay


          1. **Setting Up the Board**: When you start the game, the 8x8 board will
          be initialized with alternating dark and light squares.

          2. **Piece Movement**: Players take turns moving their pieces diagonally
          to an adjacent empty square or jumping over an opponent''s piece.

          3. **Jumping and Capturing**: When a player jumps over an opponent’s piece,
          that piece is removed from the board. Multiple captures are allowed in a
          single move if they follow one after another.

          4. **Kinging**: When a piece reaches the opposite end of its starting color''s
          side (i.e., the eighth row for black and first row for white), it can be
          crowned to become a king. Kings can move diagonally forward or backward.


          ### Notation


          - From-To Position: Provide moves in the format "from-to", where "from"
          is the current position of your piece, and "to" is the target empty square.
          For example, "e4-e5" for moving a piece from e4 to e5.

          - Special Moves: If you need to perform multiple jumps in one turn, list
          them all separated by commas. For example, "b3-d5,f3-h1" moves two pieces
          in one turn.


          ## Win or Draw


          - **Win**: The game ends when the opponent has no valid moves left or if
          a player captures all of the opponent''s pieces.

          - **Draw**: A draw can occur under various conditions such as mutually agreed
          upon by both players, stalemate, or insufficient material for checkmate.


          ## Conclusion


          Enjoy playing Checkers (Draughts) with your friends and family! This manual
          provides a comprehensive guide on how to set up the game, install dependencies,
          and play it effectively. If you encounter any issues or have suggestions
          for improvement, feel free to reach out to support.


