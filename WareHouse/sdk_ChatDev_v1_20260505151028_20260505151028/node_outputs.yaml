        text: "# Checkers (Draughts) Game User Manual\n\n## Introduction\n\nWelcome\
          \ to our Checkers (Draughts) game! This user manual provides a detailed\
          \ guide on how to install dependencies, set up your environment, and play\
          \ the game. We'll cover everything from setting up the game board to making\
          \ legal moves and declaring the win or draw states.\n\n## Installation\n\
          \n### Prerequisites\nBefore you can run the Checkers (Draughts) game, make\
          \ sure you have Python installed on your system. We recommend using a virtual\
          \ environment for optimal management of dependencies.\n\n### Creating and\
          \ Activating the Virtual Environment\n\n1. **Create a Virtual Environment:**\n\
          \   Open a terminal or command prompt and navigate to your project directory.\n\
          \   ```sh\n   init_python_env {\"python_version\":\"3.9\"}\n   ```\n\n2.\
          \ **Activate the Virtual Environment:**\n   - On Windows:\n     ```sh\n\
          \     uv run --env \"PYTHONPATH=.\" python activate venv\\Scripts\\activate\n\
          \     ```\n   - On macOS/Linux:\n     ```sh\n     uv run --env \"PYTHONPATH=.\"\
          \ python activate venv/bin/activate\n     ```\n\n3. **Install Required Packages:**\n\
          \   After activating the virtual environment, install all necessary packages.\n\
          \   ```sh\n   install_python_packages {\"packages\":[\"checkers_game\"],\"\
          upgrade\":true}\n   ```\n\n## Game Setup\n\n### Starting a New Game\n\n\
          1. **Launch the Game:**\n   Once the environment is set up and activated,\
          \ you can start the Checkers (Draughts) game by running:\n   ```sh\n   uv\
          \ run --module checkers_game.main\n   ```\n\n2. **Game Board Initialization:**\n\
          \   The game will initialize an 8x8 board with alternating colors and place\
          \ the pieces in their starting positions.\n\n## Making Moves\n\n### Input\
          \ Notation\n\nThe game expects move input in the following notation:\n-\
          \ From position (e.g., \"A1\")\n- To position (e.g., \"C3\")\n\n**Example:**\n\
          To move a piece from square A1 to C3, you would type `A1-C3`.\n\n### Legal\
          \ Moves\n\n1. **Regular Move:**\n   Simply specify the starting and ending\
          \ positions of the piece.\n   \n2. **Capture Move:**\n   Specify the starting\
          \ position, capture square (intermediate square between the start and end),\
          \ and ending position.\n   \n   **Example Capture Move:** `A1-C3-B2`\n\n\
          ### Making a Move\n\nTo make a move during your turn:\n- Type the move notation\
          \ in the terminal.\n- The game will validate the move according to the rules.\n\
          \n**Note:** If the move is invalid or cannot be made, the game will prompt\
          \ you to enter a valid move.\n\n## Declaring Win or Draw States\n\n### Winning\
          \ a Game\n\n1. **Opponent Has No Valid Moves:**\n   The player with valid\
          \ moves can declare victory by entering the command `declare-win`.\n\n2.\
          \ **Kings Rule Applied:**\n   If a piece reaches the opposite end of the\
          \ board, it becomes a king. A king can move forward and backward.\n\n###\
          \ Declaring a Draw\n\n1. **Stalemate:**\n   If neither player has valid\
          \ moves, the game is declared a draw by entering `declare-draw`.\n\n2. **Threefold\
          \ Repetition:**\n   The game will automatically detect threefold repetition\
          \ and declare it as a draw.\n\n## User Interaction\n\n### Help Command\n\
          \nTo get help at any point during the game, type:\n- `help`\n\nThis command\
          \ provides a quick reference on how to make moves and declare states.\n\n\
          ### Quitting the Game\n\nTo exit the game gracefully:\n- Type `quit` or\
          \ press `Ctrl+C`.\n\n## Conclusion\n\nWe hope you enjoy playing Checkers\
          \ (Draughts)! If you encounter any issues or have suggestions for improvement,\
          \ please refer to our support channels. Happy gaming!\n\n---"
      metadata:
        source: Chief Product Officer
