          \\n        self.current_player = 0\\\\n\\\\n    def switch_turn(self):\\\
          \\n        self.current_player = (self.current_player + 1) % 2\\\\n\\\\\
          n    def run(self):\\\\n        while True:\\\\n            self.board.print_board()\\\
          \\n            move = self.players[self.current_player].get_move()\\\\n\
          \            # TODO: Validate and apply the move\\\\n            self.switch_turn()\"\
