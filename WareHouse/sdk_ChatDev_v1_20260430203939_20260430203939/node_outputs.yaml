          not (0 <= start_pos[0] < BOARD_SIZE and 0 <= start_pos[1] < BOARD_SIZE and\n                0
          <= end_pos[0] < BOARD_SIZE and 0 <= end_pos[1] < BOARD_SIZE):\n            return
          False\n        if self.get_piece_color(start_pos) != self.current_player:\n            return
          False\n        # Check if the move is to an empty cell or a kinged piece''s
          move\n        if self.get_piece_color(end_pos) == EMPTY or (self.get_piece_color(end_pos)
          in [KINGED_WHITE, KINGED_BLACK]):\n            return True\n        return
          False\n\n    def make_move(self, start_pos, end_pos):\n        if not self.is_valid_move(start_pos,
          end_pos):\n            print(''Invalid move! Please try again.'')\n            return\n        self.board[end_pos[0],
          end_pos[1]] = self.get_piece_color(start_pos)\n        self.board[start_pos[0],
          start_pos[1]] = EMPTY\n        if (end_pos[0] == 0 and self.current_player
          == WHITE) or (end_pos[0] == BOARD_SIZE - 1 and self.current_player == BLACK):\n            #
          Promote piece to king\n            self.board[end_pos[0], end_pos[1]] +=
          ''K''\n        self.current_player = BLACK if self.current_player == WHITE
          else WHITE\n\n    def is_game_over(self):\n        # Check if there are
          any valid moves left\n        for i in range(BOARD_SIZE):\n            for
          j in range(BOARD_SIZE):\n                if self.get_piece_color((i, j))
          == self.current_player and any(\n                        self.is_valid_move((i,
          j), (x, y)) for x, y in [(i-1, j+1), (i+1, j+1), (i-1, j-1), (i+1, j-1)]:\n                    return
          False\n        return True\n\nif __name__ == ''__main__'':\n    game = CheckersGame()\n    while
          not game.is_game_over():\n        game.print_board()\n        start_pos
          = input(f''Player {game.current_player}, enter move (e.g., 2A): '').upper()\n        end_pos
          = input(''Enter destination (e.g., 4C): '').upper()\n        start_pos =
          (int(start_pos[0]) - 1, ord(start_pos[1]) - 65)\n        end_pos = (int(end_pos[0])
          - 1, ord(end_pos[1]) - 65)\n        game.make_move(start_pos, end_pos)"}}}


          {"name": "uv_run", "arguments": {"script": "src/checkers.py"}}'
      metadata:
        source: Programmer Code Complete
