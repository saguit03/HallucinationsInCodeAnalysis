          \ + move.end_row) // 2][(move.start_col + move.end_col) // 2] = None\n \
          \               player.capture_piece(captured_piece)\n\n        return True\n\
          \n    def __str__(self):\n        board_str = \"  A B C D E F G H\\n\"\n\
