          n                    start_pos = position\\n                    current_row,\
          \ current_col = row, col\\n                    for _ in range(step + 1):\\\
          n                        new_row = current_row + jump[0] * (2 ** _)\\n \
          \                       new_col = current_col + jump[1] * (2 ** _)\\n  \
          \                      if self.is_valid_position(new_row, new_col) and board[new_row][new_col]\
          \ != 0:\\n                            break\\n                    else:\\\
          n                        continue\\n                    jumps.append((jump[0],\
