          \     for col in range(8):\\n                if board[row][col] != 0 and\
          \ board[row][col] * self.color > 0:\\n                    moves.extend(self.get_piece_moves(board,\
          \ (row, col)))\\n        return moves\\n\\n    def get_piece_moves(self,\
          \ board, position):\\n        moves = []\\n        row, col = position\\\
          n        if abs(board[row][col]) == 1:\\n            # Normal move\\n  \
          \          new_pos = (row + self.direction, col)\\n            if self.is_valid_position(new_pos)\
          \ and board[new_pos[0]][new_pos[1]] == 0:\\n                moves.append((position,\
          \ new_pos))\\n        else:\\n            # Jump move\\n            jumps\
          \ = [(self.direction, -1), (self.direction, 1)]\\n            for jump in\
