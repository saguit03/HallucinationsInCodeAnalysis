          \  # Double jump possible\\n                    start_pos = position\\n\
          \                    current_row, current_col = row, col\\n            \
          \        for _ in range(step + 1):\\n                        new_row = current_row\
          \ + jump[0] * (2 ** _)\\n                        new_col = current_col +\
          \ jump[1] * (2 ** _)\\n                        if self.is_valid_position(new_row,\
          \ new_col) and board[new_row][new_col] != 0:\\n                        \
          \    break\\n                    else:\\n                        continue\\\
          n                    jumps.append((jump[0], jump[1]))\\n               \
          \ break\\n        return moves\\n\\n    def make_move(self, board, start_pos,\
          \ end_pos):\\n        piece = board[start_pos[0]][start_pos[1]]\\n     \
          \   if abs(piece) == 2:  # King can move in any direction\\n           \
          \ jumps = [(self.direction, -1), (self.direction, 1)] + [(-self.direction,\
          \ -1), (-self.direction, 1)]\\n        else:\\n            jumps = [(self.direction,\
          \ -1), (self.direction, 1)]\\n        for jump in jumps:\\n            current_row,\
          \ current_col = start_pos\\n            for step in range(2):  # Double\
          \ jump possible\\n                new_row = current_row + jump[0] * (2 **\
          \ _)\\n                new_col = current_col + jump[1] * (2 ** _)\\n   \
          \             if self.is_valid_position(new_row, new_col) and board[new_row][new_col]\
          \ != 0:\\n                    break\\n            else:\\n             \
          \   continue\\n            jumps.append((jump[0], jump[1]))\\n        if\
          \ end_pos in jumps:\\n            board[end_pos[0]][end_pos[1]] = piece\\\
          n            board[start_pos[0]][start_pos[1]] = 0\\n            # Remove\
          \ the captured piece\\n            capture_row, capture_col = start_pos[0]\
          \ + jump[0], start_pos[1] + jump[1]\\n            board[capture_row][capture_col]\
          \ = 0\\n        else:\\n            board[end_pos[0]][end_pos[1]] = piece\\\
          n            board[start_pos[0]][start_pos[1]] = 0\\n\\n    def is_valid_position(self,\
          \ row, col):\\n        return 0 <= row < 8 and 0 <= col < 8\\n\\nclass Board:\\\
          n    def __init__(self):\\n        self.board = np.zeros((8, 8), dtype=int)\\\
          n        self.initialize_board()\\n\\n    def initialize_board(self):\\\
          n        for row in range(3):\\n            for col in range(row % 2, 8,\
          \ 2):\\n                self.board[row][col] = -1\\n        for row in range(5,\
          \ 8):\\n            for col in range((row + 1) % 2, 8, 2):\\n          \
          \      self.board[row][col] = 1\\n\\n    def print_board(self):\\n     \
          \   for row in self.board:\\n            print(\" \".join(f\"{cell:2d}\"\
          \ for cell in row))\\n\\nclass Game:\\n    def __init__(self, board, player1,\
          \ player2):\\n        self.board = board\\n        self.players = [player1,\
          \ player2]\\n        self.current_player_index = 0\\n\\n    def start(self):\\\
          n        while True:\\n            print(f\"Player {self.players[self.current_player_index].color}'s\
