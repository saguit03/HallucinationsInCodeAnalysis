          \ make_move(self, board, start_pos, end_pos):\\n        piece = board[start_pos[0]][start_pos[1]]\\\
          n        if abs(piece) == 2:  # King can move in any direction\\n      \
          \      jumps = [(self.direction, -1), (self.direction, 1)] + [(-self.direction,\
