          \ a checkers piece.\n   - Attributes:\n     - `color` (str): The color of\
          \ the piece ('white' or 'black').\n     - `is_king` (bool): Whether the\
          \ piece is kinged.\n   - Methods:\n     - `king()`: Kings the piece.\n\n\
