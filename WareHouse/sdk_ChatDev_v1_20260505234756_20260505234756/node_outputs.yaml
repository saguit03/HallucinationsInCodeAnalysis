          \ __init__(self, color):\\\\n        self.color = color\\\\n\\\\n    def\
          \ make_move(self, board):\\\\n        start = input(f\\\"Player {self.color},\
          \ enter your move (start-end): \\\")\\\\n        start, end = map(int, start.split('-'))\\\
          \\n        if board.is_valid_move((start // 10, start % 10), (end // 10,\
