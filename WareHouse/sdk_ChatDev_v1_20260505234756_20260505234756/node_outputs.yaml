          \ not self.check_game_state():\n            print(\"Current board:\")\n\
          \            self.board.print_board()\n            self.current_player.make_move(self.board)\n\
          \            self.switch_turns()\n\nif __name__ == \"__main__\":\n    game\
          \ = Game()\n    game.run_game()\n```\n\n#### `run.py`\n\n```python\n\"\"\
          \"\nThis is the main module to launch the program.\n\"\"\"\n\nfrom game\
          \ import Game\n\ndef run():\n    game = Game()\n    game.run_game()\n\n\
          if __name__ == \"__main__\":\n    run()\n```\n\n4. **Save the files**:\n\
