          \  - Attributes:\n     - `color` (str): The color of the player ('white'\
          \ or 'black').\n   - Methods:\n     - `make_move(board)`: Prompts the player\
          \ to make a move and updates the board.\n\n4. **Game Class**:\n   - Purpose:\
          \ Manages the game state and flow.\n   - Attributes:\n     - `board` (Board):\
          \ The current board state.\n     - `current_player` (Player): The player\
          \ whose turn it is.\n   - Methods:\n     - `switch_turns()`: Switches the\
          \ active player.\n     - `check_game_state()`: Checks for win or draw conditions.\n\
          \     - `run_game()`: Main game loop.\n\n### Step-by-Step Implementation\n\
          \n1. **Create Python venv**:\n\n```json\n{\n  \"name\": \"init_python_env\"\
