          to be played on an 8x8 board with alternating turns between two players.
          The game supports standard capture and kinging rules, and moves are prompted
          in notation (e.g., \"from-to positions\"). \n\n## Main Functions\nThe following
          functions are available to interact with the Checkers game:\n\n1. **init_python_env**:
          Initializes a Python environment inside the workspace.\n2. **install_python_packages**:
          Installs necessary Python packages inside the workspace using `uv add`.\n3.
          **uv_run**: Executes a Python module or script within the workspace.\n4.
          **apply_text_edits**: Applies line edits to a file, preserving newline and
          encoding.\n5. **create_folder**: Creates a directory tree under the workspace.\n6.
          **describe_available_files**: Lists accessible files from the attachment
          store and the current code_workspace.\n7. **delete_path**: Deletes a workspace
          file or directory.\n8. **read_file_segment**: Reads a line range plus metadata
          from a workspace file.\n9. **search_in_files**: Searches workspace files
          for patterns and returns structured matches.\n10. **save_file**: Persists
          data to a workspace file while optionally registering it as an attachment.\n11.
          **list_directory**: Lists contents of a workspace-relative directory.\n\n##
          Installation\nTo install the necessary environment dependencies, follow
          these steps:\n\n1. Initialize the Python environment:\n   ```json\n   {\"name\":
          \"init_python_env\", \"arguments\": {\"python_version\": \"3.8\"}}\n   ```\n    \n2.
          Install the required packages:\n   ```json\n   {\"name\": \"install_python_packages\",
          \"arguments\": {\"packages\": [\"numpy\"], \"upgrade\": true}}\n   ```\n\n##
          Playing the Game\nTo play the Checkers game, follow these steps:\n\n1. **Start
          the Game**: Execute the main module to start playing:\n   ```json\n   {\"name\":
          \"uv_run\", \"arguments\": {\"module\": \"checkers_game\"}}\n   ```\n    \n2.
          **Prompt for Moves**: The game will prompt you to enter moves in notation
          (e.g., \"from-to positions\"). For example, to move a piece from the position
          (1, 1) to (3, 3), you would type:\n   ```plaintext\n   11-33\n   ```\n    \n3.
          **Game Progression**: The game will update the board state and prompt for
          the next move according to the rules of Checkers.\n    \n4. **Win or Draw
          States**: The game will automatically detect win or draw states and declare
          the result once a player wins or all legal moves are exhausted.\n\n## Conclusion\nThat''s
          it! Enjoy playing Checkers (Draughts) with our software. If you encounter
          any issues, please refer to the documentation or contact support for assistance."}}

