          up the development environment and playing the game. The game is designed
          for two players to take turns on an 8x8 board, following standard capture
          and kinging rules.\n\n## Table of Contents\n1. **System Requirements**\n2.
          **Installation**\n3. **How to Play**\n\n## System Requirements\n- Python
          3.x (Python version 3.6 or higher recommended)\n- `uv` library for running
          Python scripts\n\n## Installation\n\n### Initialize Python Environment\nTo
          set up the environment, you need to initialize a Python virtual environment
          and install the required packages.\n\n```json\n{\n  \"name\": \"init_python_env\",\n  \"arguments\":
          {\n    \"python_version\": \"3.8\"\n  }\n}\n```\n\n### Install Python Packages\nAfter
          initializing the environment, install the necessary packages using `uv add`.\n\n```json\n{\n  \"name\":
          \"install_python_packages\",\n  \"arguments\": {\n    \"packages\": [\n      \"chess\",\n      \"colorama\"\n    ],\n    \"upgrade\":
          true\n  }\n}\n```\n\n## How to Play\n\n### Running the Game\nTo start playing
          Checkers, navigate to your project directory and run the game using the
          following command:\n\n```bash\nuv run -m chess_cli\n```\n\nThis will execute
          the `chess_cli` module that handles user input and game logic.\n\n### Game
          Rules Overview\n1. **Board Setup**: The game starts on an 8x8 board with
          alternating dark and light squares.\n2. **Piece Movement**: Players move
          their pieces diagonally to an adjacent empty square. Kings can move in any
          direction diagonally.\n3. **Capturing Pieces**: To capture an opponent''s
          piece, jump over it onto an empty square directly diagonally across from
          the captured piece.\n4. **Kings**: A piece becomes a king when it reaches
          the opposite side of the board and is crowned by the game engine.\n5. **Game
          End**: The game ends when one player has no more pieces or valid moves.\n\n###
          Playing the Game\n- Each turn, enter your move in algebraic notation (e.g.,
          `E2E4` to move a piece from square `E2` to `E4`).\n- Captures are indicated
          by specifying both the start and end positions of the jump.\n- Kings can
          be moved by entering `KingSquare` for the source and destination.\n\n###
          Example Game\n```\nWelcome to Checkers (Draughts)!\n\n   a b c d e f g h\n1
          . r n b q k b n r\n2 p p p p p p p p\n3 . . . . . . . .\n4 . . . P . . .
          .\n5 . . . . K . . .\n6 . . . . . . . .\n7 P P P p . P p .\n8 R N B Q K
          B n r\n\nCurrent player: White (W)\nEnter your move (e.g., E2E4): C1A3\n   a
          b c d e f g h\n1 . r n . q k b n r\n2 p p p p p p p p\n3 . . . . . w . .\n4
          . . . P . . . .\n5 . . . . K . . .\n6 . . . . . . . .\n7 P P P p . P p .\n8
          R N B Q K B n r\n\nCurrent player: Black (B)\nEnter your move (e.g., A3C1):
          \n```\n\n## Conclusion\nEnjoy playing Checkers with your friends and family!
          If you encounter any issues or have feedback, please contact our support
          team. Happy gaming!\n", "encoding": "utf-8", "mode": "overwrite"}}'
      metadata:
        source: Chief Executive Officer
