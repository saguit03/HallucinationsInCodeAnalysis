          \ For capturing, use a space between the start and end positions (e.g.,\
          \ `b2 b4`).\n\n2. **Turns**: Players take turns making moves. The game will\
          \ automatically switch turns after each valid move.\n\n3. **Kings**: When\
          \ a piece reaches the opponent's far end of the board, it is crowned a king\
          \ (usually marked with an 'K') and can move backwards.\n\n4. **Game Completion**:\n\
          \   - The game ends when one player has no pieces left or when all legal\
          \ moves are exhausted.\n   - The game will declare a winner or indicate\
