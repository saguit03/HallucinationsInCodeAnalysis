          \    # Initialize the board with pieces for both players\n    return board\n\
          \ndef print_board(board):\n    for row in board:\n        print(\" \".join(str(piece)\
          \ if piece != 0 else '.' for piece in row))\n    print()\n\ndef main():\n\
          \    board = init_board()\n    current_player = 1\n    \n    while True:\n\
          \        print_board(board)\n        move = input(f\"Player {current_player},\
