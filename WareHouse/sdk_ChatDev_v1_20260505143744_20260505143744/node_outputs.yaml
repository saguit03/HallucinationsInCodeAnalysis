          to create a new Python environment.

          2. **Install Packages**: Use the `install_python_packages` function to install
          necessary packages like `numpy`.


          ```json

          {"name": "init_python_env", "arguments": {"python_version": "3.8"}}

          {"name": "install_python_packages", "arguments": {"packages": ["numpy"],
          "upgrade": true}}

          ```


          ## How to Play


          1. **Starting the Game**: Once you have initialized the environment and
          installed dependencies, start the game by running:


          ```json

          {"name": "uv_run", "arguments": {"script": "checkers.py"}}

          ```


          2. **Game Interface**: The game will display the board and prompt you for
          moves in notation (e.g., from-to positions). For example, to move a piece
          from position `53` to `71`, you would input:


          ```

          Move: 53-71

          ```


          3. **Capture and Kinging Rules**: Follow standard capture and kinging rules.
          Capturing is done by jumping over an opponent''s piece into the enemy''s
          space. Kinging a piece happens when it reaches the opposite side of the
          board.


          4. **Game Completion**: The game will automatically detect win or draw states.
          If you make an illegal move, the game will prompt you again.


          ## Conclusion


          This manual should help you set up and play the ChatDev Checkers (Draughts)
          game using the provided tools and commands. Enjoy your game!

