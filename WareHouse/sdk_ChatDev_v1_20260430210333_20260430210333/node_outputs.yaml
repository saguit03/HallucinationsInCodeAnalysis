          \ start, end):\\n        x1, y1 = start\\n        x2, y2 = end\\n      \
          \  if abs(x2 - x1) == 1 and abs(y2 - y1) == 1:\\n            return True\\\
          n        elif abs(x2 - x1) == 2 and abs(y2 - y1) == 2:\\n            mid_x,\
          \ mid_y = (x1 + x2) // 2, (y1 + y2) // 2\\n            if self.board[mid_x][mid_y]\
          \ != 0 and self.board[x2][y2] == 0:\\n                return True\\n   \
          \     return False\\n\\n    def make_move(self, start, end):\\n        x1,\
          \ y1 = start\\n        x2, y2 = end\\n        if self.is_valid_move(start,\
          \ end):\\n            self.board[x2][y2] = self.board[x1][y1]\\n       \
          \     self.board[x1][y1] = 0\\n\\n    def display_board(self):\\n      \
          \  print(np.where(self.board == 1, 'W', np.where(self.board == -1, 'B',\
          \ '-')))\"\n  }\n}\n```\n\n```json\n{\n  \"name\": \"save_file\",\n  \"\
          arguments\": {\n    \"path\": \"piece.py\",\n    \"content\": \"class Piece:\\\
          n    def __init__(self, color):\\n        self.color = color\\n\\n    def\
          \ __str__(self):\\n        return 'W' if self.color == 1 else 'B'\"\n  }\n\
          }\n```\n\n```json\n{\n  \"name\": \"save_file\",\n  \"arguments\": {\n \
          \   \"path\": \"player.py\",\n    \"content\": \"class Player:\\n    def\
          \ __init__(self, color):\\n        self.color = color\\n        self.move_history\
          \ = []\\n\\n    def get_move(self):\\n        while True:\\n           \
          \ try:\\n                move = input(f\\\"Player {self.color}, enter your\
          \ move (e.g., 0-2 3-1): \\\").split()\\n                start, end = tuple(map(int,\
          \ move))\\n                return start, end\\n            except ValueError:\\\
          n                print(\\\"Invalid move. Please enter the moves in the format:\
          \ from-to positions.\\\")\"\n  }\n}\n```\n\n```json\n{\n  \"name\": \"save_file\"\
          ,\n  \"arguments\": {\n    \"path\": \"game.py\",\n    \"content\": \"from\
          \ board import Board\\nfrom player import Player\\nclass CheckersGame:\\\
          n    def __init__(self):\\n        self.board = Board()\\n        self.players\
          \ = [Player(1), Player(-1)]\\n        self.current_player = 0\\n    def\
          \ play(self):\\n        while True:\\n            self.display_board()\\\
          n            start, end = self.players[self.current_player].get_move()\\\
          n            if self.board.is_valid_move((start // 10, start % 10), (end\
          \ // 10, end % 10)):\\n                self.board.make_move((start // 10,\
          \ start % 10), (end // 10, end % 10))\\n                self.current_player\
          \ = 1 - self.current_player\\n            else:\\n                print(\\\
          \"Invalid move. Please try again.\\\")\"\n  }\n}\n```"
      metadata:
        source: Programmer Coding
