          \ = None\n            self.board[to_row][to_col] = piece\n            piece.move_to(to_row,\
          \ to_col)\n        else:\n            raise ValueError(\"Invalid move\"\
          )\n    \n    def check_win(self):\n        # Check if any player has won\n\
          \        red_count = sum(1 for row in range(8) for col in range(8) if self.get_piece(row,\
