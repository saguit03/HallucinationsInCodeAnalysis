      metadata:
        source: Programmer Code Review
  - type: message
    payload:
      role: assistant
      content:
      - type: text
        text: '{"name": "apply_text_edits", "arguments": {"path": "checkers_game.py",
          "start_line": 1, "replacement": "# Import necessary libraries\nimport sys\n\n#
          Constants\nBOARD_SIZE = 8\nPLAYER_1 = ''W''\nPLAYER_2 = ''B''\nEMPTY = ''.
          ''\nKINGED_PLAYER_1 = ''WK''\nKINGED_PLAYER_2 = ''BK''\n\n# Board initialization
          function\ndef init_board():\n    board = [[EMPTY for _ in range(BOARD_SIZE)]
          for _ in range(BOARD_SIZE)]\n    for row in range(BOARD_SIZE):\n        if
          row % 2 == 0:\n            board[row][1:BOARD_SIZE:2] = [PLAYER_1, PLAYER_1]\n            board[row][0:BOARD_SIZE:2]
          = [PLAYER_2, PLAYER_2]\n    return board\n\n# Print the board function\ndef
          print_board(board):\n    for row in board:\n        print('' ''.join(row))\n    print()\n\n#
          Check if a move is valid function\ndef is_valid_move(board, player, from_pos,
          to_pos):\n    row_from, col_from = from_pos\n    row_to, col_to = to_pos\n    #
          Check if the starting position contains a piece of the current player\n    if
          board[row_from][col_from] != player and board[row_from][col_from] not in
          (KINGED_PLAYER_1, KINGED_PLAYER_2):\n        return False\n    # Check if
          the move is within bounds and to an empty square\n    if not (0 <= row_to
          < BOARD_SIZE and 0 <= col_to < BOARD_SIZE) or board[row_to][col_to] != EMPTY:\n        return
          False\n    # Check for capturing moves\n    if abs(row_from - row_to) ==
          2 and abs(col_from - col_to) == 2:\n        mid_row, mid_col = (row_from
          + row_to) // 2, (col_from + col_to) // 2\n        mid_piece = board[mid_row][mid_col]\        if
          mid_piece == EMPTY or mid_piece == board[row_from][col_from]:\n            return
          False\n    # Check for regular moves\n    elif abs(row_from - row_to) !=
          1 or abs(col_from - col_to) != 1:\n        return False\n    return True\n\n#
          Make a move function\ndef make_move(board, player, from_pos, to_pos):\n    row_from,
          col_from = from_pos\n    row_to, col_to = to_pos\n    board[row_to][col_to]
          = board[row_from][col_from]\n    board[row_from][col_from] = EMPTY\n    #
          Handle capturing and kinging\n    if abs(row_from - row_to) == 2:\n        mid_row,
          mid_col = (row_from + row_to) // 2, (col_from + col_to) // 2\n        board[mid_row][mid_col]
          = EMPTY\n        if player == PLAYER_1 and row_to == BOARD_SIZE - 1 or player
          == PLAYER_2 and row_to == 0:\n            board[row_to][col_to] += ''K''\n    return
          board\n\n# Main game loop function\ndef play_game():\n    board = init_board()\n    current_player
          = PLAYER_1\n    while True:\n        print_board(board)\n        from_pos_str
          = input(f''Player {current_player}, enter move (from-to): '').split(''-'')\n        from_pos
          = (int(from_pos_str[0]) - 1, int(from_pos_str[1]) - 1)\n        to_pos =
          (int(from_pos_str[2]) - 1, int(from_pos_str[3]) - 1)\n        if is_valid_move(board,
          current_player, from_pos, to_pos):\n            board = make_move(board,
          current_player, from_pos, to_pos)\n            # Check for game end\n            if
          not any(piece in (PLAYER_1, PLAYER_2) for row in board for piece in row):  #
          No more pieces of the opposite player\n                print_board(board)\n                print(f''Player
          {current_player} wins!'')\n                break\n            elif all(piece
          == EMPTY or piece[-1] != ''K'' for row in board for piece in row):  # All
          pieces are kinged\n                print_board(board)\n                print(''Game
          is a draw.'')\n                break\n            current_player = PLAYER_2
          if current_player == PLAYER_1 else PLAYER_1\n        else:\n            print(''Invalid
          move. Try again.'')\n\n# Run the game\ndef run_game():\n    play_game()\n\nif
          __name__ == ''__main__'':\n    run_game()"}}'
      metadata:
        source: Programmer Code Review
