      - type: text
        text: "# Manual\n\n## Introduction\n\nWelcome to Checkers (Draughts) Game!\
          \ This software provides an interactive environment where two players can\
          \ compete in a classic game of Checkers using Python.\n\n## Main Functions\n\
          \n- **init_python_env**: Initializes the Python environment with specific\
          \ versions.\n  - Arguments: `{\"python_version\": \"3.8\"}`\n  \n- **install_python_packages**:\
          \ Installs necessary Python packages within the workspace.\n  - Arguments:\
          \ `{\"packages\": [\"numpy\", \"pygame\"], \"upgrade\": true}`\n  \n- **uv_run**:\
          \ Runs a module or script within the workspace root.\n  - Arguments: `{\"\
          module\": \"checkers_game\", \"args\": []}`\n\n## Installation Instructions\n\
          \n### Step 1: Initialize Python Environment\nTo start, we need to initialize\
          \ our Python environment.\n\n```json\n{\n  \"name\": \"init_python_env\"\
          ,\n  \"arguments\": {\n    \"python_version\": \"3.8\"\n  }\n}\n```\n\n\
          ### Step 2: Install Required Packages\nNext, install the necessary packages\
          \ for our game.\n\n```json\n{\n  \"name\": \"install_python_packages\",\n\
          \  \"arguments\": {\n    \"packages\": [\"numpy\", \"pygame\"],\n    \"\
          upgrade\": true\n  }\n}\n```\n\n## How to Play\n\n### Launching the Game\n\
          Once your environment is set up, you can launch the Checkers game.\n\n```json\n\
          {\n  \"name\": \"uv_run\",\n  \"arguments\": {\n    \"module\": \"checkers_game\"\
          \n  }\n}\n```\n\n### Playing a Move\nPlayers will be prompted to enter moves\
          \ in notation (e.g., `a2-a4`).\n\n## Gameplay Rules\n\n- **Turns**: Players\
          \ take turns.\n- **Capturing**: Pieces can capture opponent's pieces diagonally.\
          \ A piece captures by jumping over an opponent's piece, landing on the square\
          \ immediately beyond it.\n- **Kings**: When a piece reaches the opposite\
          \ side of the board, it is kinged and can move in any direction (diagonal).\n\
          \n## Game End\nThe game will automatically detect when:\n- One player has\
          \ no legal moves remaining (checkmate).\n- All pieces of one color have\
          \ been captured (stalemate).\n\n# Conclusion\n\nThank you for playing Checkers\
          \ with ChatDev. Enjoy the game and good luck!"
