          \ == ' ' or board[end[0]][end[1]] != ' ':\\n        return False\\n    #\
          \ Check diagonal movement\\n    if abs(start[0] - end[0]) != 1 or abs(start[1]\
          \ - end[1]) != 1:\\n        return False\\n    return True\\ndef make_move(board,\
          \ start, end):\\n    board[end[0]][end[1]] = board[start[0]][start[1]]\\\
          n    board[start[0]][start[1]] = ' '\\ndef check_winner(board):\\n    black_pieces\
          \ = sum(row.count('B') for row in board)\\n    red_pieces = sum(row.count('R')\
          \ for row in board)\\n    if black_pieces == 0:\\n        return 'Red wins!'\\\
          n    elif red_pieces == 0:\\n        return 'Black wins!'\\n    return None\\\
          ndef is_draw(board):\\n    # Simplified draw condition: no valid moves left\\\
          n    for row in range(8):\\n        for col in range(8):\\n            if\
          \ board[row][col] == 'B':\\n                if any(is_valid_move(board,\
          \ (row, col), (new_row, new_col)) for new_row in range(max(row-1, 0), min(row+2,\
          \ 8))\\n                       for new_col in range(max(col-1, 0), min(col+2,\
          \ 8))):\\n                    return False\\n    for row in range(8):\\\
          n        for col in range(8):\\n            if board[row][col] == 'R':\\\
          n                if any(is_valid_move(board, (row, col), (new_row, new_col))\
          \ for new_row in range(max(row-1, 0), min(row+2, 8))\\n                \
          \       for new_col in range(max(col-1, 0), min(col+2, 8))):\\n        \
          \            return False\\n    return True\\nclass Game:\\n    def __init__(self):\\\
          n        self.board = create_board()\\n        self.current_player = 'B'\\\
          n\\n    def play(self):\\n        while True:\\n            print_board(self.board)\\\
          n            if self.current_player == 'B':\\n                print(\\\"\
          Black's turn\\\")\\n            else:\\n                print(\\\"Red's\
          \ turn\\\")\\n\\n            start, end = get_move()\\n\\n            if\
          \ not is_valid_move(self.board, start, end):\\n                print(\\\"\
          Invalid move. Try again.\\\")\\n                continue\\n\\n         \
