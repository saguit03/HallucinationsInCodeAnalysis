        text: '# Checkers Game User Manual


          ## Introduction

          Welcome to the Checkers game! This manual will guide you on how to set up
          the environment, install necessary dependencies, and play a game using our
          software.


          ## Setup Environment


          ### Initialize Python Environment

          To begin, you need to initialize the Python environment with the required
          version.


          ```json

          {"name": "init_python_env", "arguments": {"python_version": "3.8"}}

          ```


          ### Install Necessary Packages

          Install the required packages for the game using `uv add`.


          ```json

          {"name": "install_python_packages", "arguments": {"packages": ["checkers"],
          "upgrade": true}}

          ```


          ## Playing the Game


          ### Starting a New Game

          To start a new game, you can simply run the main script provided in our
          environment.


          ```json

          {"name": "uv_run", "arguments": {"module": "checkers.game"}}

          ```


          This will initiate a new instance of the Checkers game and allow you to
          play interactively.


          ### Making Moves

          During your turn, enter your move using standard notation (e.g., from-to
          positions). For example, moving a piece from position `(1, 0)` to `(2, 1)`
          would be represented as `10-21`.


          #### Capture Rules

          If a capture is possible, you must perform the capture. The notation for
          capturing multiple pieces in sequence will be automatically handled by the
          game.


          #### Kinging Rules

          Pieces promote to kings when they reach the opposite end of the board. This
          promotion is automatically managed by the game.


          ### Checking Game Status

          To check if the game has ended and to determine the winner, simply observe
          the final state of the game. The game will prompt you with a message indicating
          whether there was a win or draw.


          ## Conclusion

          That concludes our user manual for playing the Checkers game using our software.
          Enjoy your game!


          ---'
      metadata:
        source: Chief Product Officer
