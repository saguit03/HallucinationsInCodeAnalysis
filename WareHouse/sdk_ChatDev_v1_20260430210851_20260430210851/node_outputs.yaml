          n    board = Board()\\n    white_player = Player('W')\\n    black_player\
          \ = Player('B')\\n\\n    while True:\\n        # Display the board\\n  \
          \      print(board)\\n\\n        # Get player move input\\n        from_pos\
          \ = input(f'Player {white_player.color}, enter your move (e.g., A1-B2):\
          \ ').upper()\\n        to_pos = input(f'Player {black_player.color}, enter\
