      content:
      - type: text
        text: "<INFO> BEGIN SOLUTION\n\n```python\n# Define constants for game pieces\
          \ and board representation\nEMPTY = '.'\nRED = 'R'\nBLACK = 'B'\nKING_RED\
          \ = 'r'\nKING_BLACK = 'b'\n\n# Function to initialize the game board\ndef\
          \ init_board():\n    board = [[EMPTY for _ in range(8)] for _ in range(8)]\n\
          \    # Place red pieces on the board\n    for row in range(3):\n       \
          \ for col in range(row % 2, 8, 2):\n            board[row][col] = RED\n\
          \    # Place black pieces on the board\n    for row in range(5, 8):\n  \
          \      for col in range((row + 1) % 2, 8, 2):\n            board[row][col]\
          \ = BLACK\n    return board\n\n# Function to print the current state of\
          \ the board\ndef print_board(board):\n    for row in board:\n        print(\"\
          \ \".join(row))\n    print()\n\n# Function to check if a piece is at a given\
          \ position\ndef is_piece_at(board, row, col):\n    return board[row][col]\
          \ != EMPTY\n\n# Function to check if a move is legal\ndef is_legal_move(board,\
          \ from_pos, to_pos):\n    # Extract positions\n    from_row, from_col =\
          \ ord(from_pos[0]) - ord('A'), int(from_pos[1]) - 1\n    to_row, to_col\
          \ = ord(to_pos[0]) - ord('A'), int(to_pos[1]) - 1\n    \n    # Check if\
          \ the move is within bounds\n    if not (0 <= from_row < 8 and 0 <= from_col\
          \ < 8 and 0 <= to_row < 8 and 0 <= to_col < 8):\n        return False\n\
          \    \n    # Check if the piece at from_pos belongs to the current player\n\
          \    piece = board[from_row][from_col]\n    if (piece == RED or piece ==\
          \ KING_RED) and (to_row - from_row < 0):\n        return False\n    elif\
          \ (piece == BLACK or piece == KING_BLACK) and (to_row - from_row > 0):\n\
          \        return False\n    \n    # Check if there is an opponent's piece\
          \ to capture\n    if abs(from_row - to_row) == 2:\n        mid_row, mid_col\
          \ = (from_row + to_row) // 2, (from_col + to_col) // 2\n        if not is_piece_at(board,\
          \ mid_row, mid_col):\n            return False\n        if (board[mid_row][mid_col]\
          \ == RED or board[mid_row][mid_col] == KING_RED) and piece == BLACK:\n \
          \           return False\n        elif (board[mid_row][mid_col] == BLACK\
          \ or board[mid_row][mid_col] == KING_BLACK) and piece == RED:\n        \
          \    return False\n    \n    # Check if the destination is empty\n    if\
          \ is_piece_at(board, to_row, to_col):\n        return False\n    \n    return\
          \ True\n\n# Function to execute a move\ndef make_move(board, from_pos, to_pos):\n\
          \    from_row, from_col = ord(from_pos[0]) - ord('A'), int(from_pos[1])\
          \ - 1\n    to_row, to_col = ord(to_pos[0]) - ord('A'), int(to_pos[1]) -\
          \ 1\n    \n    piece = board[from_row][from_col]\n    if abs(from_row -\
          \ to_row) == 2:\n        mid_row, mid_col = (from_row + to_row) // 2, (from_col\
          \ + to_col) // 2\n        board[mid_row][mid_col] = EMPTY  # Remove the\
          \ captured piece\n    \n    if piece == RED and to_row == 7:  # King the\
          \ piece\n        piece = KING_RED\n    elif piece == BLACK and to_row ==\
          \ 0:  # King the piece\n        piece = KING_BLACK\n    \n    board[from_row][from_col]\
          \ = EMPTY\n    board[to_row][to_col] = piece\n\n# Function to check if a\
          \ player has any legal moves\ndef has_legal_moves(board, current_player):\n\
          \    for row in range(8):\n        for col in range(8):\n            piece\
          \ = board[row][col]\n            if (current_player == 'red' and (piece\
          \ == RED or piece == KING_RED)) or \\\n               (current_player ==\
          \ 'black' and (piece == BLACK or piece == KING_BLACK)):\n              \
          \  possible_moves = [\n                    f\"{chr(row + ord('A'))}{col\
          \ + 1} -> {chr(row + 2 * dir_row + ord('A'))}{col + 2 * dir_col}\"\n   \
          \                 for dir_row, dir_col in [(-1, -1), (-1, 1), (1, -1), (1,\
          \ 1)]\n                ]\n                if any(is_legal_move(board, f\"\
          {chr(row + ord('A'))}{col + 1}\", move.split(\" -> \")[1]) for move in possible_moves):\n\
          \                    return True\n    return False\n\n# Function to check\
          \ the game state\ndef check_game_state(board):\n    if not has_legal_moves(board,\
          \ 'red'):\n        print_board(board)\n        print(\"Black wins!\")\n\
          \        return 'black'\n    elif not has_legal_moves(board, 'black'):\n\
          \        print_board(board)\n        print(\"Red wins!\")\n        return\
          \ 'red'\n    elif sum(row.count(EMPTY) for row in board) == 64:  # All spaces\
          \ are occupied\n        print_board(board)\n        print(\"Draw!\")\n \
          \       return 'draw'\n    \n    return None\n\n# Main function to run the\
          \ game\ndef play_game():\n    board = init_board()\n    current_player =\
          \ 'red'\n    \n    while True:\n        print_board(board)\n        if current_player\
          \ == 'red':\n            from_pos = input(\"Red player's move (from-to positions):\
          \ \")\n        else:\n            from_pos = input(\"Black player's move\
          \ (from-to positions): \")\n        \n        if from_pos.lower() == 'q':\n\
          \            break\n        \n        to_pos = input(f\"{current_player.capitalize()}\
          \ player's destination: \")\n        \n        if is_legal_move(board, from_pos,\
          \ to_pos):\n            make_move(board, from_pos, to_pos)\n           \
          \ current_player = 'black' if current_player == 'red' else 'red'\n     \
          \   else:\n            print(\"Invalid move. Please try again.\")\n    \n\
          \    game_state = check_game_state(board)\n\n# Start the game\nif __name__\
          \ == \"__main__\":\n    play_game()\n```\n\n<INFO> END SOLUTION\n\nThis\
          \ Python script implements a simple Checkers (Draughts) game on an 8x8 board\
          \ using standard capture and kinging rules. It allows two players to take\
          \ turns making moves in notation (e.g., 'A2 -> B3') and checks for legal\
          \ moves, captures, kings, and endgame conditions such as win or draw. The\
          \ game can be quit by typing 'q' at any time.\n\nTo use this code, ensure\
          \ you have Python installed on your system. Save the script to a file (e.g.,\
