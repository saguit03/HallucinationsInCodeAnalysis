          \  elif self.board[row][col].color == 'white':\n                       \
          \ char = colorama.Fore.WHITE + char\n                else:\n           \
          \         char = \". \"\n                board_str += f\"{char} |\"\n  \
          \          board_str += f\"\\n   \"\n            for col in range(8):\n\
