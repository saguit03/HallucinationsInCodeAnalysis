          \ += \"###|\"\n                else:\n                    board_str += \"\
          ---|\"\n            board_str += \"\\n\"\n        \n        print(board_str)\n\
          ```\n\n### piece.py\n\n```python\n# This file contains the Piece class\n\
          \nclass Piece:\n    def __init__(self, color):\n        self.color = color\n\
          \n    def get_char(self):\n        return 'W' if self.color == 'white' else\
          \ 'B'\n```\n\n### player.py\n\n```python\n# This file contains the Player\
          \ class\n\nclass Player:\n    def __init__(self, color):\n        self.color\
