          2. `pieces.py`\n\n### board.py\n```python\nfrom pieces import Piece\n\n\
          class Board:\n    def __init__(self):\n        self.size = 8\n        self.grid\
          \ = [[None] * self.size for _ in range(self.size)]\n        self.initialize_board()\n\
          \n    def initialize_board(self):\n        # Place black pieces on the board\n\
          \        for i in range(3, 5):\n            for j in range(self.size):\n\
          \                if (i + j) % 2 == 1:\n                    self.grid[i][j]\
          \ = Piece('B')\n        # Place white pieces on the board\n        for i\
          \ in range(5, 7):\n            for j in range(self.size):\n            \
          \    if (i + j) % 2 == 1:\n                    self.grid[i][j] = Piece('W')\n\
          \n    def get_piece(self, row, col):\n        return self.grid[row][col]\n\
          \n    def move_piece(self, from_row, from_col, to_row, to_col):\n      \
          \  piece = self.get_piece(from_row, from_col)\n        if piece is not None:\n\
          \            piece.has_moved = True\n            self.grid[to_row][to_col]\
          \ = piece\n            self.grid[from_row][from_col] = None\n\n    def is_valid_move(self,\
          \ from_row, from_col, to_row, to_col):\n        # Basic check for valid\
          \ move (within bounds)\n        if not (0 <= from_row < self.size and 0\
          \ <= from_col < self.size and\n                0 <= to_row < self.size and\
          \ 0 <= to_col < self.size):\n            return False\n\n        piece =\
          \ self.get_piece(from_row, from_col)\n        if piece is None:\n      \
          \      return False\n\n        # Check for valid capture move\n        if\
          \ abs(to_row - from_row) == 2 and abs(to_col - from_col) == 2:\n       \
          \     intermediate_row = (from_row + to_row) // 2\n            intermediate_col\
          \ = (from_col + to_col) // 2\n            intermediate_piece = self.get_piece(intermediate_row,\
          \ intermediate_col)\n            if intermediate_piece is None or intermediate_piece.color\
          \ != piece.color:\n                return False\n\n        # Check for valid\
