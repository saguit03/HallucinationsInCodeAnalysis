          __init__(self):\n        self.board = self._create_board()\n\n    def _create_board(self):\n        board
          = np.zeros((BOARD_SIZE, BOARD_SIZE), dtype=int)\n        for row in range(3):\n            for
          col in range(row % 2, BOARD_SIZE, 2):\n                board[row][col] =
          1\n        for row in range(5, BOARD_SIZE):\n            for col in range((row
