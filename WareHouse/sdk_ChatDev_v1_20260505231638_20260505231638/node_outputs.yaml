          \ an 8x8 board with alternating dark and light squares.\n   - Pieces are\
          \ initially placed in rows 1-3 (dark) and 6-8 (light).\n\n3. **Taking Turns**:\n\
          \   - Players take turns moving pieces. You will be prompted to enter moves\
          \ using the notation \"from-to\".\n   - Example move: `b5-c4` means moving\
          \ a piece from square B5 to C4.\n\n4. **Move Syntax**:\n   - Enter your\
          \ move in the format \"from-square-to-square\". For example, `e2-e4` for\
          \ a simple move or `d7-c8x` for a capture.\n   - Captures are made by specifying\
          \ 'x' between the squares of origin and destination. Example: `c3-a1x`.\n\
          \n5. **Kings**:\n   - When a piece reaches the opposite end of the board,\
          \ it can be kinged. This is done automatically when you move a piece there.\n\
          \n6. **Game End Conditions**:\n   - The game ends when a player has no valid\
          \ moves or all pieces of one color have been removed from the board.\n \
          \  - If no player has valid moves for two consecutive turns, the game will\
          \ end in a draw.\n\n## Example Game\n\n1. Start the game and press Enter\
          \ to begin.\n2. On your turn, input a move like `d3-e4`.\n3. The game will\
          \ update the board and prompt you for your next move.\n4. Continue making\
          \ moves until the game ends.\n\n## Troubleshooting\n\n- If you encounter\
          \ any issues or errors, refer back to this manual or contact our support\
          \ team.\n- Ensure that all dependencies are correctly installed as per the\
          \ installation instructions.\n\nWe hope you enjoy playing Checkers (Draughts)\
          \ with our software!"
