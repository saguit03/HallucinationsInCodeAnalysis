          \    print(f'Player {self.current_player} wins!\\nExiting game...')\n\\\\\
          n                    break\\n                self.current_player = 'B' if\
          \ self.current_player == 'W' else 'W'\\n            else:\\n           \
          \     print('Invalid move. Try again.')\n  },\n    \"encoding\": \"utf-8\"\
          \n}\n```\n\n### Step 4: Implement the Board Class\n\nNow, we'll implement\
