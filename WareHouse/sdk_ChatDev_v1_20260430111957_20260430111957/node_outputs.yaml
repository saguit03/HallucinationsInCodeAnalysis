          \ '-':\\n                middle_pos = ((start_pos + end_pos) // 2)\\n  \
          \              row_mid, col_mid = divmod(middle_pos, 8)\\n             \
          \   if self.board[row_mid][col_mid] != self.current_player.replace('W',\
