      - type: text
        text: "# Manual\n\n## Introduction\n\nWelcome to Checkers (Draughts) Game!\
          \ This game allows two players to play on an 8x8 board using standard capture\
          \ and kinging rules. All legal moves are enforced, and the game correctly\
          \ detects win or draw states.\n\n## Main Functions\n\n### `init_python_env`\n\
          Initialize Python environment with a specific version.\n```json\n{\n   \
          \ \"name\": \"init_python_env\",\n    \"arguments\": {\n        \"python_version\"\
          : \"3.9\"\n    }\n}\n```\n\n### `install_python_packages`\nInstall necessary\
          \ Python packages inside the workspace using `uv add`.\n```json\n{\n   \
          \ \"name\": \"install_python_packages\",\n    \"arguments\": {\n       \
          \ \"packages\": [\"numpy\"],\n        \"upgrade\": true\n    }\n}\n```\n\
          \n## Installation\n\n1. **Initialize Python Environment**:\n   Ensure your\
          \ environment has a suitable version of Python installed.\n   ```json\n\
          \   {\n       \"name\": \"init_python_env\",\n       \"arguments\": {\n\
          \           \"python_version\": \"3.9\"\n       }\n   }\n   ```\n\n2. **Install\
          \ Packages**:\n   Install required packages like `numpy` to manage the board\
          \ and game logic.\n   ```json\n   {\n       \"name\": \"install_python_packages\"\
          ,\n       \"arguments\": {\n           \"packages\": [\"numpy\"],\n    \
          \       \"upgrade\": true\n       }\n   }\n   ```\n\n## Usage\n\n1. **Start\
          \ a New Game**:\n   Run the main game script to start a new game.\n\n2.\
          \ **Make Moves**:\n   Enter moves in notation (e.g., from-to positions)\
          \ and press Enter.\n   ```python\n   >>> move = input(\"Enter your move\
          \ (e.g., A1-A3): \")\n   ```\n\n## Sample Game Play\n\n```bash\n# Initialize\
          \ environment\ninit_python_env(python_version=\"3.9\")\n\n# Install necessary\
          \ packages\ninstall_python_packages(packages=[\"numpy\"], upgrade=True)\n\
          \n# Run the game\npython checkers_game.py\n```\n\nIn this example, `checkers_game.py`\
          \ is a hypothetical script that contains all the logic for initializing\
          \ the board, accepting moves, and updating the game state.\n\n## Game Rules\n\
          \n- **Piece Movement**:\n  - Players alternate turns moving one piece at\
          \ a time.\n  - Pieces can only move diagonally forward or backward (depending\
          \ on their color).\n  - Capturing is mandatory. Pieces can jump over opponent's\
          \ pieces to capture them, landing on the square immediately beyond the captured\
          \ piece.\n\n- **Kings**:\n  - When a player's piece reaches the farthest\
          \ row of its color (i.e., opposite the starting position), it becomes a\
          \ king.\n  - Kings can move and capture in any direction diagonally.\n\n\
          - **Winning the Game**:\n  - The game ends when an opponent has no legal\
          \ moves left.\n  - Alternatively, if a player captures all of their opponent's\
          \ pieces, they win.\n\n## Conclusion\n\nEnjoy playing Checkers with this\
          \ software! For any issues or feedback, please refer to the documentation\
          \ or contact support."
