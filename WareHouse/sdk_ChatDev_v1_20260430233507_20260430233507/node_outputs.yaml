          \   if is_valid_move(piece, start_pos, end_pos, self.board) or is_valid_capture(piece,\
          \ start_pos, end_pos, self.board):\\\\n                self.board.move_piece(start_pos,\
          \ end_pos)\\\\n                return True\\\\n        return False\\n\\\
          n    def switch_player(self):\\n        self.current_player = get_opposite_color(self.current_player)\\\
          n\\n    def check_winner(self):\\n        opponent_pieces = [piece for row\
          \ in self.board.state for piece in row if piece and piece.color != self.current_player]\\\
          n        if not opponent_pieces:\\n            return True\\\\n        return\
          \ False\n\"\"\"\n  }\n}\n```\n\n```json\n{\n  \"name\": \"save_file\",\n\
          \  \"arguments\": {\n    \"path\": \"checkers/board.py\",\n    \"content\"\
          : \"\"\"\\\"\\\"\\\"\nContains the board and its operations\n\\\"\\\"\\\"\
          \n\nclass Board:\n    def __init__(self, size=8):\\n        self.size =\
          \ size\\n        self.state = [[None] * size for _ in range(size)]\\n  \
          \      self.init_board()\\n\\n    def init_board(self):\\\\n        colors\
          \ = ['white', 'black']\\\\n        for i in range(3):\\\\n            color_index\
          \ = i % 2\\\\n            for j in range(4):\\\\n                if (i +\
          \ j) % 2 == 0:\\\\n                    self.state[i][j * 2] = Piece(color=colors[color_index])\\\
          n\\n    def get_piece(self, pos):\\n        x, y = int(pos[1]) - 1, ord(pos[0])\
          \ - ord('a')\\\\n        return self.state[x][y]\\n\\n    def move_piece(self,\
          \ start_pos, end_pos):\\\\n        x_start, y_start = int(start_pos[1])\
          \ - 1, ord(start_pos[0]) - ord('a')\\\\n        x_end, y_end = int(end_pos[1])\
          \ - 1, ord(end_pos[0]) - ord('a')\\\\n        self.state[x_end][y_end] =\
          \ self.state[x_start][y_start]\\\\n        self.state[x_start][y_start]\
          \ = None\\n\\n    def __str__(self):\\n        board_str = '  a b c d e\
          \ f g h\\\\n'\\n        for i in range(self.size):\\n            row_str\
          \ = f\\\"{i+1} \\\"\\n            for j in range(self.size):\\n        \
          \        piece = self.state[i][j]\\n                if piece:\\n       \
          \             row_str += f'[\\\"\\\"\\\"]}\\\"]\\\"]\\\\n        return\
          \ board_str\n\"\"\"\n  }\n}\n```\n\n```json\n{\n  \"name\": \"save_file\"\
          ,\n  \"arguments\": {\n    \"path\": \"checkers/piece.py\",\n    \"content\"\
          : \"\"\"\\\"\\\"\\\"\nDefines the pieces and their behavior\n\\\"\\\"\\\"\
          \n\nclass Piece:\\n    def __init__(self, color):\\n        self.color =\
          \ color\\n\\nclass King(Piece):\\\\n    pass\n\"\"\"\n  }\n}\n```\n\n```json\n\
          {\n  \"name\": \"save_file\",\n  \"arguments\": {\n    \"path\": \"checkers/utils.py\"\
          ,\n    \"content\": \"\"\"\\\"\\\"\\\"\nUtility functions for the game logic\n\
          \\\"\\\"\\\"\n\ndef get_opposite_color(color):\\n    return 'black' if color\
          \ == 'white' else 'white'\\n\\ndef is_valid_move(piece, start_pos, end_pos,\
          \ board):\\\\n    x_start, y_start = int(start_pos[1]) - 1, ord(start_pos[0])\
          \ - ord('a')\\\\n    x_end, y_end = int(end_pos[1]) - 1, ord(end_pos[0])\
          \ - ord('a')\\\\n    dx, dy = abs(x_start - x_end), abs(y_start - y_end)\\\
          \\n    if dx == dy == 1 and board.state[x_end][y_end] is None:\\\\n    \
          \    return True\\n    return False\\n\\ndef is_valid_capture(piece, start_pos,\
          \ end_pos, board):\\\\n    x_start, y_start = int(start_pos[1]) - 1, ord(start_pos[0])\
          \ - ord('a')\\\\n    x_end, y_end = int(end_pos[1]) - 1, ord(end_pos[0])\
          \ - ord('a')\\\\n    dx, dy = abs(x_start - x_end), abs(y_start - y_end)\\\
          \\n    if dx == 2 and dy == 2:\\\\n        mid_x, mid_y = (x_start + x_end)\
          \ // 2, (y_start + y_end) // 2\\\\n        if board.state[mid_x][mid_y]\
          \ and board.state[mid_x][mid_y].color != piece.color and board.state[x_end][y_end]\
          \ is None:\\\\n            return True\\n    return False\n\"\"\"\n  }\n\
          }\n```"
