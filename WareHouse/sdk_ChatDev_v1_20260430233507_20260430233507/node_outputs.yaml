      - type: text
        text: "# Checkers (Draughts) Game\n\nThis is an 8x8 board game with alternating\
          \ turns between two players, using standard capture and kinging rules. Players\
          \ must input their moves in notation (e.g., `a2-a4`), and the game will\
          \ update the board state accordingly. The game correctly detects win or\
          \ draw states.\n\n## Introduction\n\nCheckers is a classic two-player strategy\
          \ board game. The game involves alternating turns, moving and capturing\
          \ opponent pieces, and promoting captured pieces to kings. The game ends\
          \ when one player has no valid moves left or all of the opponent's pieces\
          \ are removed from the board.\n\n## Main Functions\n\n1. **`init_python_env(python_version=\"\
          3.8\")`**: Initializes a Python environment with the specified Python version.\n\
          2. **`install_python_packages(packages, upgrade=False)`**: Installs Python\
          \ packages using `uv add`.\n3. **`uv_run(module, script=None, args=[], env={},\
          \ timeout_seconds=3600)`**: Executes a module or script inside the workspace\
          \ root.\n4. **`apply_text_edits(path, start_line, replacement, encoding=\"\
          auto\", end_line=None, ensure_trailing_newline=False, newline=\"preserve\"\
          )`**: Applies line edits with newline and encoding preservation.\n5. **`create_folder(path,\
          \ exist_ok=True, parents=True)`**: Creates a directory tree under the workspace.\n\
          6. **`describe_available_files(include_hidden=False, limit=0, recursive=False)`**:\
          \ Lists accessible files from the attachment store and the current code_workspace.\n\
          7. **`delete_path(path, missing_ok=True, path=None, recursive=False)`**:\
          \ Deletes a workspace file or directory.\n8. **`read_file_segment(path,\
          \ encoding=\"auto\", include_line_offsets=False, inline_line_numbers=False,\
          \ line_count=10, start_line=1)`**: Reads a line range plus metadata from\
          \ a workspace file.\n9. **`search_in_files(pattern, after_context=3, before_context=3,\
          \ case_sensitive=False, exclude_globs=[], globs=[], include_hidden=False,\
          \ max_results=0, pattern=\"\", use_regex=False)`**: Searches workspace files\
          \ and returns structured matches.\n10. **`save_file(path, content, encoding=\"\
          auto\", mode=\"overwrite\")`**: Persists data to a workspace file while\
          \ optionally registering it as an attachment.\n11. **`list_directory(path,\
          \ include_hidden=False, limit=0, max_depth=1, path=None, recursive=True)`**:\
          \ Lists contents of a workspace-relative directory.\n\n## Installation\n\
          \nTo install the environment dependencies and run the Checkers game, follow\
          \ these steps:\n\n### Step 1: Initialize Python Environment\n```json\n{\n\
          \  \"name\": \"init_python_env\",\n  \"arguments\": {\n    \"python_version\"\
          : \"3.8\"\n  }\n}\n```\n\n### Step 2: Install Required Python Packages\n\
          ```json\n{\n  \"name\": \"install_python_packages\",\n  \"arguments\": {\n\
          \    \"packages\": [\"checkers_game\"],\n    \"upgrade\": false\n  }\n}\n\
          ```\n\n## Usage\n\n1. **Start the Game**:\n   ```json\n   {\n     \"name\"\
          : \"uv_run\",\n     \"arguments\": {\n       \"module\": \"main\"\n    \
          \ }\n   }\n   ```\n\n2. **Move Pieces**:\n   Players are prompted to enter\
          \ their moves in notation (e.g., `a2-a4`). Ensure the move is valid according\
          \ to the rules.\n\n3. **Promoting Pieces**:\n   When a piece reaches the\
          \ opposite end of the board, it is automatically promoted to a king.\n\n\
          4. **Game Over**:\n   The game will prompt when there are no more valid\
          \ moves left or when all opponent pieces are removed from the board. It\
          \ will declare the winner or indicate a draw if applicable.\n\n## Example\
          \ Game Flow\n\n1. Player 1 makes a move: `a2-a4`\n   ```json\n   {\n   \
          \  \"name\": \"uv_run\",\n     \"arguments\": {\n       \"module\": \"main\"\
          \n     }\n   }\n   ```\n\n2. Player 2 makes a move: `b7-b5`\n   ```json\n\
          \   {\n     \"name\": \"uv_run\",\n     \"arguments\": {\n       \"module\"\
          : \"main\"\n     }\n   }\n   ```\n\n3. Continue making moves until the game\
          \ ends.\n\n## Conclusion\n\nThe Checkers game is designed for two players\
          \ and follows standard capture and kinging rules. The game provides a simple\
          \ user interface for playing the game, ensuring a fun and engaging experience."
