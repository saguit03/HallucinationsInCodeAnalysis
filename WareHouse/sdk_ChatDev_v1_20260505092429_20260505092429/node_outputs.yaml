          - `script` (string): The Python script to run. Either `module` or `script`\
          \ must be provided.\n- `env` (object): Environment variables to set during\
          \ execution.\n- `args` (array of strings): Command-line arguments for the\
          \ script/module.\n- `timeout_seconds` (string): Timeout duration in seconds.\n\
          \n### apply_text_edits\n**Purpose**: Applies text edits to a specified file\
          \ within the workspace.\n- `path` (string): Path to the file to be edited,\
          \ relative to the workspace root.\n- `start_line` (integer): 1-based line\
          \ number where editing should begin.\n- `replacement` (string): Text to\
          \ replace the selected range.\n- `newline` (string): Newline style.\n- `encoding`\
          \ (string): Text encoding or 'auto'.\n- `ensure_trailing_newline` (boolean):\
          \ Ensures the presence of a trailing newline.\n- `inline_line_numbers` (boolean):\
          \ Prefixes each snippet line with its line number.\n\n### create_folder\n\
          **Purpose**: Creates a directory tree within the workspace.\n- `path` (string):\
          \ Path to the directory to be created, relative to the workspace root.\n\
          - `exist_ok` (boolean): If true, does not raise an error if the folder already\
          \ exists.\n- `parents` (boolean): Creates missing parent directories.\n\n\
          ### read_file_segment\n**Purpose**: Reads a segment of a file within the\
          \ workspace.\n- `path` (string): Path to the file to be read, relative to\
          \ the workspace root.\n- `start_line` (integer): 1-based line number from\
          \ which reading should start.\n- `line_count` (integer): Number of lines\
          \ to read starting from `start_line`.\n- `include_line_offsets` (boolean):\
          \ Includes 1-based line offsets in the result.\n- `inline_line_numbers`\
          \ (boolean): Prefixes each snippet line with its line number inside the\
          \ snippet.\n- `encoding` (string): Text encoding or 'auto'.\n\n### search_in_files\n\
          **Purpose**: Searches for text patterns within files in the workspace.\n\
          - `pattern` (string): Pattern to search for, can be plain text or regex.\n\
          - `use_regex` (boolean): Treats pattern as a regular expression if true.\n\
          - `case_sensitive` (boolean): Performs case-sensitive matching if true.\n\
          - `before_context` (integer): Lines of context before the match to include\
          \ in results.\n- `after_context` (integer): Lines of context after the match\
          \ to include in results.\n- `globs` (array of strings): Globs patterns for\
          \ restricting search scope.\n- `exclude_globs` (array of strings): Globs\
          \ patterns for excluding from search.\n- `include_hidden` (boolean): Includes\
          \ hidden files and folders in search.\n- `max_results` (integer): Limits\
          \ the number of results returned.\n\n### save_file\n**Purpose**: Saves data\
          \ to a file within the workspace, optionally registering it as an attachment.\n\
          - `path` (string): Path to the file to be saved, relative to the workspace\
          \ root.\n- `content` (string): Data to write to the file.\n- `encoding`\
          \ (string): Text encoding or 'auto'.\n- `mode` (string): Either \"overwrite\"\
          \ to replace the existing content or \"append\" to add to it.\n\n### list_directory\n\
          **Purpose**: Lists contents of a directory within the workspace.\n- `path`\
          \ (string): Path to the directory to be listed, relative to the workspace\
          \ root.\n- `include_hidden` (boolean): Includes entries starting with '.'\
          \ in the result.\n- `limit` (integer): Maximum number of entries to return.\n\
          - `max_depth` (integer): Maximum depth when recursively listing subdirectories.\n\
          \n## How to Install Environment Dependencies\n\n1. **Initialize Python Environment**:\n\
          \   ```json\n   {\n     \"name\": \"init_python_env\",\n     \"arguments\"\
          : {\n       \"python_version\": \"3.9\"\n     }\n   }\n   ```\n\n2. **Install\
          \ Required Packages**:\n   ```json\n   {\n     \"name\": \"install_python_packages\"\
          ,\n     \"arguments\": {\n       \"packages\": [\n         \"numpy\",\n\
          \         \"pygame\"\n       ],\n       \"upgrade\": true\n     }\n   }\n\
          \   ```\n\n## How to Use/Play the Game\n\n1. **Navigate to the Checkers\
          \ Game Directory**:\n   ```json\n   {\n     \"name\": \"list_directory\"\
          ,\n     \"arguments\": {\n       \"path\": \"./checkers_game\"\n     }\n\
          \   }\n   ```\n\n2. **Install Required Packages for the Game**:\n   ```json\n\
          \   {\n     \"name\": \"install_python_packages\",\n     \"arguments\":\
          \ {\n       \"packages\": [\n         \"checkers-game-lib\"  // Replace\
          \ with actual package name if available\n       ],\n       \"upgrade\":\
          \ true\n     }\n   }\n   ```\n\n3. **Run the Checkers Game**:\n   ```json\n\
          \   {\n     \"name\": \"uv_run\",\n     \"arguments\": {\n       \"module\"\
          : \"main\"\n     }\n   }\n   ```\n\n4. **Play the Game**:\n   - The game\
          \ will prompt you to enter moves in notation (e.g., from-to positions).\n\
          \   - Example: `a1 b2` to move a piece from position 'a1' to 'b2'.\n   -\
          \ Follow on-screen instructions for capturing and kinging.\n\n5. **End the\
          \ Game**:\n   - The game will automatically detect win or draw states.\n\
          \   - Press any key to exit after the game ends.\n\nEnjoy your classic game\
