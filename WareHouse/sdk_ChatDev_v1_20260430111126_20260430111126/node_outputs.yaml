          name if it''s different and install or upgrade all necessary packages for
          running the game.\n\n## How to Play\n\n1. **Start the Game:**\n   To start
          a new game, run:\n   ```python\n   from checkers import play_game\n   play_game()\n   ```\n   This
          command will initialize a new Checkers game instance and prompt you to make
          moves.\n\n2. **Move Pieces:**\n   During your turn, you can move pieces
          by entering the starting and ending positions in algebraic notation (e.g.,
          \"a1-a3\"). If a capture is available, specify the capture as well.\n   \n   Example
          move for capturing:\n   ```\n   a1-c3\n   ```\n   This command moves the
          piece from `a1` to `c3`, capturing the piece at `b2`.\n\n3. **Kinging a
          Piece:**\n   When your piece reaches the opposite end of the board, it will
          be automatically crowned a king.\n\n4. **End Game and Results:**\n   The
          game will continue until all legal moves are exhausted or one player has
          no pieces left on the board. At the end of the game, the outcome (win or
