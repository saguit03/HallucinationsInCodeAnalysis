          \     return True\n    \n    # Capture move\n    if dx == 2 and dy == 2:\n\
          \        mid_piece = board[(start[0] + end[0]) // 2][(start[1] + end[1])\
          \ // 2]\n        return mid_piece.islower() != piece.islower() and is_valid_move(board,\
          \ start, (end[0], end[1]))\n    \n    return False\n\ndef make_move(board,\
          \ start, end):\n    \"\"\"Make a move from start to end on the board.\"\"\
          \"\n    if not is_valid_move(board, start, end):\n        raise ValueError(\"\
