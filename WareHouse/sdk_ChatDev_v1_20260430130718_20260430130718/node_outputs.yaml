          upgrade\": true\n     }\n   }\n   ```\n\n## How to Play\n\nTo play the game,\
          \ follow these steps:\n\n1. **Start a New Game**:\n   After installation,\
          \ you can start a new game by running the following command:\n   ```json\n\
          \   {\n     \"name\": \"uv_run\",\n     \"arguments\": {\n       \"module\"\
          : \"checkers\"\n     }\n   }\n   ```\n\n2. **Game Prompt**:\n   The game\
          \ will prompt you to enter your move in notation (e.g., `A1-B2`). Here's\
          \ how you can do it:\n\n   - Move a piece from square `A1` to square `B2`\
          \ by typing `A1-B2`.\n   - If capturing is available, specify the jump position.\
          \ For example, if there’s a piece at `C2` that can be captured and land\
          \ on `D3`, you would enter `A1-D3`.\n\n3. **Game Completion**:\n   The game\
          \ will automatically detect when all legal moves are enforced and correctly\
          \ determine win or draw states.\n\n## Game Rules\n\n- **Board Setup**: The\
          \ board is an 8x8 grid with alternating light and dark squares. Pieces start\
          \ in the rows nearest to each player.\n  \n- **Turns**: Players take turns\
          \ moving one piece at a time, starting from their home row.\n\n- **Capture**:\
          \ A jump over another player’s piece captures it. Jumps can be consecutive\
          \ (e.g., `A1-D3-F5`), and mandatory jumps are required if available.\n\n\
          - **Kings**: When a piece reaches the opponent's home row, it can be kinged\
          \ by moving diagonally. Kings move in any direction and can jump over other\
          \ pieces without being captured.\n\n- **Winning**: The game ends when one\
          \ player has no legal moves or all of the opponent’s pieces have been captured.\n\
          \n- **Draw**: If neither player can make a capture on their turn, the game\
          \ is a draw.\n\n---\n\nEnjoy playing Checkers with our software! If you\
          \ encounter any issues, please refer to the installation guide or seek support\
          \ from our support team."
      metadata:
        source: Chief Product Officer
