          \ = board[(start[0] + end[0]) // 2][(start[1] + end[1]) // 2]\n    \n  \
          \  board[start[0]][start[1]] = '.'\n    board[end[0]][end[1]] = piece\n\
          \    \n    # Remove captured piece\n    if mid_piece:\n        board[(start[0]\
