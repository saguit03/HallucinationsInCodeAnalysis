          \ // 2, (y1 + y2) // 2\n            self.board[mid_x][mid_y] = None\n  \
          \      self.board[x2][y2], self.board[x1][y1] = self.board[x1][y1], None\n\
          \n    def is_valid_move(self, start, end):\n        x1, y1 = start\n   \
          \     x2, y2 = end\n        piece = self.board[x1][y1]\n        if piece\
          \ is None:\n            return False\n        dx, dy = abs(x1 - x2), abs(y1\
          \ - y2)\n        if dx != 1 or dy != 1 and (dx != 2 or dy != 2):\n     \
