          ```python

          {"name": "save_file", "arguments": {"path": "src/checkers/controller.py",
          "content": "# -*- coding: utf-8 -*-\n\nfrom .board import Board\nfrom .state
          import BoardState\n\nclass GameController:\n    def __init__(self):\n        self.board_state
          = BoardState()\n        self.current_player = 1\n\n    def play_game(self):\n        #
          Main game loop\n        self.board_state.print_board()\n        while True:\n            move_input
          = input(f"Player {self.current_player}, enter your move (e.g., A2 B4): ").strip().upper()\n            if
          move_input == ''Q'':\n                break\n            try:\n                from_pos,
          to_pos = move_input.split()\n                self.validate_and_execute_move(from_pos,
          to_pos)\n            except Exception as e:\n                print(f"Invalid
          move: {e}")\n            else:\n                if self.check_winner():\n                    print(f"Player
          {self.current_player} wins!\n")\n                    break\n                self.current_player
          *= -1\n\n    def validate_and_execute_move(self, from_pos, to_pos):\n        #
          Validate and execute a move\n        from_row = int(from_pos[1]) - 1\n        from_col
          = ord(from_pos[0]) - 65\n        to_row = int(to_pos[1]) - 1\n        to_col
          = ord(to_pos[0]) - 65\n        if (from_row, from_col) not in [(r, c) for
          r, row in enumerate(self.board_state.board) for c, cell in enumerate(row)
          if cell != 0] or (to_row, to_col) in [(r, c) for r, row in enumerate(self.board_state.board)
          for c, cell in enumerate(row) if cell != 0]:\n            raise ValueError("Invalid
          move positions")\n        piece = self.board_state.get_piece((from_row,
          from_col))\n        if not piece or piece.player != self.current_player:\n            raise
