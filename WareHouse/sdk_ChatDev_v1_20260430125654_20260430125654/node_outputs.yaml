          \ Persists data to a workspace file while optionally registering it as an\
          \ attachment.\\n11. **list_directory**: Lists contents of a workspace-relative\
          \ directory.\\n\\n## Installation\\n### Initialize Python Environment\\\
          nBefore installing any dependencies, initialize the Python environment:\\\
          n```json\\n{\\n  \\\"name\\\": \\\"init_python_env\\\",\\n  \\\"arguments\\\
          \": {\\n    \\\"python_version\\\": \\\"3.8\\\"\\n  }\\n}\\n```\\n\\n###\
          \ Install Dependencies\\nInstall the required Python packages using the\
          \ following command:\\n```json\\n{\\n  \\\"name\\\": \\\"install_python_packages\\\
          \",\\n  \\\"arguments\\\": {\\n    \\\"packages\\\": [\\\"checkers\\\"],\\\
          n    \\\"upgrade\\\": true\\n  }\\n}\\n```\\nEnsure that all dependencies\
