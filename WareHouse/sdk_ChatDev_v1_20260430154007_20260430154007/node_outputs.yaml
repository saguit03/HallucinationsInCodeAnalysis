          \ is possible, the player must make it.\n- **Kinging**: When a piece reaches\
          \ the opponent's side of the board, it can be kinged by selecting that piece\
          \ with the next available move.\n\n### Win or Draw States\n\nThe game will\
          \ automatically detect and declare:\n\n- **Win**: A player has no legal\
          \ moves remaining.\n- **Draw**: Both players have no legal moves remaining,\
          \ or a predetermined number of turns without any captures.\n\n## Example\
          \ Game Play\n\n```\nStarting Checkers (Draughts) game...\nCurrent board\
          \ state:\n  A B C D E F G H\n8 . . B . B . B\n7 . B . B . B .\n6 W . W .\
          \ W . W\n5 . W . W . W .\n4 . . . . . . .\n3 w . w . w . w\n2 . w . w .\
          \ w .\n1 b . b . b . b\n\nPlayer's turn (Black):\nEnter move: A1-C3\nInvalid\
          \ move. Please enter a legal move.\n\nPlayer's turn (Black):\nEnter move:\
          \ B4-A5\nCurrent board state:\n  A B C D E F G H\n8 . . B . B . B\n7 . B\
          \ . B . B .\n6 W . W . W . W\n5 . W . . . . . .\n4 . . . . . . .\n3 w .\
          \ w . w . w\n2 . w . w . w .\n1 b . . . . b .\n\nPlayer's turn (White):\n\
          Enter move: D1-F3\n...\n```\n\n## Conclusion\n\nThank you for using the\
          \ Checkers (Draughts) game developed by ChatDev. We hope you enjoy playing!\
          \ If you encounter any issues or have suggestions for improvements, please\
          \ feel free to contact our support team.\n\nHappy gaming!"
