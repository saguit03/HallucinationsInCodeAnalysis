          start_col] = 0\n            if abs(end_row - start_row) == 2:\n                mid_row,
          mid_col = (start_row + end_row) // 2, (start_col + end_col) // 2\n                self.board[mid_row,
          mid_col] = 0\n            if self.check_king(end_row, end_col):\n                self.board[end_row,
          end_col] *= -1\n\n    def check_game_over(self):\n        black_pieces =
          np.sum(np.where(self.board == -1, 1, 0))\n        white_pieces = np.sum(np.where(self.board
          == 1, 1, 0))\n        if black_pieces == 0 or white_pieces == 0:\n            return
          True\n        return False\n\n    def check_king(self, row, col):\n        if
          row in [0, 7] and self.board[row, col] != 0:\n            return True\n        return
          False\n\n    def is_empty(self, row, col):\n        return self.board[row,
          col] == 0\n\n    def switch_player(self):\n        self.current_player =
          -self.current_player\n\nif __name__ == ''__main__'':\n    game = Checkers()\n    game.initialize_board()\n    while
          not game.check_game_over():\n        game.print_board()\n        start_pos
          = input(f''Player {game.current_player}, enter your move (e.g., a1-b2):
          '')\n        end_pos = input(''Enter destination position: '')\n        if
          game.is_valid_move(start_pos, end_pos):\n            game.make_move(start_pos,
          end_pos)\n            game.switch_player()\n        else:\n            print(''Invalid
          move. Try again.'')\n", "encoding": "utf-8"}}

          ```


          Let''s save the changes and run our game.


          ```json

          {"name": "uv_run", "arguments": {"module": "checkers_game.checkers"}}

          ```


          If everything is implemented correctly, you should see the board printed
          and be able to play a game of Checkers. If there are any errors or issues,
          please let me know and I can assist further.'
      metadata:
        source: Programmer Code Complete
