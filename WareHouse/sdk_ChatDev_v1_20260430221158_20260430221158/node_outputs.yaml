          \ + dx // 2, int(from_pos[1]) + dy // 2)\n            self.board[capture_position[0]][capture_position[1]]\
          \ = EMPTY\n            new_position = (int(from_pos[0]) + dx, int(from_pos[1])\
          \ + dy)\n            piece.captures += 1\n            if piece.type == 'normal'\
          \ and capture_position[0] in [0, 7]:\n                piece.promote()\n\
          \            self.board[new_position[0]][new_position[1]] = piece\n    \n\
