          \ + Style.RESET_ALL,\n            Piece(BLACK, 0, 'normal'): Fore.MAGENTA\
          \ + 'B' + Style.RESET_ALL,\n            Piece(BLACK, 0, 'king'): Fore.MAGENTA\
          \ + 'BK' + Style.RESET_ALL\n        }\n        for row in range(8):\n  \
          \          print(' '.join(pieces.get(piece, ' ') for piece in self.board[row]))\n\
          ```\n\n#### Piece Class\n\n```python\nEMPTY = None\n\nclass Piece:\n   \
          \ def __init__(self, row, col, color, type='normal'):\n        self.row\
          \ = row\n        self.col = col\n        self.color = color\n        self.type\
