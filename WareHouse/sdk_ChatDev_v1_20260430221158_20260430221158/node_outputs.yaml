          \ to_pos, self.player_turn)\n    \n    def is_game_over(self):\n       \
          \ return self.check_win_condition() or not self.board.has_valid_moves(self.player_turn)\n\
          \    \n    def check_win_condition(self):\n        if self.board.king_exists('black'):\n\
          \            return 'white'\n        elif self.board.king_exists('white'):\n\
          \            return 'black'\n        elif not self.board.has_valid_moves(self.player_turn):\n\
          \            return 'draw'\n        return None\n    \n    def print_board(self):\n\
          \        self.board.print_board()\n```\n\n#### Board Class\n\n```python\n\
          from piece import Piece, WHITE, BLACK, EMPTY\n\nclass Board:\n    def __init__(self):\n\
          \        self.board = [[EMPTY for _ in range(8)] for _ in range(8)]\n  \
