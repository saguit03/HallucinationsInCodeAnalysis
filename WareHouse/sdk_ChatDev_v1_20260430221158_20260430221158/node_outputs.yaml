          \                piece = self.get_piece((str(row), str(col)))\n        \
          \        if piece and piece.color == color and piece.type == 'king':\n \
          \                   return True\n        return False\n    \n    def print_board(self):\n\
          \        from colorama import Fore, Style\n        pieces = {\n        \
          \    EMPTY: ' ',\n            Piece(WHITE, 0, 'normal'): Fore.CYAN + 'W'\
