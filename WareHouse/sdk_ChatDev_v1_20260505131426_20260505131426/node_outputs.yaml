      - type: text
        text: '# Checkers (Draughts) Game Manual


          Welcome to our Checkers (Draughts) game! This manual will guide you through
          setting up your development environment and playing a game of Checkers.


          ## Table of Contents


          1. [Introduction](#introduction)

          2. [Prerequisites](#prerequisites)

          3. [Installing Dependencies](#installing-dependencies)

          4. [Running the Game](#running-the-game)

          5. [Game Rules and Movements](#game-rules-and-movements)

          6. [Exiting the Game](#exiting-the-game)


          ## Introduction


          Checkers (Draughts) is a two-player strategy board game played on an 8x8
          checkerboard with 12 pieces each. Players take turns moving their pieces
          diagonally and can capture the opponent''s pieces by jumping over them.


          ## Prerequisites


          To play the Checkers game, ensure you have Python installed on your system.
          Additionally, the following packages need to be installed:


          - `numpy`


          ## Installing Dependencies


          To set up the environment for running the Checkers game, execute the following
          commands in your terminal:


          ```bash

          # Initialize a Python virtual environment

          uv lock && uv venv --python-version 3.x


          # Install necessary packages

          uv add numpy

          ```


          Make sure to replace `3.x` with your preferred Python version.


          ## Running the Game


          Once the dependencies are installed, you can start the game by executing:


          ```bash

          uv run -m checkers_game

          ```


          This command will initiate the Checkers game in your terminal. You will
          be prompted to enter moves in the notation (e.g., from-to positions). Each
          move must follow standard capture and kinging rules.


          ## Game Rules and Movements


          ### Basic Moves


          Players can move their pieces diagonally forward one square. For example,
          a piece on position A1 can move to B2 if it''s an empty space.


          ### Capturing Pieces


          If there is an opponent''s piece diagonally ahead and the next diagonal
          square is empty, the player can capture the opponent''s piece by jumping
          over it. For example, if you are on A1 and there is an opponent''s piece
          on B2, you can jump to C3 by capturing the piece on B2.


          ### Kinging


          When a piece reaches the opposite side of the board, it becomes a king.
          Kings can move diagonally in any direction (forward and backward). Capturing
          pieces with kings works similarly to regular pieces but can capture multiple
          pieces in a single move.


          ## Exiting the Game


          To exit the game at any time, simply type `exit` or press `Ctrl+C` to interrupt
          the game loop.


          Thank you for using our Checkers (Draughts) game! Enjoy the game and happy
          coding!'
