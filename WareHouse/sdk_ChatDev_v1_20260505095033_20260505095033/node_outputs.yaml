          \ to_row > from_row:\\\\n                return False\\\\n\\\\n        return\
          \ True\\\\n\\\\n    def check_win(self):\\\\n        # Check for win\\\\\
          n        black_count = len(self.pieces['B'])\\\\n        red_count = len(self.pieces['R'])\\\
          \\n\\\\n        if black_count == 0:\\\\n            self.winner = 'Red'\\\
          \\n            return True\\\\n        elif red_count == 0:\\\\n       \
          \     self.winner = 'Black'\\\\n            return True\\\\n\\\\n      \
          \  return False\\\\n\\\\n    def get_winner(self):\\\\n        return self.winner\\\
          \\n\\\\n    def __str__(self):\\\\n        return '\\\\n'.join([' '.join(row)\
