      - type: text
        text: "# Checkers (Draughts) Game User Manual\n\n## Introduction\n\nWelcome\
          \ to the Checkers (Draughts) game! This manual will guide you through installing\
          \ the required dependencies and playing the game. The game is designed for\
          \ two players who take turns making moves on an 8x8 board, adhering to standard\
          \ capture and kinging rules.\n\n## Installation\n\nBefore you can start\
          \ playing, you need to set up your environment by creating a Python virtual\
          \ environment and installing necessary packages. Follow these steps:\n\n\
          1. **Initialize the Python Environment**:\n   ```json\n   {\n     \"name\"\
          : \"init_python_env\",\n     \"arguments\": {\n       \"python_version\"\
          : \"3.8\"\n     }\n   }\n   ```\n\n2. **Install Python Packages**:\n   ```json\n\
          \   {\n     \"name\": \"install_python_packages\",\n     \"arguments\":\
          \ {\n       \"packages\": [\"checkers_game\"]\n     }\n   }\n   ```\n\n\
          ## How to Play\n\n1. **Launch the Game**:\n   Once your environment is set\
          \ up, you can start playing by running the following command:\n   ```sh\n\
          \   uv run game --module checkers_game.game_loop\n   ```\n\n2. **Move Notation**:\n\
          \   When prompted, enter moves in algebraic notation (e.g., \"e2-e4\").\
          \ To capture a piece, move your piece to the square where the opponent's\
          \ piece is captured.\n\n3. **Kings**:\n   If you advance one of your pieces\
          \ to the opposing side's row, it will be kinged automatically. Kinged pieces\
          \ can move both forward and backward along their diagonals.\n\n4. **Game\
          \ Completion**:\n   The game ends when one player has no more legal moves\
          \ or all of their opponent’s pieces have been captured. The remaining player\
          \ wins, or the game is a draw if both players have no legal moves.\n\n##\
          \ Example Game Flow\n\n1. **Player 1 Move**: `e2-e4`\n   ```json\n   {\n\
          \     \"name\": \"uv_run\",\n     \"arguments\": {\n       \"module\": \"\
          checkers_game\",\n       \"script\": \"game_loop.py\",\n       \"args\"\
          : [\"e2-e4\"]\n     }\n   }\n   ```\n\n2. **Player 2 Move**: `d7-d5`\n \
          \  ```json\n   {\n     \"name\": \"uv_run\",\n     \"arguments\": {\n  \
          \     \"module\": \"checkers_game\",\n       \"script\": \"game_loop.py\"\
          ,\n       \"args\": [\"d7-d5\"]\n     }\n   }\n   ```\n\n3. **Continue Playing**:\n\
          \   Repeat the above steps, entering moves in algebraic notation until the\
          \ game ends.\n\n## Additional Features\n\n- **Help**: If you need assistance,\
          \ use the `--help` flag when launching the game.\n  ```sh\n  uv run game\
          \ --module checkers_game.game_loop --help\n  ```\n\nEnjoy your game of Checkers\
          \ (Draughts)! Happy playing!"
      metadata:
        source: Chief Product Officer
