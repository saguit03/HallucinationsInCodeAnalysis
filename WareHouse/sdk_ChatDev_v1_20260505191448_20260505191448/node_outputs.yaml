          \ = board[x1][y1]\n    board[x1][y1] = '.'\n    \n    # Handle capture\n\
          \    if abs(x2 - x1) == 2 and abs(y2 - y1) == 2:\n        board[(x1 + x2)\
          \ // 2][(y1 + y2) // 2] = '.'\n\n# Call the function to save the move validation\
          \ and execution functions\n{\"name\": \"save_file\", \"arguments\": {\"\
          path\": \"checkers_game.py\", \"content\": print_board.__repr__() + \"\\\
          nis_valid_move.__repr__() + \\nexecute_move.__repr__()\", \"encoding\":\
          \ \"utf-8\"}}\n```\n\n### Step 3: Implement the Game Loop\n\nWe need a loop\
          \ to handle turns and input from players.\n\n```python\ndef get_move():\n\
          \    move = input(\"Enter your move (e.g., e2-e4): \")\n    return tuple(map(int,\
          \ move.split('-')))\n\ndef main():\n    board = initialize_board()\n   \
          \ current_player = 'B'\n    \n    while True:\n        print_board(board)\n\
          \        start_pos = get_move()\n        end_pos = get_move()\n        \n\
          \        if is_valid_move(board, start_pos, end_pos):\n            execute_move(board,\
          \ start_pos, end_pos)\n        else:\n            print(\"Invalid move.\
          \ Please try again.\")\n            continue\n        \n        # Switch\
          \ players\n        current_player = 'W' if current_player == 'B' else 'B'\n\
