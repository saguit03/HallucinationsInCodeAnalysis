          \ moves, execute them, and handle captures.\n\n```python\ndef print_board(board):\n\
          \    for row in board:\n        print(' '.join(row))\n    print()\n\ndef\
          \ is_valid_move(board, start_pos, end_pos):\n    x1, y1 = start_pos\n  \
          \  x2, y2 = end_pos\n    dx, dy = x2 - x1, y2 - y1\n    \n    # Basic move\
          \ validation\n    if abs(dx) not in [0, 1] or abs(dy) not in [0, 1]:\n \
          \       return False\n    if board[x1][y1] == '.' or board[x2][y2] != '.':\n\
          \        return False\n    \n    # Diagonal movement for capture\n    if\
