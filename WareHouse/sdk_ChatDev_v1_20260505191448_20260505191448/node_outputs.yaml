          \        if board[i][j] in ['B', 'W']:\n                if any(is_valid_move(board,\
          \ (i, j), (x, y)) for x, y in [(i-1, j-1), (i+1, j-1), (i-1, j+1), (i+1,\
          \ j+1)]):\n                    return None\n    \n    # Draw\n    if black_pieces\
          \ + white_pieces <= 4:\n        return 'Draw'\n    \n    return None\n\n\
          def main():\n    board = initialize_board()\n    current_player = 'B'\n\
          \    \n    while True:\n        print_board(board)\n        start_pos =\
          \ get_move()\n        end_pos = get_move()\n        \n        if is_valid_move(board,\
