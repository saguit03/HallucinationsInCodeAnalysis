          \ to save the game loop\n{\"name\": \"save_file\", \"arguments\": {\"path\"\
          : \"checkers_game.py\", \"content\": \"def get_move():\\n    move = input(\\\
          \"Enter your move (e.g., e2-e4): \\\")\\n    return tuple(map(int, move.split('-')))\\\
          n\\nmain()\\n\\nif __name__ == \\\"__main__\\\":\\n    main()\", \"encoding\"\
          : \"utf-8\"}}\n```\n\n### Step 4: Detect Win or Draw Conditions\n\nWe need\
          \ to add logic to detect when a player has no valid moves left or the board\
          \ is full.\n\n```python\ndef check_winner(board):\n    black_pieces = sum(row.count('B')\
          \ for row in board)\n    white_pieces = sum(row.count('W') for row in board)\n\
          \    \n    if black_pieces == 0:\n        return 'White wins'\n    elif\
