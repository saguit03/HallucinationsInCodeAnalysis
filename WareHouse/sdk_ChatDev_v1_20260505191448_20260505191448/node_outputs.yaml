          \   while not self.board.is_game_over():\\n            self.board.display()\\\
          n            move = self.players[self.current_player_index].get_move()\\\
          n            start, end = map(lambda x: (int(x[1]) - 1, ord(x[0]) - 97),\
          \ move.split())\\n            self.board.move((start, end))\\n         \
          \   self.current_player_index = 1 - self.current_player_index\"}}\n```"
      metadata:
        source: Programmer Coding
