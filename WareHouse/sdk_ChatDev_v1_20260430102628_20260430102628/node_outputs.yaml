          \            print(' '.join(row))\n\n    def move_piece(self, from_pos,\
          \ to_pos):\n        from_x, from_y = map(int, from_pos.split('-'))\n   \
          \     to_x, to_y = map(int, to_pos.split('-'))\n\n        if self.board[from_x][from_y]\
          \ == ' ' or self.board[to_x][to_y] != ' ':\n            print(\"Invalid\
          \ move\")\n            return\n\n        self.board[from_x][from_y], self.board[to_x][to_y]\
          \ = self.board[to_x][to_y], self.board[from_x][from_y]\n\n    def check_winner(self):\n\
          \        # Placeholder for winner checking logic\n        pass\n\nif __name__\
