          \ game.print_board()\n        from_pos = input(f\"Player {game.current_player},\
          \ enter move (e.g., 2-4): \")\n        to_pos = input(f\"Player {game.current_player},\
          \ enter move (e.g., 3-6): \")\n        game.move_piece(from_pos, to_pos)\n\
          \    \"\"\"\n}}\n```\n\n### Step 4: Save the Modified Code\n\nFinally, let's\
