          \"\\n     }\\n   }\\n   ````\\n\\n## Playing the Game\\nOnce the game is\
          \ running, you will be prompted to enter moves in the format `from-to`,\
          \ where `from` and `to` are positions on the board (e.g., `a2-a4`). Here\
