          \ notation for the board squares.\\n   - For example, `a1` represents the\
          \ top-left square.\\n\\n2. **Capture Rules:**\\n   - When a piece jumps\
          \ over an opponent's piece and lands on an empty square diagonally adjacent\
          \ to the opponent's piece, it captures the opponent's piece.\\n   - You\
          \ can continue capturing as long as you jump over another opponent's piece\
          \ in sequence.\\n\\n3. **Kings:**\\n   - A piece becomes a king when it\
          \ reaches the opposite end of the board. Kings can move both forward and\
          \ backward diagonally.\\n   - To signify that you want to promote your piece,\
          \ simply place it on the desired square.\\n\\n4. **Win or Draw Conditions:**\\\
          n   - The game ends when one player has no pieces left.\\n   - The game\
          \ is also a draw if all legal moves are exhausted without a winner.\\n\\\
          n## Example Game Session\\n```\\nWelcome to Checkers (Draughts)!\\n\\nCurrent\
