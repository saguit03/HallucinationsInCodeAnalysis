          \ . W . W . _\\n1 . _ . _ . _ .\\n\\nYour turn, White. Enter move (from-to):\
          \ a2-a4\\n```\\n\\n## Conclusion\\nThat's it! You're now ready to play Checkers\
          \ (Draughts) using our software. Enjoy your game and have fun!\\n\\nIf you\
