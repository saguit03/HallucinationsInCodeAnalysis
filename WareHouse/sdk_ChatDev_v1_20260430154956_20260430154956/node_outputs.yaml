          \ (e.g., a1-b2): \")\n        move = Move.from_notation(move_notation)\n\
          \        \n        if board.is_valid_move(move, current_player):\n     \
          \       board.make_move(move)\n            board.current_player = 'B' if\
          \ board.current_player == 'W' else 'W'\n        else:\n            print(\"\
          Invalid move. Try again.\")\n\nif __name__ == \"__main__\":\n    run()\n\
          ```\n\n### Step 5: Save the Files\n\n```json\n{\n  \"name\": \"save_file\"\
          ,\n  \"arguments\": {\n    \"path\": \"checkers_board.py\",\n    \"content\"\
