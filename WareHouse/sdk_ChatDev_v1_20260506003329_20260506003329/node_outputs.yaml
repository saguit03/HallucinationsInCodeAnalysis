          \       [None, None, None, None, None, None, None, None],\\n        ['R',\
          \ None, 'R', None, 'R', None, 'R', None],\\n        [None, 'R', None, 'R',\
          \ None, 'R', None, 'R'],\\n        ['R', None, 'R', None, 'R', None, 'R',\
