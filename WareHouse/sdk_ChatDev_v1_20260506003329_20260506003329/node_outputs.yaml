          n    print()\\n\\ndef prompt_move():\\n    move = input('Enter your move\
          \ (from-to): ').strip().upper()\\n    return move\\n\\ndef is_valid_move(board,\
          \ from_pos, to_pos):\\n    if not (0 <= from_pos[0] < 8 and 0 <= from_pos[1]\
