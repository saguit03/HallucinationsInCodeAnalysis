          n        self.position = position\\n        self.king = False\\n\\n    def\
          \ move(self, new_position):\\n        self.position = new_position\\nclass\
          \ Board:\\n    def __init__(self):\\n        self.squares = [[None] * 8\
          \ for _ in range(8)]\\n        self.init_board()\\n\\n    def init_board(self):\\\
          n        # Place pieces on the board\\n        colors = ['B', 'W']\\n  \
          \      positions = [(i, j) if (i + j) % 2 == 1 else None for i in range(8)\
          \ for j in range(8)]\\n        piece_positions = zip(colors * 4, positions)\\\
          n        for color, position in piece_positions:\\n            if position\
          \ is not None:\\n                self.squares[position[0]][position[1]]\
          \ = Piece(color, position)\\n\\n    def print_board(self):\\n        for\
          \ row in self.squares:\\n            for square in row:\\n             \
          \   if square:\\n                    print(square.color, end=\\\" \\\")\\\
          n                else:\\n                    print(\\'.\\', end=\\\" \\\"\
          )\\n            print()\\n\\n    def is_valid_move(self, start, end):\\\
          n        piece = self.squares[start[0]][start[1]]\\n        if not piece\
          \ or piece.color != \\'W\\' and piece.color != \\'B\\':\\n            return\
          \ False\\n\\n        # Basic movement logic (can be expanded for full capture\
          \ rules)\\n        row_diff = abs(start[0] - end[0])\\n        col_diff\
          \ = abs(start[1] - end[1])\\n\\n        if (row_diff == 1 and col_diff ==\
          \ 1) or (row_diff == 2 and col_diff == 2):\\n            return True\\n\
          \        return False\\nclass CheckersGame:\\n    def __init__(self):\\\
          n        self.board = Board()\\n        self.current_player = \\'W\\'\\\
          n\\n    def take_turn(self):\\n        self.board.print_board()\\n     \
          \   start, end = input(f\\\"Player {self.current_player}, enter move (start-end):\
          \ \\\").split(\\'-\\')\\n        start = tuple(map(int, start.split(\\',\\\
          ')))\\n        end = tuple(map(int, end.split(\\',\\')))\\n\\n        if\
          \ self.board.is_valid_move(start, end):\\n            piece = self.board.squares[start[0]][start[1]]\\\
          n            piece.move(end)\\n            # Update game state (e.g., capture\
          \ logic)\\n            self.current_player = \\'B\\' if self.current_player\
          \ == \\'W\\' else \\'W\\'\\n        else:\\n            print(\\\"Invalid\
          \ move. Please try again.\\\")\\ndef run():\\n    game = CheckersGame()\\\
          n    while True:\\n        game.take_turn()\\n\\nif __name__ == \\\"__main__\\\
          \":\\n    run()\"\n  }\n}\n```"
      metadata:
        source: Programmer Coding
