          checkers_game\"] } }\\n   ```\\n## How to Play\\n1. **Starting the Game**\\\
          n   Start by running the game using the following command:\\n   ```bash\\\
          n   python -m checkers_game\\n   ```\\n2. **Game Loop**\\n   The game will\
          \ prompt for player moves in algebraic notation (e.g., e7-e5). Players take\
          \ turns until a win or draw is detected.\\n3. **Capture Rules**\\n   To\
          \ capture an opponent's piece, move diagonally to the opposite piece and\
          \ remove it from the board. Capture continues if more captures are possible\
          \ from the new position.\\n4. **Kinging**\\n   When a piece reaches the\
          \ opposite end of the board, it is crowned as a king. Kings can move forward\
          \ or backward diagonally, capturing multiple pieces in one turn.\\n5. **Winning\
          \ and Losing**\\n   - A player wins by removing all of their opponent's\
          \ pieces from the board.\\n   - The game is declared a draw if both players\
          \ are unable to make a legal move.\\n## Troubleshooting\\nIf you encounter\
          \ any issues during gameplay, please refer to the error messages or check\
          \ that all dependencies have been correctly installed.\"\n  },\n  \"mode\"\
          : \"overwrite\"\n}\n```"
