          n   - [Move Notation](#move-notation)\\n   - [Capture Rules](#capture-rules)\\\
          n   - [Kinging Rules](#kinging-rules)\\n5. [Win or Draw Conditions](#win-or-draw-conditions)\\\
          n\\n## Introduction\\n\\nThe Checkers (Draughts) game is a classic two-player\
          \ strategy game played on an 8x8 board. The objective of the game is to\
          \ capture all of your opponent's pieces, promote a piece to a king, or force\
          \ your opponent into a stalemate.\\n\\n## Installation\\n\\nTo set up and\
          \ play the Checkers (Draughts) game, follow these steps:\\n\\n1. **Initialize\
          \ Python Environment**:\\n   ```json\\n   {\\n     \\\"name\\\": \\\"init_python_env\\\
          \",\\n     \\\"arguments\\\": {\\n       \\\"python_version\\\": \\\"3.8\\\
          \"\\n     }\\n   }\\n   ````\\n\\n2. **Install Required Packages**:\\n \
          \  ```json\\n   {\\n     \\\"name\\\": \\\"install_python_packages\\\",\\\
          n     \\\"arguments\\\": {\\n       \\\"packages\\\": [\\\"checkers_game\\\
          \"],\\n       \\\"upgrade\\\": true\\n     }\\n   }\\n   ```\\n\\n## How\
          \ to Play\\n\\n1. **Starting the Game**:\\n   - Run the game using:\\n \
          \    ```json\\n     {\\n       \\\"name\\\": \\\"uv_run\\\",\\n       \\\
          \"arguments\\\": {\\n         \\\"module\\\": \\\"checkers\\\"\\n      \
          \ }\\n     }\\n     ```\\n   - This will start a new game, and you will\
          \ be prompted to make moves.\\n\\n2. **Making Moves**:\\n   - You are required\
          \ to enter moves in notation (e.g., `from-to positions`).\\n   - For example,\
          \ moving from square A1 to B3 would be entered as `A1-B3`.\\n\\n## Game\
          \ Mechanics\\n\\n### Move Notation\\n\\n- Moves should be entered using\
          \ the algebraic chess notation.\\n  - Example: `A1-A2` moves a piece from\
          \ column A, row 1 to column A, row 2.\\n\\n### Capture Rules\\n\\n- When\
          \ making a move, if you capture one of your opponent's pieces, you must\
          \ immediately continue capturing until no more captures are possible.\\\
          n- Captures are indicated by specifying the destination square as `x` followed\
          \ by the square you want to capture. For example:\\n  - Move: `A1-A3 x B2`\\\
          n  - This moves from A1 to A3 and simultaneously captures the piece on B2.\\\
          n\\n### Kinging Rules\\n\\n- When a piece reaches the opposite end of the\
          \ board, it can be kinged.\\n- To indicate that you want to king a piece,\
          \ use the keyword `KING` in your move notation:\\n  - Example: `A1-A8 KING`\\\
          n\\n## Win or Draw Conditions\\n\\nThe game ends when:\\n\\n- One player\
          \ captures all of their opponent's pieces (Checkmate).\\n- The opponent\
