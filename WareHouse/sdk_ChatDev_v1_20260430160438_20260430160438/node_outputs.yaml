          \ \n  - `packages`: Array of package names to install.\n  - `upgrade`: Boolean\
          \ indicating whether to upgrade existing packages.\n\n```json\n{\"name\"\
          : \"install_python_packages\", \"arguments\": {\"packages\": [\"numpy\"\
          ], \"upgrade\": true}}\n```\n\n### uv_run\nExecute a Python script inside\
          \ the workspace root.\n- **Arguments**: \n  - `script`: String indicating\
          \ the name of the script to run.\n\n```json\n{\"name\": \"uv_run\", \"arguments\"\
          : {\"script\": \"checkers.py\"}}\n```\n\n## Installation and Setup\n\n1.\
          \ **Initialize Python Environment**:\n   Install a Python environment with\
