          \ to_pos):\\\\n        x1, y1 = from_pos\\\\n        x2, y2 = to_pos\\\\\
          n        piece = self.board[x1][y1]\\\\n        if piece and piece.owner\
          \ == self.turn:\\\\n            dx, dy = abs(x2 - x1), abs(y2 - y1)\\\\\
          n            if dx == 1 and dy == 1:\\\\n                if (x1, y1) in\
