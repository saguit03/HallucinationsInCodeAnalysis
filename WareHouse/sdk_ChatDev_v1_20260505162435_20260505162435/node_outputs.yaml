          n        moves = get_legal_moves(board, current_player)\\n        if not\
          \ moves:\\n            print(f'Player {current_player} has no legal moves.\
          \ Game over!')\\n            break\\n        start_pos = input(f'Player\
          \ {current_player}, enter your move (from-to): ').split('-')\\n        start_pos\
