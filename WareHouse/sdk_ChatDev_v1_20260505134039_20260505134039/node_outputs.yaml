          \              if board[r][c] == ('w' if player == 'white' else 'b'):\n\
          \                    moves.append((row, col, r, c))\n    return moves\n\n\
          def make_move(board, start_row, start_col, end_row, end_col):\n    piece\
          \ = board[start_row][start_col]\n    board[end_row][end_col] = piece\n \
          \   board[start_row][start_col] = '.'\n    if abs(start_row - end_row) ==\
          \ 2:\n        mid_row, mid_col = (start_row + end_row) // 2, (start_col\
          \ + end_col) // 2\n        board[mid_row][mid_col] = '.'\n\ndef is_game_over(board):\n\
          \    black_moves = get_valid_moves(board, 'black')\n    white_moves = get_valid_moves(board,\
          \ 'white')\n    return not black_moves and not white_moves\n\ndef main():\n\
          \    board = initialize_board()\n    player = 'black'\n    while True:\n\
          \        print_board(board)\n        if is_game_over(board):\n         \
          \   print(\"Game Over! \" + ('Black wins' if player == 'black' else 'White\
          \ wins'))\n            break\n        start_col, start_row, end_col, end_row\
          \ = map(int, input(f\"Player {player}, enter move (from-to positions): \"\
