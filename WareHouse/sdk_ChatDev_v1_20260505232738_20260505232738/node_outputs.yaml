  results:
  - type: message
    payload:
      role: assistant
      content:
      - type: text
        text: "Let's begin by creating the necessary classes and implementing their\
          \ methods step-by-step.\n\n### Step 1: Define the Board Class\n\nFirst,\
          \ we need a class to represent the Checkers board. We will use an 8x8 grid\
          \ and keep track of pieces' positions and types (normal or king).\n\n```python\n\
          from typing import List, Tuple\n\nclass PieceType:\n    EMPTY = 0\n    RED\
          \ = 1\n    BLACK = 2\n    RED_KING = 3\n    BLACK_KING = 4\n\nclass Board:\n\
          \    def __init__(self):\n        self.board: List[List[int]] = [\n    \
          \        [PieceType.EMPTY if (i + j) % 2 == 0 else PieceType.RED for j in\
          \ range(8)] for i in range(8)\n        ]\n        self.setup_board()\n\n\
          \    def setup_board(self):\n        # Place black pieces\n        for row\
          \ in range(3):\n            for col in range((row + 1) % 2, 8, 2):\n   \
          \             self.board[row][col] = PieceType.BLACK\n\n        # Place\
          \ red pieces\n        for row in range(5, 8):\n            for col in range(row\
          \ % 2, 8, 2):\n                self.board[row][col] = PieceType.RED\n\n\
          \    def print_board(self):\n        for row in self.board:\n          \
          \  print(\" \".join(str(piece) if piece != PieceType.EMPTY else \".\" for\
          \ piece in row))\n        print()\n\n    def get_piece_type(self, row: int,\
          \ col: int) -> int:\n        return self.board[row][col]\n\n    def move_piece(self,\
          \ from_row: int, from_col: int, to_row: int, to_col: int):\n        # Move\
          \ piece\n        self.board[to_row][to_col] = self.board[from_row][from_col]\n\
          \        self.board[from_row][from_col] = PieceType.EMPTY\n\n        # Check\
          \ for capture and promote\n        if (self.board[to_row][to_col] == PieceType.RED\
          \ and to_row == 0) or \\\n           (self.board[to_row][to_col] == PieceType.BLACK\
          \ and to_row == 7):\n            self.board[to_row][to_col] += 1\n\n   \
          \ def is_valid_move(self, from_row: int, from_col: int, to_row: int, to_col:\
          \ int) -> bool:\n        piece_type = self.get_piece_type(from_row, from_col)\n\
          \n        # Check if the move is within bounds\n        if not (0 <= to_row\
          \ < 8 and 0 <= to_col < 8):\n            return False\n\n        # Check\
          \ if there's a piece at the starting position\n        if self.get_piece_type(from_row,\
          \ from_col) == PieceType.EMPTY:\n            return False\n\n        # Check\
          \ if the destination is empty or occupied by an opponent\n        if self.get_piece_type(to_row,\
          \ to_col) != PieceType.EMPTY and \\\n           (self.board[from_row][from_col]\
          \ % 2 == self.board[to_row][to_col] % 2):\n            return False\n\n\
          \        # Check for valid non-capturing moves\n        direction = -1 if\
          \ piece_type == PieceType.RED else 1\n        if abs(from_col - to_col)\
          \ == 1 and from_row + direction == to_row:\n            return True\n\n\
          \        # Check for valid capturing moves\n        if abs(from_col - to_col)\
          \ == 2 and from_row + direction * 2 == to_row:\n            capture_mid_row\
          \ = (from_row + to_row) // 2\n            capture_mid_col = (from_col +\
          \ to_col) // 2\n            return self.board[capture_mid_row][capture_mid_col]\
          \ != PieceType.EMPTY and \\\n                   abs(from_col - capture_mid_col)\
          \ == 1\n\n        return False\n\n    def is_game_over(self) -> Tuple[bool,\
          \ str]:\n        # Check for a win by checkmate or stalemate\n        red_turn\
          \ = self.get_piece_type(0, 0) % 2 != 0\n        if self.is_king_in_checkmate(red_turn):\n\
          \            return True, \"Checkmate\"\n        if not any(self.is_valid_move(i,\
          \ j, i + (1 if piece_type == PieceType.RED else -1), j + k)\n          \
          \         for i in range(8) for j in range(8)\n                   for piece_type\
          \ in [PieceType.RED, PieceType.BLACK]\n                   for k in [-1,\
          \ 1] if not red_turn and piece_type % 2 != 0 or\n                   (red_turn\
          \ and piece_type % 2 == 0)):\n            return True, \"Stalemate\"\n \
          \       return False, \"\"\n\n    def is_king_in_checkmate(self, red_turn:\
          \ bool) -> bool:\n        king_row, king_col = next((i, j) for i in range(8)\
          \ for j in range(8)\n                                    if self.board[i][j]\
          \ == (PieceType.RED_KING if red_turn else PieceType.BLACK_KING))\n     \
          \   # Check all directions\n        for dx in [-1, 0, 1]:\n            for\
          \ dy in [-1, 0, 1]:\n                if dx != 0 or dy != 0:\n          \
          \          if self.is_valid_move(king_row, king_col, king_row + dx, king_col\
          \ + dy):\n                        return False\n        return True\n```\n\
          \n### Step 2: Define the Game Class\n\nNext, we need a class to manage the\
          \ game state and handle player moves.\n\n```python\nclass Game:\n    def\
          \ __init__(self):\n        self.board = Board()\n        self.current_turn\
          \ = PieceType.RED\n\n    def start_game(self):\n        print(\"Welcome\
          \ to Checkers!\")\n        while True:\n            self.board.print_board()\n\
          \            from_pos, to_pos = input(f\"Player {self.current_turn} move\
          \ (e.g., 0-7): \").split(\"-\")\n            from_row, from_col = int(from_pos[0]),\
          \ int(from_pos[1])\n            to_row, to_col = int(to_pos[0]), int(to_pos[1])\n\
