          \"\\n  }\\n}\\n```\\n\\n- **Save Game**: Save your game state using `save_game.py`.\\\
          n\\n```json\\n{\\n  \\\"name\\\": \\\"uv_run\\\",\\n  \\\"arguments\\\"\
          : {\\n    \\\"script\\\": \\\"save_game.py\\\"\\n  }\\n}\\n```\\n\\n## Troubleshooting\\\
          n- If you encounter any issues, check the console output for error messages.\\\
