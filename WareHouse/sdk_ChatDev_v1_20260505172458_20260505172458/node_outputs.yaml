          packages\\\": [\\\"numpy\\\", \\\"click\\\"]\\n  }\\n}\\n```\\n\\n## Playing\
          \ the Game\\n1. **Start a New Game**\\n   - Open your command line and navigate\
          \ to your workspace.\\n   - Run the `start_game.py` script.\\n\\n```json\\\
          n{\\n  \\\"name\\\": \\\"uv_run\\\",\\n  \\\"arguments\\\": {\\n    \\\"\
          script\\\": \\\"start_game.py\\\"\\n  }\\n}\\n```\\n\\n2. **Make Moves**\\\
          n   - The game will prompt you to enter moves in the notation format (e.g.,\
          \ A1-B2).\\n   - Example move: `A1-B2`\\n\\n3. **Capture and Kinging Rules**\\\
          n   - The game enforces standard capture rules.\\n   - When a piece can\
          \ be captured, it must be captured immediately.\\n   - Pieces reaching the\
          \ farthest rank of the opponent's side will be kinged.\\n\\n4. **End Game**\\\
          n   - The game will automatically detect win or draw states:\\n     - A\
          \ player wins if all of their opponent’s pieces are captured.\\n     - The\
