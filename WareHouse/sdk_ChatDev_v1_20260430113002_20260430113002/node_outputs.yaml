node_Programmer Coding:
  node_id: Programmer Coding
  node_type: agent
  predecessors_num: 2
  successors_num: 1
  results:
  - type: message
    payload:
      role: assistant
      content:
      - type: text
        text: "Let's start by laying out the core classes, functions, and methods\
          \ we need:\n\n### Core Classes, Functions, and Methods\n\n1. **Game Class**\n\
          \   - `__init__(self)`: Initializes the game board and player states.\n\
          \   - `print_board(self)`: Prints the current state of the board.\n   -\
          \ `is_game_over(self) -> bool`: Checks if the game is over (win or draw).\n\
          \   - `make_move(self, move: str) -> bool`: Attempts to make a move and\
          \ returns whether it was successful.\n\n2. **Player Class**\n   - `__init__(self)`:\
          \ Initializes player details.\n   - `get_color(self) -> str`: Returns the\
          \ player's color (e.g., 'red', 'black').\n\n3. **Piece Class**\n   - `__init__(self,\
          \ color: str, is_king: bool = False)`: Initializes a piece with its color\
          \ and whether it's a king.\n   - `get_color(self) -> str`: Returns the piece's\
          \ color.\n   - `is_king(self) -> bool`: Checks if the piece is a king.\n\
          \n4. **Move Class**\n   - `__init__(self, from_pos: tuple, to_pos: tuple)`:\
          \ Initializes a move with start and end positions.\n   - `execute_move(self,\
          \ board) -> bool`: Executes the move on the given board.\n\n5. **Board Class**\n\
          \   - `__init__(self)`: Initializes the board state.\n   - `get_piece(self,\
          \ position: tuple) -> Piece`: Gets the piece at a given position.\n   -\
          \ `set_piece(self, position: tuple, piece: Piece) -> None`: Sets a piece\
          \ at a given position.\n   - `remove_piece(self, position: tuple) -> None`:\
          \ Removes a piece from a given position.\n\n### Step-by-Step Implementation\n\
