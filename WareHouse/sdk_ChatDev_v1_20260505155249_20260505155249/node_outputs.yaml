          \ not None and middle_piece.color != self.board[from_pos[0]][from_pos[1]].color:\\\
          n                self.board[(from_pos[0] + to_pos[0]) // 2][(from_pos[1]\
          \ + to_pos[1]) // 2] = None\\n\\n    def is_king(self, piece):\\n      \
