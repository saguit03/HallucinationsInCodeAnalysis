        text: '# Manual.md


          ## Introduction


          Welcome to Checkers (Draughts) Game! This document provides a step-by-step
          guide on how to set up and play the game using our pre-built Python environment.


          ### Main Functions of the Software


          The software includes several key functions:


          1. **Initialize Python Environment**: Sets up the necessary Python virtual
          environment.

          2. **Install Python Packages**: Installs required packages for the game.

          3. **Run Python Script**: Executes the game script with specified arguments.


          ### Setting Up the Environment


          #### Step 1: Initialize Python Environment


          Before you begin, ensure that your workspace is ready by initializing a
          Python environment:


          ```json

          {"name": "init_python_env", "arguments": {"python_version": "3.9"}}

          ```


          This command creates a new virtual environment with Python version 3.9.


          #### Step 2: Install Python Packages


          Next, install the required packages for the game:


          ```json

          {"name": "install_python_packages", "arguments": {"packages": ["checkers"],
          "upgrade": true}}

          ```


          Replace `"checkers"` with any other necessary packages if additional dependencies
          are needed.


          ### Playing the Game


          #### Step 1: Launch the Game


          With the environment set up, you can now launch the game. Execute the following
          command to run the game script:


          ```json

          {"name": "uv_run", "arguments": {"module": "checkers"}}

          ```


          This command runs the `checkers` module located in the workspace.


          #### Step 2: Enter Moves


          The game will prompt you for moves using notation (e.g., from-to positions).
          For example, to move a piece from square A1 to B3, you would enter:


          ```

          A1-B3

          ```


          Follow the on-screen instructions and continue making moves until the game
          is completed.


          ### Ending the Game


          The game will automatically detect win or draw states. Once a state is reached,
          the game will display a message indicating the outcome.


