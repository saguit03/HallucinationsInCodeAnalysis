          \ '.join(row))\n```\n\n### Step 2: Implement Move Validation and Execution\n\
          \nWe will extend our `Board` class to include methods for moving pieces,\
          \ validating moves, capturing, and kinging.\n\n```python\n# checkers.py\
          \ (continued)\n\nclass Board:\n    def move_piece(self, from_pos, to_pos):\n\
          \        row_from, col_from = from_pos\n        row_to, col_to = to_pos\n\
          \        \n        # Move the piece\n        piece = self.board[row_from][col_from]\n\
          \        self.board[row_from][col_from] = None\n        self.board[row_to][col_to]\
          \ = piece\n        \n        # Check if capturing is needed and execute\
          \ it\n        self.check_capture(row_to, col_to)\n    \n    def check_capture(self,\
          \ row, col):\n        # Check for capturing in all four directions\n   \
          \     directions = [(-1, -1), (-1, 1), (1, -1), (1, 1)]\n        captured\
          \ = False\n        \n        for dr, dc in directions:\n            if self.is_within_bounds(row\
          \ + dr * 2, col + dc * 2) and self.is_empty(row + dr, col + dc):\n     \
          \           original_piece = self.board[row][col]\n                target_piece\
          \ = self.board[row + dr * 2][col + dc * 2]\n                \n         \
          \       if (original_piece == 'B' and (row + dr * 2 >= 0)) or (original_piece\
          \ == 'R' and (row + dr * 2 < 8)):\n                    if original_piece\
