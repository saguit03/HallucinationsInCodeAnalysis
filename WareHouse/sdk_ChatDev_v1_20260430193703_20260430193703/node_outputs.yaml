          \   to_row, to_col = int(to_pos[0]), int(to_pos[1])\n\n        if self.board.board[from_row][from_col]\
          \ != self.current_player:\n            print(f\"Invalid move: No piece at\
          \ {from_pos}\")\n            return False\n\n        piece = Piece(self.current_player)\n\
          \        if piece.move_to(self.board.board, (from_row, from_col), (to_row,\
          \ to_col)):\n            self.switch_turn()\n        else:\n           \
          \ print(f\"Invalid move: Invalid destination {to_pos}\")\n\n    def check_win(self):\n\
          \        pass\n```\n\n### Step 4: Implement Piece Methods\n\nImplement methods\
          \ for capturing and moving pieces.\n\n```python\nclass Piece:\n    # ...\
