          \ launch the program\n\"\"\"\n\nfrom checkers.engine import CheckersEngine\n\
          \ndef run():\n    engine = CheckersEngine()\n    engine.play_game()\n\n\
          if __name__ == \"__main__\":\n    run()\n```\n\n#### checkers/__init__.py\n\
          ```python\n# Initialize package namespace\n```\n\n#### checkers/board.py\n\
          ```python\nimport numpy as np\n\nclass GameBoard:\n    def __init__(self):\n\
          \        self.board = np.zeros((8, 8), dtype=int)\n        self.setup_board()\n\
