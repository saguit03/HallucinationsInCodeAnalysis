          is_valid_move(from_move: str, to_move: str, board: CheckersBoard) -> bool:\n        start_row,
          start_col = ord(from_move[0]) - ord(''A''), int(from_move[1:]) - 1\n        end_row,
          end_col = ord(to_move[0]) - ord(''A''), int(to_move[1:]) - 1\n        piece_to_move
          = board.board[start_row][start_col]\n        if not piece_to_move:\n            return
          False\n        # Simple check for now (no captures)\n        if start_row
          != end_row and start_col != end_col:\n            return False\n        return
          True"}}

