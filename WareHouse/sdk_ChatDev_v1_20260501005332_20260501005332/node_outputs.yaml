          \ Represents a player in the game.\n4. **Move**: Represents a move from\
          \ one position to another, including jump captures.\n5. **CheckersEngine**:\
          \ Manages the game state, turn taking, and rules enforcement.\n\n### Directory\
          \ Structure\n```\ncheckers_game/\n├── main.py\n└── checkers/\n    ├── __init__.py\n\
          \    ├── board.py\n    ├── piece.py\n    ├── player.py\n    ├── move.py\n\
          \    └── engine.py\n```\n\n### Function Call to Create Python venv and Install\
