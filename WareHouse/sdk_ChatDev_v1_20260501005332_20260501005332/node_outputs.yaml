          import CheckersBoard\nfrom checkers_piece import CheckersPiece, PieceType\nfrom
          checkers_rules import CheckersRules\nfrom checkers_player import Player\n\n#
          Define game board size\nBOARD_SIZE = 8\n\n\nclass Game:\n    def __init__(self):\n        self.board
          = CheckersBoard()\n        self.player1 = Player(PieceType.WHITE)\n        self.player2
          = Player(PieceType.BLACK)\n        self.current_player = self.player1\n\n    def
          run(self):\n        while True:\n            print(self.board)\n            from_move,
          to_move = input(f\"Player {self.current_player} make your move (e.g., A1-B2):
          \").split(''-'')\n            if not CheckersRules.is_valid_move(from_move,
