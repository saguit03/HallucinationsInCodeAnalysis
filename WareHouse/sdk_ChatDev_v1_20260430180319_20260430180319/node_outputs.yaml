          \ = self.board.board[start_row][start_col]\\n\\n        # Move the piece\\\
          n        self.board.board[end_row][end_col] = piece\\n        self.board.board[start_row][start_col]\
          \ = Piece.EMPTY\\n\\n        # Promote to king if at the last row for red\
