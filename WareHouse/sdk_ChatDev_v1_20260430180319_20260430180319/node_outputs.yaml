          \    return True\n\n    def make_move(self, start_pos, end_pos):\n     \
          \   if not self.is_valid_move(start_pos, end_pos):\n            raise ValueError(\"\
          Invalid move\")\n\n        start_row, start_col = start_pos\n        end_row,\
          \ end_col = end_pos\n        piece = self.board.board[start_row][start_col]\n\
          \n        # Move the piece\n        self.board.board[end_row][end_col] =\
          \ piece\n        self.board.board[start_row][start_col] = Piece.EMPTY\n\n\
          \        # Promote to king if at the last row for red or first row for black\n\
          \        if end_pos[0] == Board.SIZE - 1 and piece == Piece.RED_MAN:\n \
          \           self.board.board[end_row][end_col] = Piece.RED_KING\n      \
          \  elif end_pos[0] == 0 and piece == Piece.BLACK_MAN:\n            self.board.board[end_row][end_col]\
          \ = Piece.BLACK_KING\n\n        # Switch players after a valid move\n  \
          \      self.switch_player()\n```\n\n### 4. Implement the Main Function to\
          \ Play the Game\n\nFinally, let's implement the main function to handle\
          \ user input and game flow.\n\n```python\ndef main():\n    game = CheckersGame()\n\
          \n    while True:\n        game.board.display()\n        start_pos = tuple(map(int,\
          \ input(f\"Player {game.current_player}, enter your move (start_row col):\
          \ \").split()))\n        end_pos = tuple(map(int, input(\"Enter destination\
