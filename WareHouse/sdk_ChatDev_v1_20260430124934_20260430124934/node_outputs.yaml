          **Run Python Scripts**: Executes Python scripts within the workspace root.\n4.
          **Apply Text Edits**: Modifies text files in the workspace.\n5. **Create
          Folder**: Creates directory trees under the workspace.\n6. **List Available
          Files**: Lists accessible files from the attachment store and the current
          code_workspace.\n7. **Delete Path**: Deletes a workspace file or directory.\n8.
          **Read File Segment**: Reads a line range plus metadata from a workspace
          file.\n9. **Search in Files**: Searches workspace files and returns structured
          matches.\n10. **Save File**: Persists data to a workspace file while optionally
          registering it as an attachment.\n11. **List Directory**: Lists contents
          of a workspace-relative directory.\n\n## Installation and Setup\n\n####
          1. Initialize Python Environment\nTo initialize the Python environment,
          use the following command:\n```json\n{\"name\": \"init_python_env\", \"arguments\":
          {\"python_version\": \"3.8\"}}\n```\nThis will set up a virtual environment
          with Python version 3.8.\n\n#### 2. Install Python Packages\nAfter setting
          up the environment, install the required packages using:\n```json\n{\"name\":
          \"install_python_packages\", \"arguments\": {\"packages\": [\"checkers-game\"],
          \"upgrade\": true}}\n```\nReplace \"checkers-game\" with any additional
          packages needed for your game implementation.\n\n### How to Play\n\n####
          1. Running the Game\nOnce everything is set up, you can run the game using:\n```json\n{\"name\":
          \"uv_run\", \"arguments\": {\"module\": \"checkers_game\"}}\n```\nThis will
          execute the Checkers game module inside the workspace root.\n\n#### 2. Prompt
          for Moves\nDuring your turn, the game will prompt you to enter a move in
          notation (e.g., from-to positions). For example:\n```plaintext\nYour move
          (from-to): A1-C3\n```\n\n#### 3. Standard Capture and Kinging Rules\n- **Capture**:
          Players can capture enemy pieces by jumping over them diagonally. You must
          continue capturing if possible.\n- **Kings**: When a piece reaches the opposite
          side of the board, it becomes a king and can move in all four diagonal directions.\n\n###
          Win or Draw States\n\nThe game will automatically detect win or draw states:\n-
          **Win**: A player has no legal moves left and is declared the winner.\n-
          **Draw**: All squares are occupied or the game ends in an impasse (e.g.,
          threefold repetition).\n\n### Troubleshooting\n\n#### 1. Environment Issues\nIf
          you encounter environment issues, ensure your Python version matches the
