          \ in range(8):\n            for col in range(8):\n                if (row\
          \ + col) % 2 == 1 and row < 3:\n                    pieces[(row, col)] =\
          \ Piece(\"White\", \"Man\")\n                elif (row + col) % 2 == 1 and\
          \ row > 4:\n                    pieces[(row, col)] = Piece(\"Black\", \"\
          Man\")\n        return pieces\n\n    def move_piece(self, move, player):\n\
          \        from_pos, to_pos = move.split('-')\n        from_pos = (int(from_pos[1])\
