          \"\"\"\nThis is the main module to launch the program\n\"\"\"\n\nfrom server\
          \ import run\n\nif __name__ == \"__main__\":\n    run()\n```\n\n#### game.py\n\
          \n```python\nfrom board import Board, Piece, Player\nfrom player import\
          \ Player\n\nclass Game:\n    def __init__(self):\n        self.board = Board()\n\
          \        self.players = [Player(\"Black\"), Player(\"White\")]\n       \
          \ self.current_player_index = 0\n\n    def switch_turn(self):\n        self.current_player_index\
