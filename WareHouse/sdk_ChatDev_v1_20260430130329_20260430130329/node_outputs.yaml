          n        return False\\n    \\n    # Capture logic (simplified)\\n    if\
          \ abs(board[from_row][from_col]) == 1 and abs(to_row - from_row) > 1:\\\
          n        middle_row, middle_col = (from_row + to_row) // 2, (from_col +\
