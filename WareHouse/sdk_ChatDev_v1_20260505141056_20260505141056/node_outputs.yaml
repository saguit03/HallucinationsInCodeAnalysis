          \ game over detection logic\n        pass\n```\n\n### Step 2: Create the\
          \ `Piece` Class\nThis class will represent a single piece on the board.\n\
          \n```python\nclass Piece:\n    def __init__(self, color, is_king=False):\n\
          \        self.color = color\n        self.is_king = is_king\n    \n    def\
          \ promote(self):\n        self.is_king = True\n```\n\n### Step 3: Implement\
          \ Move Validation and Execution in `Board`\nHere's how you can implement\
          \ the move validation and execution logic:\n\n```python\nclass Board:\n\
