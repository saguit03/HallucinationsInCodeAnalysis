          \        self.board[x2][y2] = piece\n        \n        # Promote if needed\n\
          \        if (piece.color == 'B' and x2 == 0) or (piece.color == 'W' and\
          \ x2 == 7):\n            piece.promote()\n```\n\n### Step 4: Implement Game\
          \ Over Detection\nHere's how you can implement the game over detection logic:\n\
          \n```python\nclass Board:\n    # ... (previous code)\n    \n    def is_game_over(self):\n\
          \        black_pieces = [x for row in self.board for x in row if x and x.color\
          \ == 'B']\n        white_pieces = [x for row in self.board for x in row\
          \ if x and x.color == 'W']\n        \n        if not black_pieces:\n   \
          \         return True, \"White wins\"\n        elif not white_pieces:\n\
          \            return True, \"Black wins\"\n        \n        # Check for\
