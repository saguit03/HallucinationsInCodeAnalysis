          in range(row % 2, 8, 2):\n            board[row][col] = 1\n    for row in
          range(5, 8):\n        for col in range((row + 1) % 2, 8, 2):\n            board[row][col]
          = -1\n    return board\ndef is_valid_move(board, from_pos, to_pos):\n    piece
          = board[from_pos[0], from_pos[1]]\n    if piece == 0:\n        return False\n    x_diff
          = abs(to_pos[0] - from_pos[0])\n    y_diff = abs(to_pos[1] - from_pos[1])\n    if
          not (x_diff in [1, 2] and y_diff == 1):\n        return False\n    if x_diff
          == 1:\n        if piece > 0 and to_pos[0] < from_pos[0]:\n            return
          True\n        elif piece < 0 and to_pos[0] > from_pos[0]:\n            return
          True\n    else:\n        if piece > 0 and to_pos[0] <= from_pos[0]:\n            return
          False\n        elif piece < 0 and to_pos[0] >= from_pos[0]:\n            return
          False\n    if x_diff == 2:\n        if np.abs(board[(from_pos[0] + to_pos[0])
          // 2, (from_pos[1] + to_pos[1]) // 2]) != -piece:\n            return False\n    return
          True\ndef make_move(board, from_pos, to_pos):\n    board[to_pos[0], to_pos[1]]
          = board[from_pos[0], from_pos[1]]\n    board[from_pos[0], from_pos[1]] =
