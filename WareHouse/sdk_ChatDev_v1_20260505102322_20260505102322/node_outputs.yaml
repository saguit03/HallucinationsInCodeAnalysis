          \          print(self.board[i][j].color[0], end=\"| \")\n              \
          \  else:\n                    print(\" . | \", end=\"\")\n            print()\n\
          \n    def get_piece(self, row, col):\n        return self.board[row][col]\n\
          \n    def move_piece(self, piece, to_row, to_col):\n        from_row, from_col\
          \ = piece.position\n        self.board[from_row][from_col] = None\n    \
          \    piece.update_position((to_row, to_col))\n        self.board[to_row][to_col]\
