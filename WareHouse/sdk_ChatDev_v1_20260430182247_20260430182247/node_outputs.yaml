      - type: text
        text: '{"name": "save_file", "arguments": {"content": "# Checkers Game Implementation\nimport
          numpy as np\n\nBOARD_SIZE = 8\nEMPTY = 0\nWHITE = 1\nBLACK = -1\nKING =
          2\n\n# Initialize the board\ndef initialize_board():\n    board = np.zeros((BOARD_SIZE,
          BOARD_SIZE), dtype=int)\n    for row in range(3):\n        for col in range(row
          % 2, BOARD_SIZE, 2):\n            board[row, col] = WHITE\n    for row in
          range(5, BOARD_SIZE):\n        for col in range(row % 2, BOARD_SIZE, 2):\n            board[row,
          col] = BLACK\n    return board\n\n# Print the board\ndef print_board(board):\n    print(''   '',
          end='''')\n    for col in range(BOARD_SIZE):\n        print(f''{col+1} '',
          end='''')\n    print()\n    for row in range(BOARD_SIZE):\n        print(chr(row
          + 65), '' |'', end='' '') # ASCII value of A-Z\n        for col in range(BOARD_SIZE):\n            if
          board[row, col] == EMPTY:\n                print(''.'', end='' |\n'')\n            elif
          board[row, col] == WHITE:\n                print(''W'', end='' |\n'')\n            elif
          board[row, col] == BLACK:\n                print(''B'', end='' |\n'')\n\n#
          Get valid moves for a piece\ndef get_valid_moves(board, row, col):\n    moves
          = []\n    directions = [(-1, -1), (-1, 1), (1, -1), (1, 1)]\n    if board[row,
          col] in (WHITE, BLACK): # Normal move\n        for d_row, d_col in directions:\n            new_row,
          new_col = row + d_row, col + d_col\n            if 0 <= new_row < BOARD_SIZE
          and 0 <= new_col < BOARD_SIZE and board[new_row, new_col] == EMPTY:\n                moves.append(((row,
          col), (new_row, new_col)))\n    elif board[row, col] in (WHITE, BLACK, KING):
          # Jump move\n        for d_row, d_col in directions:\n            jump_row
          = row + 2 * d_row\n            jump_col = col + 2 * d_col\n            if
          0 <= jump_row < BOARD_SIZE and 0 <= jump_col < BOARD_SIZE and board[jump_row,
          jump_col] == EMPTY:\n                land_row, land_col = row + d_row, col
          + d_col\n                if 0 <= land_row < BOARD_SIZE and 0 <= land_col
          < BOARD_SIZE and board[land_row, land_col] in (opponent(board[row, col]),
          -1 * opponent(board[row, col])):\n                    moves.append(((row,
          col), (jump_row, jump_col)))\n    return moves\n\n# Make a move on the board\ndef
          make_move(board, start, end):\n    row_start, col_start = start\n    row_end,
          col_end = end\n    board[row_end, col_end] = board[row_start, col_start]\n    board[row_start,
          col_start] = EMPTY\n    return board\n\n# Determine the winner\ndef get_winner(board):\n    num_white
          = np.sum(board == WHITE)\n    num_black = np.sum(board == BLACK)\n    if
          num_white == 0:\n        return ''Black wins''\n    elif num_black == 0:\n        return
          ''White wins''\n    else:\n        return None\n\n# Get the opponent''s
          color\ndef opponent(color):\n    return -color\n\n# Main game loop\ndef
          main():\n    board = initialize_board()\n    print_board(board)\n    current_player
          = WHITE\n    while True:\n        print(f''Player {current_player}\''s turn'')\n        move
          = input(''Enter your move (e.g., A1 B2): '').upper()\n        try:\n            start_col
          = ord(move[0]) - 65\n            start_row = int(move[1]) - 1\n            end_col
          = ord(move[3]) - 65\n            end_row = int(move[4]) - 1\n            if
          (start_col, start_row) in range(BOARD_SIZE) and (end_col, end_row) in range(BOARD_SIZE)
          and board[start_row, start_col] * current_player == 1:\n                valid_moves
          = get_valid_moves(board, start_row, start_col)\n                move_selected
          = False\n                for valid_move in valid_moves:\n                    if
          valid_move[0] == (start_row, start_col) and valid_move[1] == (end_row, end_col):\n                        board
          = make_move(board, start_move, end_move)\n                        print_board(board)\n                        move_selected
          = True\n                        break\n                if not move_selected:\n                    raise
          ValueError(''Invalid move'')\n            else:\n                raise ValueError(''Invalid
          input'')\n        except Exception as e:\n            print(e)\n            continue\n        winner
          = get_winner(board)\n        if winner is not None:\n            print(winner)\n            break\n        current_player
          *= -1\n\nif __name__ == ''__main__'':\n    main()", "encoding": "utf-8",
          "mode": "overwrite", "path": "chess/checkers.py"}}'
