          \    - **Arguments**:\n      - `script`: Name of the Python script file\
          \ (e.g., \"main.py\")\n\n## Installation and Environment Setup\n\nTo start\
          \ playing the Checkers game, follow these steps:\n\n1. **Initialize Python\
          \ Environment:**\n   ```json\n   {\"name\": \"init_python_env\", \"arguments\"\
          : {\"python_version\": \"3.9\"}}\n   ```\n\n2. **Install Game Dependencies:**\n\
          \   ```json\n   {\"name\": \"install_python_packages\", \"arguments\": {\"\
          packages\": [\"checkers_game\"], \"upgrade\": true}}\n   ```\n\n## How to\
          \ Play\n\n1. **Run the Game Script:**\n   After setting up the environment\
          \ and installing dependencies, run the game script using:\n   ```json\n\
          \   {\"name\": \"uv_run\", \"arguments\": {\"script\": \"main.py\"}}\n \
          \  ```\n\n2. **Gameplay Mechanics:**\n   - Players take turns moving their\
          \ pieces diagonally.\n   - A piece can be captured by jumping over an opponent's\
          \ piece to land on the square immediately beyond that piece.\n   - The game\
          \ ends when a player either has no legal moves or all of the opponent’s\
          \ pieces have been captured.\n\n3. **Kinging Rule:**\n   - When a player\
          \ moves their piece to the farthest rank, it is crowned as a king and can\
          \ move both diagonally forward and backward.\n\n4. **Input Moves:**\n  \
          \ - Players enter moves in the notation format \"from-to\", where \"from\"\
          \ and \"to\" are positions on the board using algebraic notation (e.g.,\
          \ \"e5-d6\").\n\n## Example Gameplay\n\n```plaintext\nMove piece from e7\
          \ to e5.\nEnter move (from-to): e5-e4\n\nPiece captures opponent's piece\
          \ at d5.\nMove piece from e4 to d5.\n\nCheckers Game State:\n8  r . . r\
          \ . .\n7  . . . . . .\n6  . b . . b .\n5  . . r . . .\n4  . B . . R .\n\
          3  . b . . b .\n2  . . . . . .\n1  r . . r . .\n\nYour move (from-to):\n\
          ```\n\n## Conclusion\n\nWe hope you enjoy playing ChatDev's Checkers game!\
          \ If you encounter any issues or have questions, feel free to reach out\
          \ for support."
