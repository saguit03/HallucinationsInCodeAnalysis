          \ A1-B2\n  ```\n  \n### Special Rules\n- **Capture:**\n  When your piece\
          \ can jump an opponent's piece diagonally forward or backward, the capture\
          \ must be made. If multiple captures are possible, you must make them in\
          \ sequence.\n  \n- **Kings:**\n  A piece that reaches the opposite end of\
          \ the board (8th rank for White and 1st rank for Black) can become a king.\
          \ Kings can move diagonally in any direction (forward or backward).\n  \n\
          ### Game Completion\nThe game ends when:\n- All pieces of one player are\
          \ captured, or\n- The opponent is forced into a position where they cannot\
          \ make any legal moves.\n\nWhen the game ends, the result will be displayed,\
          \ indicating the winner or if it's a draw.\n\n## Conclusion\n\nThat's all\
          \ you need to know to play the Checkers (Draughts) game! Enjoy the strategic\
          \ battles and happy gaming!"
      metadata:
        source: Chief Product Officer
