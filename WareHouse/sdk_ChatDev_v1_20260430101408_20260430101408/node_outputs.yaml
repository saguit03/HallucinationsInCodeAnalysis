          Saves data to a workspace file.\n11. **list_directory**: Lists contents
          of a directory within the workspace.\n\n## Setup Instructions\n\n### 1.
          Initialize Python Environment\nBefore you can play, you need to set up a
          Python environment with the necessary packages.\n\n```json\n{\n  \"name\":
          \"init_python_env\",\n  \"arguments\": {\n    \"python_version\": \"3.9\"\n  }\n}\n```\n\n###
