          \n```python\nclass CheckerPiece:\n    def __init__(self, color, is_king=False):\n\
          \        self.color = color\n        self.is_king = is_king\n\n    def king(self):\n\
          \        self.is_king = True\n\n    def __str__(self):\n        return \"\
          K\" if self.is_king else \"B\"\n```\n\n#### Player Class (`game/checkers/player.py`)\n\
          \n```python\nclass Player:\n    def __init__(self, color):\n        self.color\
