          \                game_board.king_piece(to_x, to_y)\n        else:\n    \
          \        print(\"Invalid move. Please try again.\")\n```\n\n#### MoveValidator\
          \ Class (`game/checkers/move_validator.py`)\n\n```python\nclass MoveValidator:\n\
          \    @staticmethod\n    def is_valid_move(game_board, color, from_x, from_y,\
