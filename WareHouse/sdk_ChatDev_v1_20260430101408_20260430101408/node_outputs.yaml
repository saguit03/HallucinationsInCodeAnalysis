          up the environment and installing the packages, you can start a new game.\n\n1.
          Open the main script file for the Checkers game.\n2. Run the game using
          the `uv_run` function.\n\n```json\n{\n  \"name\": \"uv_run\",\n  \"arguments\":
          {\n    \"script\": \"checkers_game.py\"\n  }\n}\n```\n\n### Game Flow\nOnce
