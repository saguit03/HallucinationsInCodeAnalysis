          kings, and win/draw conditions.\n\n### Example Moves\n- Moving a piece from
          A1 to B2: `1a-2b`\n- Capturing an opponent''s piece at C3 from A1: `1a-c3`\n\nThe
          game will display the updated board after each move. Follow these steps
