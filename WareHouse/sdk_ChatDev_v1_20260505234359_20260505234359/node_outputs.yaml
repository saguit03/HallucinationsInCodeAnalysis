          \ capture_piece(board, from_pos, to_pos):\\\\n    row = (int(from_pos[1])\
          \ + int(to_pos[1])) // 2\\\\n    col = (int(from_pos[0]) + int(to_pos[0]))\
          \ // 2\\\\n    board[row][col] = ' '\\\\n    return board\\\\n\\n\\ndef\
          \ check_game_over(board):\\\\n    # Add logic to detect if the game is over\
