          \    from_pos, to_pos = map(int, move.split())\n        self.board.move_piece((from_pos\
          \ // 8, from_pos % 8), (to_pos // 8, to_pos % 8))\n        self.switch_turn()\n\
          ```\n\n#### `checkers_game/server.py`\n```python\nfrom .game import Game\n\
          \ndef run():\n    game = Game()\n    print(game)\n    while True:\n    \
          \    move = input(f\"Player {game.current_player}, enter your move (e.g.,\
          \ '42 60'): \")\n        game.make_move(move)\n        print(game)\n```\n\
