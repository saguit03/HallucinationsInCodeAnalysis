          \ False\n    \n    # Check if the starting position is occupied by a piece\
          \ of the current player\n    start_row, start_col = start_pos\n    end_row,\
          \ end_col = end_pos\n    player_color = 'W' if (start_row + start_col) %\
          \ 2 == 0 else 'B'\n    if board[start_row][start_col] != player_color:\n\
          \        return False\n    \n    # Check if the destination position is\
          \ empty\n    if board[end_row][end_col] != EMPTY:\n        return False\n\
          \    \n    # Check for a valid move\n    row_diff = abs(end_row - start_row)\n\
          \    col_diff = abs(end_col - start_col)\n    \n    if (row_diff == 1 and\
          \ col_diff == 1) or (row_diff == 2 and col_diff == 2):\n        return True\n\
          \    \n    return False\n\ndef make_move(board, start_pos, end_pos):\n \
          \   # Make the move on the board\n    start_row, start_col = start_pos\n\
          \    end_row, end_col = end_pos\n    board[end_row][end_col] = board[start_row][start_col]\n\
          \    board[start_row][start_col] = EMPTY\n\ndef main():\n    board = initialize_board()\n\
          \    current_player = WHITE\n    \n    while True:\n        print_board(board)\n\
          \        start_pos = input(f\"Player {current_player}, enter your move (from-to):\
          \ \").split('-')\n        start_pos = (int(start_pos[0][1]) - 1, ord(start_pos[0][0])\
          \ - ord('a'))\n        end_pos = (int(start_pos[1][1]) - 1, ord(start_pos[1][0])\
          \ - ord('a'))\n        \n        if not is_valid_move(board, start_pos,\
          \ end_pos):\n            print(\"Invalid move. Try again.\")\n         \
          \   continue\n        \n        make_move(board, start_pos, end_pos)\n \
          \       \n        # Check for win condition\n        all_positions = [(i,\
          \ j) for i in range(BOARD_SIZE) for j in range(BOARD_SIZE)]\n        opponent_pieces\
          \ = [pos for pos in all_positions if board[pos[0]][pos[1]] == (BLACK if\
          \ current_player == WHITE else WHITE)]\n        \n        if not opponent_pieces:\n\
          \            print(f\"Player {current_player} wins!\")\n            break\n\
          \        \n        # Switch players\n        current_player = BLACK if current_player\
          \ == WHITE else WHITE\n\nif __name__ == \"__main__\":\n    main()\n```\n\
          \nPlease provide the necessary files or code snippets."
