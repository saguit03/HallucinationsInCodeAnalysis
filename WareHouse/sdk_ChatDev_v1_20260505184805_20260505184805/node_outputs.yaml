          \ the module set to `\"chess_game\"`. This command will start the game.\n\
          \n## Installing Environment Dependencies\nTo ensure smooth gameplay, it's\
          \ essential to have the necessary dependencies installed. You can install\
          \ them by calling:\n```json\n{\n  \"name\": \"install_python_packages\"\
