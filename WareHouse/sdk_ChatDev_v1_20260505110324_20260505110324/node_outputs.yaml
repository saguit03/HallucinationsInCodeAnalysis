          \                new_row, new_col = row + dr, col + dc\\n              \
          \          if 0 <= new_row < 8 and 0 <= new_col < 8 and self.board[new_row][new_col]\
          \ is None:\\n                            valid_moves.append(((row, col),\
          \ (new_row, new_col)))\\n                        elif 0 <= new_row < 8 and\
          \ 0 <= new_col < 8 and self.board[new_row][new_col].lower() != player and\
          \ (new_row + dr, new_col + dc) in [(row+2, col+2), (row-2, col-2)]:\\n \
          \                           valid_moves.append(((row, col), (new_row + dr,\
          \ new_col + dc)))\\n        return valid_moves\\n\\n    def move_piece(self,\
          \ from_pos, to_pos):\\n        from_row, from_col = from_pos\\n        to_row,\
          \ to_col = to_pos\\n\\n        if self.board[from_row][from_col] is None\
          \ or self.board[to_row][to_col] is not None:\\n            raise ValueError(\\\
          \"Invalid move\\\")\\n\\n        piece = self.board[from_row][from_col]\\\
          n        capture = False\\n\\n        directions = [(-1, -1), (-1, 1), (1,\
          \ -1), (1, 1)]\\n        for dr, dc in directions:\\n            if abs(from_row\
          \ - to_row) == 2 and abs(from_col - to_col) == 2 and self.board[(from_row\
          \ + to_row) // 2][(from_col + to_col) // 2] is not None:\\n            \
          \    capture = True\\n                break\\n\\n        self.board[from_row][from_col]\
          \ = None\\n        self.board[to_row][to_col] = piece\\n\\n        if capture:\\\
          n            self.board[(from_row + to_row) // 2][(from_col + to_col) //\
          \ 2] = None\\n\\n        if self.current_player == 'black' and to_row ==\
          \ 7 or self.current_player == 'white' and to_row == 0:\\n            self.board[to_row][to_col]\
          \ = piece.upper()\\n\\n        self.current_player = 'white' if self.current_player\
          \ == 'black' else 'black'\\n\\n    def is_game_over(self):\\n        black_pieces\
          \ = sum(row.count('b') + row.count('B') for row in self.board)\\n      \
          \  white_pieces = sum(row.count('w') + row.count('W') for row in self.board)\\\
          n\\n        return black_pieces == 0 or white_pieces == 0\\n\\n    def check_winner(self):\\\
          n        if not any(piece.islower() for piece in [cell for sublist in self.board\
          \ for cell in sublist]):\\n            return 'White wins'\\n        elif\
          \ not any(piece.isupper() for piece in [cell for sublist in self.board for\
          \ cell in sublist]):\\n            return 'Black wins'\\n        else:\\\
          n            return None\\n\\n    def main_loop(self):\\n        while True:\\\
          n            self.print_board()\\n            valid_moves = self.get_valid_moves(self.current_player)\\\
          n            if not valid_moves:\\n                print(f\\\"{self.check_winner()}\
          \ has won!\\\")\\n                break\\n\\n            from_pos, to_pos\
          \ = input(f\\\"Player {self.current_player}, enter your move (e.g., A1-A2):\
          \ \\\").split('-')\\n            from_row, from_col = ord(from_pos[0].upper())\
          \ - 65, int(from_pos[1]) - 1\\n            to_row, to_col = ord(to_pos[0].upper())\
          \ - 65, int(to_pos[1]) - 1\\n\\n            if (from_row, from_col) not\
          \ in [(i//2, i%2) for i in range(8)] or (to_row, to_col) not in [(i//2,\
          \ i%2) for i in range(8)]:\\n                raise ValueError(\\\"Invalid\
          \ positions\\\")\\n\\n            self.move_piece((from_row, from_col),\
          \ (to_row, to_col))\\n\\n    def start(self):\\n        self.initialize_board()\\\
          n        self.main_loop()\\n\\n# Main execution\\nif __name__ == \\\"__main__\\\
          \":\\n    game = CheckersGame()\\n    game.start()\" }}\n```\n\nThis script\
          \ initializes a checkers board and allows two players to play the game interactively.\
          \ The game ends when one player runs out of pieces, and the winner is declared\
          \ accordingly."
      metadata:
