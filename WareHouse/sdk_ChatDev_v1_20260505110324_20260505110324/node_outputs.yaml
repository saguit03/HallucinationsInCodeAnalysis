          \ the first move.\\n- **Capture**: Pieces can capture an opponent's piece\
          \ diagonally forward to an adjacent unoccupied square. Multiple captures\
          \ are possible if they form a continuous line of captures.\\n- **Kings**:\
          \ A piece becomes a king by reaching the opposite end of the board. Kings\
          \ can move in any direction, including backward and sideways.\\n- **Win\
