      content:
      - type: text
        text: "```json\n{\n  \"name\": \"apply_text_edits\",\n  \"arguments\": {\n\
          \    \"path\": \"checkers_game.py\",\n    \"replacement\": \"# -*- coding:\
          \ utf-8 -*-\\n\\nimport sys\\nfrom collections import defaultdict\\n\\nclass\
          \ CheckersGame:\\n    def __init__(self):\\n        self.board = self._create_initial_board()\\\
          n        self.current_player = 'White'\\n\\n    def _create_initial_board(self):\\\
          n        board = [[''] * 8 for _ in range(8)]\\n        positions = [(i,\
          \ j) for i in range(3, 5) if (i + j) % 2 == 0 for j in range(8) if (i +\
          \ j) % 2 == 0]\\n        for pos in positions:\\n            board[pos[0]][pos[1]]\
          \ = 'W'\\n        for pos in positions[::-1]:\\n            board[pos[0]][pos[1]]\
          \ = 'B'\\n        return board\\n\\n    def _print_board(self):\\n     \
          \   print('  a b c d e f g h')\\n        for i, row in enumerate(self.board,\
          \ start=1):\\n            print(f'{i} ', end='')\\n            for piece\
          \ in row:\\n                if piece:\\n                    print(piece\
          \ + ' ', end='')\\n                else:\\n                    print('.\
          \ ', end='')\\n            print()\\n\\n    def _is_valid_move(self, start_pos,\
          \ end_pos):\\n        i1, j1 = start_pos\\n        i2, j2 = end_pos\\n \
          \       piece = self.board[i1][j1]\\n        if not piece or piece[0] !=\
          \ self.current_player:\\n            return False\\n\\n        if (i2 -\
          \ i1, abs(j2 - j1)) == (-1, 1) and self.board[i2][j2] == '':\\n        \
          \    return True\\n\\n        if (i2 - i1, abs(j2 - j1)) == (-2, 2):\\n\
          \            mid_pos = ((i1 + i2) // 2, (j1 + j2) // 2)\\n            if\
          \ self.board[mid_pos[0]][mid_pos[1]] != ('B' if piece == 'W' else 'W') or\
          \ self.board[i2][j2] != '':\\n                return False\\n          \
          \  return True\\n\\n        return False\\n\\n    def _make_move(self, start_pos,\
          \ end_pos):\\n        i1, j1 = start_pos\\n        i2, j2 = end_pos\\n \
          \       self.board[i2][j2] = self.board[i1][j1]\\n        self.board[i1][j1]\
          \ = ''\\n\\n    def play(self):\\n        while True:\\n            print(f'Current\
          \ player: {self.current_player}')\\n            self._print_board()\\n \
          \           start_pos = input('Enter start position (e.g., 3a): ').strip().lower()\\\
          n            end_pos = input('Enter end position (e.g., 4b): ').strip().lower()\\\
          n\\n            if len(start_pos) != 2 or len(end_pos) != 2:\\n        \
          \        print('Invalid input format. Please use e.g., 3a for row 3 and\
          \ column a.')\\n                continue\\n\\n            i1 = int(start_pos[0])\
          \ - 1\\n            j1 = ord(start_pos[1]) - 97\\n            i2 = int(end_pos[0])\
          \ - 1\\n            j2 = ord(end_pos[1]) - 97\\n\\n            if not self._is_valid_move((i1,\
          \ j1), (i2, j2)):\\n                print('Invalid move. Please try again.')\\\
          n                continue\\n\\n            self._make_move((i1, j1), (i2,\
          \ j2))\\n            self.current_player = 'Black' if self.current_player\
          \ == 'White' else 'White'\\n\\nif __name__ == '__main__':\\n    game = CheckersGame()\\\
          n    game.play()\",\n    \"start_line\": 1\n  }\n}\n```"
