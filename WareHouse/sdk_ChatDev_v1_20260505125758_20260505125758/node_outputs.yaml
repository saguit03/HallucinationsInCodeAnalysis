          \      middle_col = (from_col + to_col) // 2\n            if self.board[middle_row][middle_col]\
          \ is not None and \\\n               self.board[middle_col][middle_col].startswith('black'\
          \ if self.current_player == 'white' else 'white'):\n                self.board[middle_row][middle_col]\
          \ = None\n                self.board[to_row][to_col] = self.board[from_row][from_col]\n\
          \                self.board[from_row][from_col] = None\n               \
          \ self.switch_turns()\n            else:\n                print(\"Invalid\
          \ capture. Try again.\")\n        else:\n            print(\"Invalid move.\
          \ Try again.\")\n\n    def check_winner(self):\n        if any('white' in\
          \ row for row in self.board):\n            return \"Black wins!\"\n    \
          \    elif any('black' in row for row in self.board):\n            return\
          \ \"White wins!\"\n        else:\n            return \"Draw!\"\n\n    def\
          \ switch_turns(self):\n        self.current_player = 'black' if self.current_player\
          \ == 'white' else 'white'\n\nif __name__ == '__main__':\n    game = CheckersGame()\n\
          \    while True:\n        game.print_board()"
