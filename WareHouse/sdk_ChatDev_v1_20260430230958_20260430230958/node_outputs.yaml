          n    running = True\\n    selected = None\\n\\n    while running:\\n   \
          \     for event in pygame.event.get():\\n            if event.type == pygame.QUIT:\\\
          n                running = False\\n            elif event.type == pygame.MOUSEBUTTONDOWN:\\\
          n                row, col = event.pos[1] // CELL_SIZE, event.pos[0] // CELL_SIZE\\\
          n                if board[row][col] is not None and selected is None:\\\
