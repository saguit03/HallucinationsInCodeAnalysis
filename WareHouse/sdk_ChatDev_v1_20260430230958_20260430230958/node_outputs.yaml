          Player {player}'s turn. Enter move (e.g., a1-b2):\")\n    return input()\n\
          ```\n\n### Step 3: Ensure All Files Are Fully Implemented\n\nWe have implemented\
          \ all the unimplemented classes and methods. Now, let's verify if everything\
          \ is working as expected.\n\n**main.py**\n```python\nfrom game import Game\n\
          \nif __name__ == \"__main__\":\n    game = Game()\n    game.run()\n```\n\
          \n### Step 4: Test the Implementation\n\nRun `python main.py` to start the\
