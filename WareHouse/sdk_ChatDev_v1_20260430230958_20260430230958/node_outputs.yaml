          \            return 'K' if self.color == 'black' else 'k'\n        return\
          \ 'P' if self.color == 'black' else 'p'\n```\n\n#### Helper Functions Implementation\n\
          \n**helpers.py**\n```python\ndef is_valid_move(from_pos, to_pos):\n    #\
