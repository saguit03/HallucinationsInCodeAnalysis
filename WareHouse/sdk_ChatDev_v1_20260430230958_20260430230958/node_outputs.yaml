          \ Piece(color)\n\n    def __str__(self):\n        board_str = \"   A B C\
          \ D E F G H\\n\"\n        for i, row in enumerate(self.grid, start=1):\n\
          \            board_str += f\"{i} |{'|'.join('P' if piece is not None else\
          \ ' ' for piece in row)}|\\n\"\n        return board_str\n\n    def move_piece(self,\
          \ from_pos, to_pos):\n        x_from, y_from = self._get_coordinates(from_pos)\n\
          \        x_to, y_to = self._get_coordinates(to_pos)\n\n        piece = self.grid[x_from][y_from]\n\
