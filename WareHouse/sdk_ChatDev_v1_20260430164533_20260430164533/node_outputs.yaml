          \ in [Piece.RED, Piece.BLACK]:\n            return abs(dy) == 1\n      \
          \  elif piece in [Piece.RED_KING, Piece.BLACK_KING]:\n            return\
          \ abs(dy) == 1 or abs(dy) == 2\n\n    def is_capture_move(self, move):\n\
          \        return abs(move.to_pos[1] - move.from_pos[1]) == 2 and self.board[(move.from_pos[0]\
          \ + move.to_pos[0]) // 2][(move.from_pos[1] + move.to_pos[1]) // 2] != Piece.EMPTY\n\
