          \"uv_run\", \"arguments\": {\"script\": \"game.py\"}}\n   ```\n\n2. **Understanding
          the Board:**\n   The game board is an 8x8 grid with alternating dark and
          light squares. Each player starts with 12 pieces on one side of the board.\n\n##
          How to Play\n\n1. **Input Moves:**\n   To make a move, input the start position
