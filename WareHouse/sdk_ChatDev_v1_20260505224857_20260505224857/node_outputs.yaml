          will enforce all legal moves according to the Checkers rules, including
          capturing and kinging.\n\n3. **Detecting Win or Draw States:**\n   The software
          will automatically detect when a player has no valid moves left or when
          all pieces have been captured (win state), as well as when the board is
          in a draw.\n\n4. **Restarting the Game:**\n   After finishing a game, you
