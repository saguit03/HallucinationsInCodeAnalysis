          developed by ChatDev! This document provides a detailed guide on how to
          set up the environment, install necessary packages, and start playing the
          game.\n\n## Table of Contents\n\n1. **Introduction**\n2. **Installing Environment
          Dependencies**\n3. **Setting Up the Game**\n4. **How to Play**\n\n---\n\n##
          Introduction\n\nThis software allows you to play a classic game of Checkers
          (Draughts) on an 8x8 board with alternating turns between two players. The
          rules include standard capture and kinging mechanisms. This manual will
          guide you through setting up the environment, installing dependencies, and
          how to interact with the game.\n\n## Installing Environment Dependencies\n\nBefore
          starting the game, you need to set up a Python environment and install necessary
          packages. Follow these steps:\n\n1. **Run a UV Lock:**\n   ```json\n   {\"name\":
