          \ __init__(self):\n        self.board = np.zeros((8, 8), dtype=GamePiece)\n\
          \        self.initialize_board()\n\n    def initialize_board(self):\n  \
          \      colors = [(0, 1), (2, 3), (4, 5)]\n        for i in range(3):\n \
          \           for j in range(len(colors)):\n                x, y = colors[j]\n\
