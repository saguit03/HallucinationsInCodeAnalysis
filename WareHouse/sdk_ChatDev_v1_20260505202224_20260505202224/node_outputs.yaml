          \        while not self.check_winner():\n            self.board.print_board()\n\
          \            player_input = input(f\"Player {self.current_player.color},\
          \ enter move (e.g., 0-1): \")\n            start, end = map(int, player_input.split('-'))\n\
          \            move = Move((start // 8, start % 8), (end // 8, end % 8))\n\
          \            if not self.make_move(move):\n                print(\"Invalid\
          \ move. Try again.\")\n```\n\n#### main.py\n\nThis is the main module to\
