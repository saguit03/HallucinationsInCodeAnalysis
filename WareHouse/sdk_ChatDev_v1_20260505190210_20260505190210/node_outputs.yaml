          \            if self.board.is_valid_move(start_pos, end_pos):\n        \
          \        self.board.move_piece(start_pos, end_pos)\n                self.switch_player()\n\
          \            else:\n                print(\"Invalid move. Please try again.\"\
          )\n```\n\n### player.py\n\n```python\nfrom prompt_toolkit import prompt\n\
