          pieces according to standard rules, and promoting pieces to kings when reaching
          the opposite side of the board.\n\n## Prerequisites\n\nBefore you can start
          playing the Checkers (Draughts) Game, ensure that your development environment
          is set up with Python. Follow these steps:\n\n### Installing Python\n\n1.
          **Download and Install Python**:\n   - Visit the official Python website:
          [python.org](https://www.python.org/)\n   - Download the latest version
          of Python.\n   - Run the installer and make sure to check the box that says
          \"Add Python 3.x to PATH\".\n\n2. **Verify Installation**:\n   - Open a
          terminal or command prompt.\n   - Type `python --version` or `python3 --version`.\n   -
          Ensure it shows the installed version of Python.\n\n### Setting Up the Environment\n\n1.
          **Create and Activate a Virtual Environment** (optional but recommended):\n   ```bash\n   python
          -m venv checkers-env\n   source checkers-env/bin/activate  # On Windows,
          use `checkers-env\\Scripts\\activate`\n   ```\n\n2. **Install Required Packages**:\n   ```bash\n   pip
          install numpy pandas matplotlib\n   ```\n\n## Installing Environment Dependencies\n\n1.
          **Call the Python Package Installer Function**:\n   ```json\n   {\n     \"name\":
          \"install_python_packages\",\n     \"arguments\": {\n       \"packages\":
          [\n         \"numpy\",\n         \"pandas\",\n         \"matplotlib\"\n       ],\n       \"upgrade\":
          true\n     }\n   }\n   ```\n\n## How to Use/Play the Game\n\n### Launching
          the Game\n\n1. **Import Necessary Modules and Functions**:\n   ```python\n   from
          checkers_game import CheckersGame\n   ```\n\n2. **Initialize a New Game
          Instance**:\n   ```python\n   game = CheckersGame()\n   ```\n\n3. **Start
          Playing**:\n   - The game will prompt you to make moves in the format `from-to`
          (e.g., `12-20`).\n   - You can also type `exit` at any time to quit the
          game.\n\n### Game Rules and Movement\n\n1. **Player Turns**:\n   - Players
          take turns making moves.\n   - The player who starts first is usually designated
          as Player 1 (black pieces), and Player 2 (white pieces).\n\n2. **Making
          Moves**:\n   - Enter your move using the `from-to` notation, where `from`
          is the starting position of the piece and `to` is the destination.\n   -
          Example: `73-65` for a capture from (row=7, col=3) to (row=6, col=5).\n\n3.
          **Capturing Pieces**:\n   - To capture an opponent''s piece, move your piece
          diagonally to an unoccupied square that is immediately adjacent to the opponent’s
          piece.\n   - The opponent''s piece will be removed from the board.\n   -
          Multiple captures are possible in a single turn by continuing to capture
          consecutive pieces.\n\n4. **Kinging Pieces**:\n   - When a player moves
          their piece to the opposite side of the board (row 0 for black, row 7 for
          white), it is automatically promoted to a king.\n   - Kings can move diagonally
          in any direction and do not require jumping over other pieces like regular
          checkers.\n\n5. **Winning the Game**:\n   - The game ends when one player
          captures all of the opponent’s pieces or when the opponent is unable to
          make a legal move.\n   - The last player with valid moves wins the game.\n\n###
          Example Play Session\n\n1. **Starting the Game**:\n   ```python\n   game
          = CheckersGame()\n   ```\n\n2. **Player 1''s Move**:\n   ```\n   Player
          1''s turn: 73-65 (capturing a piece)\n   ```\n\n3. **Player 2''s Move**:\n   ```\n   Player
          2''s turn: 01-12\n   ```\n\n4. **Continue Playing**:\n   - The game will
          continue to prompt players for moves until the game is over.\n\n### Exiting
          the Game\n\n1. **Exit the Game**:\n   ```\n   Type ''exit'' at any time
          to quit.\n   exit\n   ```\n\n## Conclusion\n\nThis manual provides a comprehensive
          guide on how to set up and play an 8x8 checkers game using Python. By following
          these instructions, you can enjoy a strategic and engaging game of checkers
          (draughts) with your friends or family.", "encoding": "utf-8", "mode": "overwrite"}}'
