          \ using the specified Python version.\n\n2. **`install_python_packages(packages=[\"\
          checkers\"], upgrade=True)`**  \n   Installs necessary Python packages required\
          \ for running the Checkers game.\n\n3. **`uv_run(module=None, script=\"\
          game.py\", args=[], env={}, timeout_seconds=60)`**  \n   Executes a Python\
          \ module or script located in the workspace root directory with specified\
          \ arguments and environment variables.\n\n4. **`read_file_segment(path,\
          \ encoding=\"auto\", include_line_offsets=False, inline_line_numbers=False,\
          \ line_count=1, start_line=1)`**  \n   Reads a specified segment of lines\
          \ from a file, returning content based on line range and format options.\n\
          \n## Installation\n\n### Step 1: Initialize Python Environment\nBefore you\
          \ start playing, you need to initialize the Python environment. Run the\
          \ following command in your terminal:\n```sh\ninit_python_env(python_version=\"\
          3.8\")\n```\n\n### Step 2: Install Dependencies\nNext, install the necessary\
          \ Python packages required for the Checkers game:\n```sh\ninstall_python_packages(packages=[\"\
          checkers\"], upgrade=True)\n```\nThis will set up all the dependencies needed\
          \ to run the game.\n\n## Playing the Game\n\n### Start the Game\nTo start\
          \ playing the game, simply run the game script:\n```sh\nuv_run(script=\"\
          game.py\")\n```\n\n### Game Play Overview\n- **Players:** The game is played\
          \ by two players. Players take turns making moves.\n- **Move Notation:**\
          \ Moves are inputted in notation format (e.g., \"e2-e4\").\n- **Game Rules:**\
          \ Standard Draughts rules apply, including capture and kinging.\n\n## Example\
          \ Commands\n\n1. **Initialize Python Environment:**\n   ```sh\n   init_python_env(python_version=\"\
          3.8\")\n   ```\n\n2. **Install Dependencies:**\n   ```sh\n   install_python_packages(packages=[\"\
          checkers\"], upgrade=True)\n   ```\n\n3. **Start the Game:**\n   ```sh\n\
