        text: "# Checkers (Draughts) Game User Manual\n\n## Introduction\nWelcome\
          \ to the Checkers (Draughts) game developed at ChatDev! This user manual\
          \ will guide you through setting up the environment, installing necessary\
          \ dependencies, and playing the game.\n\n## Table of Contents\n1. [Overview](#overview)\n\
          2. [Installation](#installation)\n3. [How to Play](#how-to-play)\n\n## Overview\n\
          \nCheckers is a strategy board game for two players. It is played on an\
          \ 8x8 square grid with alternating light and dark squares. The objective\
          \ is to capture all of the opponent's pieces or prevent them from moving.\n\
          \n## Installation\n\nTo get started, you need to set up your environment\
          \ and install any necessary dependencies. Follow these steps:\n\n### Initialize\
          \ Python Environment\nBefore you start, ensure that you have a suitable\
          \ Python version installed. ChatDev provides a function to initialize a\
          \ Python environment within the workspace.\n\n```json\n{\"name\": \"init_python_env\"\
          , \"arguments\": {\"python_version\": \"3.9\"}}\n```\n\nThis command initializes\
          \ a new Python virtual environment with Python 3.9.\n\n### Install Required\
          \ Packages\nNext, you need to install any required Python packages for the\
          \ game. ChatDev allows you to add packages using `uv add`.\n\n```json\n\
          {\"name\": \"install_python_packages\", \"arguments\": {\"packages\": [\"\
          checkers_game\"], \"upgrade\": true}}\n```\n\nThis command installs the\
          \ `checkers_game` package and upgrades it if necessary.\n\n## How to Play\n\
          \n### Game Setup\nOnce your environment is set up, you can start a new game.\
          \ The game will prompt you for moves in algebraic notation (e.g., from-to\
          \ positions).\n\n1. **Start a New Game**:\n   To begin playing, simply run\
          \ the game module:\n\n   ```json\n   {\"name\": \"uv_run\", \"arguments\"\
          : {\"module\": \"checkers_game\"}}\n   ```\n\n2. **Make Moves**:\n   During\
          \ your turn, enter your move in algebraic notation (e.g., `e7-e5`). If you\
          \ need to capture multiple pieces in a single turn, separate the moves with\
          \ a semicolon (e.g., `d6-c4;e4-d3`).\n\n3. **End Your Turn**:\n   Once all\
          \ moves for your turn are entered, press Enter to end your turn.\n\n###\
          \ Game Rules\n- **Capturing**: Pieces can capture diagonally adjacent enemy\
          \ pieces by jumping over them.\n- **Kinging**: When a piece reaches the\
          \ opponent's far side of the board, it is crowned a king. Kings can move\
          \ and capture in any direction (forward or backward) along diagonals.\n\
          - **Game End**: The game ends when one player has no more legal moves or\
          \ all pieces have been captured.\n\n### Examples\nHere are some example\
          \ moves:\n- Single capture: `e7-e5`\n- Multi-capture with sequential moves:\
          \ `d6-c4;e4-d3`\n\n## Conclusion\nWe hope you enjoy playing Checkers (Draughts)\
          \ at ChatDev! If you encounter any issues, please refer to the documentation\
          \ or contact our support team.\n\nHappy gaming!"
      metadata:
        source: Chief Product Officer
