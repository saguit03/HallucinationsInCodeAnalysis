          \ to_pos):\n                print(\"Invalid move. Try again.\")\n      \
          \          continue\n\n            row_from, col_from = ord(from_pos[0])\
          \ - 97, int(from_pos[1:]) - 1\n            row_to, col_to = ord(to_pos[0])\
          \ - 97, int(to_pos[1:]) - 1\n\n            if abs(col_to - col_from) ==\
          \ 2:\n                self.board.capture_piece((row_from, col_from), (row_to,\
          \ col_to))\n            else:\n                self.board.move_piece((row_from,\
          \ col_from), (row_to, col_to))\n\n            if row_to in [0, 7]:\n   \
          \             self.board.king_piece((row_to, col_to))\n\n            if\
          \ self.current_player == 'W':\n                self.current_player = 'B'\n\
          \            else:\n                self.current_player = 'W'\n\n      \
          \  print(\"Game Over!\")\n```\n\n4. **main.py**\n\n```python\n\"\"\"\nThis\
          \ is the main module to launch the program\n\"\"\"\n\nfrom game import Game\n\
          \nif __name__ == \"__main__\":\n    game = Game()\n    game.play()\n```\n\
          \n### Saving the Code\n\n1. **Piece.py**\n\n```json\n{\"name\": \"save_file\"\
          , \"arguments\": {\"path\": \"piece.py\", \"content\": \"class Piece:\\\
          n    def __init__(self, color):\\n        self.color = color\\n        self.king\
          \ = False\\n\\n    def is_king(self):\\n        return self.king\\n\\n \
          \   def __str__(self):\\n        if self.color == 'W':\\n            return\
          \ 'W' if not self.king else 'WK'\\n        elif self.color == 'B':\\n  \
          \          return 'B' if not self.king else 'BK'\"}}\n```\n\n2. **Board.py**\n\
          \n```json\n{\"name\": \"save_file\", \"arguments\": {\"path\": \"board.py\"\
          , \"content\": \"class Board:\\n    def __init__(self):\\n        self.board\
          \ = [[None] * 8 for _ in range(8)]\\n        self.setup_board()\\n\\n  \
          \  def setup_board(self):\\n        colors = ['W', 'B']\\n        for row\
          \ in range(3):\\n            for col in range((row + 1) % 2, 8, 2):\\n \
          \               self.board[row][col] = Piece(colors[row])\\n        for\
          \ row in range(5, 8):\\n            for col in range((row + 1) % 2, 8, 2):\\\
          n                self.board[row][col] = Piece(colors[1 - row])\\n\\n   \
          \ def print_board(self):\\n        for row in self.board:\\n           \
          \ print(' '.join(piece.__str__() if piece else '  ' for piece in row))\\\
          n\\n    def move_piece(self, from_pos, to_pos):\\n        row_from, col_from\
          \ = from_pos\\n        row_to, col_to = to_pos\\n        self.board[row_to][col_to]\
          \ = self.board[row_from][col_from]\\n        self.board[row_from][col_from]\
          \ = None\\n\\n    def capture_piece(self, from_pos, to_pos):\\n        row_from,\
          \ col_from = from_pos\\n        row_to, col_to = to_pos\\n        captured_row,\
          \ captured_col = (row_from + row_to) // 2, (col_from + col_to) // 2\\n \
          \       self.board[row_to][col_to] = self.board[row_from][col_from]\\n \
          \       self.board[row_from][col_from] = None\\n        self.board[captured_row][captured_col]\
          \ = None\\n\\n    def is_valid_move(self, from_pos, to_pos):\\n        row_from,\
          \ col_from = from_pos\\n        row_to, col_to = to_pos\\n        if abs(row_to\
          \ - row_from) != 1 or abs(col_to - col_from) not in [1, 2]:\\n         \
          \   return False\\n\\n        piece = self.board[row_from][col_from]\\n\
          \        if piece is None:\\n            return False\\n\\n        color\
          \ = piece.color\\n        if (color == 'W' and row_to < row_from) or (color\
          \ == 'B' and row_to > row_from):\\n            return False\\n\\n      \
          \  if self.board[row_to][col_to] is not None:\\n            return False\\\
          n\\n        if abs(col_to - col_from) == 2:\\n            captured_row,\
          \ captured_col = (row_from + row_to) // 2, (col_from + col_to) // 2\\n \
          \           if self.board[captured_row][captured_col] is None or self.board[captured_row][captured_col].color\
          \ == color:\\n                return False\\n\\n        return True\\n\\\
          n    def king_piece(self, pos):\\n        row, col = pos\\n        piece\
          \ = self.board[row][col]\\n        if piece and (row == 0 and piece.color\
          \ == 'W' or row == 7 and piece.color == 'B'):\\n            piece.king =\
          \ True\"}}\n```\n\n3. **Game.py**\n\n```json\n{\"name\": \"save_file\",\
