          n        self.current_player = 'W'\\n\\n    def play(self):\\n        while\
          \ True:\\n            print(f\\\"Current player: {self.current_player}\\\
          \")\\n            self.board.print_board()\\n\\n            from_pos = input(\\\
          \"Enter the starting position (e.g., a1): \\\")\\n            to_pos = input(\\\
          \"Enter the ending position (e.g., b2): \\\")\\n\\n            if not self.board.is_valid_move(from_pos,\
          \ to_pos):\\n                print('Invalid move. Try again.')\\n      \
          \          continue\\n\\n            row_from, col_from = ord(from_pos[0])\
          \ - 97, int(from_pos[1:]) - 1\\n            row_to, col_to = ord(to_pos[0])\
          \ - 97, int(to_pos[1:]) - 1\\n\\n            if abs(col_to - col_from) ==\
          \ 2:\\n                self.board.capture_piece((row_from, col_from), (row_to,\
          \ col_to))\\n            else:\\n                self.board.move_piece((row_from,\
          \ col_from), (row_to, col_to))\\n\\n            if row_to in [0, 7]:\\n\
          \                self.board.king_piece((row_to, col_to))\\n\\n         \
          \   if self.current_player == 'W':\\n                self.current_player\
          \ = 'B'\\n            else:\\n                self.current_player = 'W'\\\
          \"}}\n```\n\n4. **main.py**\n\n```json\n{\"name\": \"save_file\", \"arguments\"\
