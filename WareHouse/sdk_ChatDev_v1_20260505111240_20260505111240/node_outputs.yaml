        text: "# Manual: Checkers (Draughts) Game\n\n## Introduction\n\nWelcome to\
          \ the Checkers (Draughts) game developed by ChatDev. This manual provides\
          \ a detailed guide on how to set up the environment, install necessary dependencies,\
          \ and play the game.\n\n## Environment Setup\n\n### Prerequisites\n\n- Python\
          \ 3.8 or later\n\n### Installing Dependencies\n\nTo get started, you need\
          \ to initialize your Python environment and install the required packages.\n\
          \n1. **Initialize Python Environment:**\n\n   ```json\n   {\n     \"name\"\
          : \"init_python_env\",\n     \"arguments\": {\n       \"python_version\"\
          : \"3.8\"\n     }\n   }\n   ```\n\n2. **Install Necessary Packages:**\n\n\
          \   ```json\n   {\n     \"name\": \"install_python_packages\",\n     \"\
          arguments\": {\n       \"packages\": [\"checkers\", \"click\"],\n      \
          \ \"upgrade\": true\n     }\n   }\n   ```\n\n## Using the Game\n\n### Running\
          \ the Game\n\nTo start the game, simply execute the following command:\n\
          \n```sh\npython checkers/main.py\n```\n\nThis will launch the Checkers (Draughts)\
          \ game in your terminal.\n\n### How to Play\n\n1. **Move Pieces:**\n\n \
          \  To move a piece from one position to another, use the standard move notation.\
          \ For example, to move a piece from square A2 to B3, you would input `A2-B3`.\
          \ If capturing is possible, provide both positions for the capture, e.g.,\
          \ `A2-C4`.\n\n2. **Promoting Pieces:**\n\n   Once a piece reaches the opponent's\
          \ starting row (either the 8th or 1st rank), it will automatically be promoted\
          \ to a king.\n\n3. **Game Completion:**\n\n   The game ends when one player\
          \ captures all of the opponent’s pieces or when no legal moves are available.\
          \ The winner is declared at the end of the game.\n\n### Sample Game Session\n\
          \n```sh\nWelcome to Checkers (Draughts)!\n\nCurrent Board:\n8 . B . B .\
          \ B .\n7 . . . . . .\n6 B . B . B . B\n5 . . . . . .\n4 . W . W . W\n3 .\
          \ . . . . .\n2 W . W . W .\n1 . W . W . W\n\nYour turn (W):\nMove: A2-B3\n\
          Current Board:\n8 . B . B . B .\n7 . . . . . .\n6 B . B . B . B\n5 . . .\
          \ . . .\n4 . W . W . W\n3 . . . . . .\n2 W . B . W .\n1 . W . W . W\n\n\
          Your turn (B):\nMove: B6-C8\nCurrent Board:\n8 . B . B . B .\n7 . . . .\
          \ . .\n6 B . . . . B\n5 . . . . . .\n4 . W . W . W\n3 . . . . . .\n2 W .\
          \ . . W .\n1 . W . W . W\n\n...\nGame Over! Winner: B\n```\n\n## Conclusion\n\
          \nThat's it! You now have everything you need to play the Checkers (Draughts)\
          \ game. Enjoy your gameplay!"
