          \ . . . . .\\n4 . W . W . W\\n3 . . . . . .\\n2 W . . . W .\\n1 . W . W\
          \ . W\\n\\n...\\nGame Over! Winner: B\\n```\\n\\n## Conclusion\\n\\nThat's\
