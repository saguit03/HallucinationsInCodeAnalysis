          5. **Move**: Represents a move made by a player, including capturing and\
          \ kinging rules.\n\nLet's start by creating Python venv and installing necessary\
          \ packages.\n\n```json\n{\n  \"name\": \"init_python_env\",\n  \"arguments\"\
          : {\n    \"python_version\": \"3.9\"\n  }\n}\n```\n\nNext, we need to install\
          \ any required packages. For this game, we might not need external packages,\
          \ but let's ensure we have everything set up correctly.\n\n```json\n{\n\
          \  \"name\": \"install_python_packages\",\n  \"arguments\": {\n    \"packages\"\
          : [],\n    \"upgrade\": false\n  }\n}\n```\n\nNow, let's implement the core\
          \ classes and functions. We'll start with the `Piece` class.\n\n**piece.py**\n\
          \n```python\n\"\"\"\nRepresents a piece on the board, either red or black,\
          \ and can be in its standard form or kinged.\n\"\"\"\n\nclass Piece:\n \
          \   def __init__(self, color, is_king=False):\n        self.color = color\n\
          \        self.is_king = is_king\n\n    def __str__(self):\n        if self.is_king:\n\
