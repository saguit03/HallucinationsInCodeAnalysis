          }}\n```\n\n### Game Flow\n1. **Move Prompt**:\n   After each move, the game\
          \ will prompt you to enter a move in notation (e.g., from-to positions).\n\
          \n2. **Input Example**:\n   To move a piece from square `a5` to `b6`, you\
          \ would input:\n\n   ```\n   a5 b6\n   ```\n\n3. **Capture and Kinging**:\n\
          \   The game will automatically handle capture and kinging according to\
          \ the standard rules.\n\n4. **End Game Detection**:\n   Once all legal moves\
          \ are enforced, the game will detect whether there is a win or draw state\
