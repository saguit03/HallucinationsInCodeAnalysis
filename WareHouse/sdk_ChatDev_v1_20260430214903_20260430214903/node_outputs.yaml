          \ == 2:\n            # Check if it's a jump move\n            mid_row, mid_col\
          \ = (row_from + row_to) // 2, (col_from + col_to) // 2\n            if self.board.board[mid_row,\
          \ mid_col] != -self.current_player:\n                return False\n    \
          \        else:\n                self.moves_history.append((from_pos, to_pos))\n\
          \                self.board.board[row_to, col_to] = piece\n            \
