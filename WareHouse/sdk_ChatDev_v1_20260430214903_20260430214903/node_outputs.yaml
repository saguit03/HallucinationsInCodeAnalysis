          board state accordingly.\n   - Invalid moves will be flagged, and players
          must re-enter valid moves.\n\n3. **Game Progression**:\n   - The game automatically
          switches turns between players after a valid move.\n   - Capture moves are
          handled automatically, promoting checkers to kings if they reach the other
          side of the board.\n\n4. **Win/Draw Conditions**:\n   - The game detects
          win or draw conditions based on standard Draughts rules.\n   - Once detected,
          the software announces the result and prompts for a restart or exit.\n\n##
