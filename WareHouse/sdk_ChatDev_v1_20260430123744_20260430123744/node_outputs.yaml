          \ end = map(int, move.split())\\n    return (start // 10, start % 10), (end\
          \ // 10, end % 10)\\n\\n\\ndef make_move(board, start, end, player):\\n\
          \    x1, y1 = start\\n    x2, y2 = end\\n\\n    board[x2][y2] = player\\\
          n    board[x1][y1] = ' '\\n\\n    # Check for capture\\n    dx, dy = abs(x2\
          \ - x1), abs(y2 - y1)\\n    if dx == 2 and dy == 2:\\n        board[(x1\
          \ + x2) // 2][(y1 + y2) // 2] = ' '\\n\\n    # Check for kinging\\n    if\
          \ player == 'B' and x2 == 0 or player == 'R' and x2 == 7:\\n        board[x2][y2]\
          \ = 'K'\\n\\n    return board\\n\\n\\ndef check_winner(board, player):\\\
          n    opponent = 'B' if player == 'R' else 'R'\\n\\n    # Check for win\\\
          n    if any(piece in ['B', 'K'] and piece != opponent for row in board for\
          \ piece in row) and all(\\n        not is_valid_move(board, (x1, y1), (x2,\
          \ y2), player)\\n        for x1 in range(8)\\n        for y1 in range(8)\\\
          n        for x2 in range(8)\\n        for y2 in range(8)\\n    ):\\n   \
          \     return opponent\\n\\n    # Check for draw\\n    if not any(\\n   \
          \     is_valid_move(board, (x1, y1), (x2, y2), player)\\n        for x1\
          \ in range(8)\\n        for y1 in range(8)\\n        for x2 in range(8)\\\
          n        for y2 in range(8)\\n    ):\\n        return 'draw'\\n\\n    return\
          \ None\\n\\n\\ndef play_checkers():\\n    board = initialize_board()\\n\
          \    current_player = 'B'\\n\\n    while True:\\n        print_board(board)\\\
          n        start, end = get_move(current_player)\\n        if is_valid_move(board,\
          \ start, end, current_player):\\n            board = make_move(board, start,\
          \ end, current_player)\\n            winner = check_winner(board, current_player)\\\
          n            if winner:\\n                print_board(board)\\n        \
          \        if winner == 'draw':\\n                    print(\\\"It's a draw!\\\
          \")\\n                else:\\n                    print(f\\\"{winner} wins!\\\
          \")\\n                break\\n        else:\\n            print(\\\"Invalid\
          \ move. Try again.\\\")\\n        current_player = 'R' if current_player\
          \ == 'B' else 'B'\\n\\nif __name__ == \\\"__main__\\\":\\n    play_checkers()\\\
          n\", \"encoding\": \"utf-8\", \"mode\": \"overwrite\"}}\n```"
      metadata:
