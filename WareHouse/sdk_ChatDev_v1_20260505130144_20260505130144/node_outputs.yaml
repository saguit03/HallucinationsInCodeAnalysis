          False\n        return True\n\n    def move(self, start_pos, end_pos):\n        if
          self.is_valid_move(start_pos, end_pos):\n            start_row, start_col
          = start_pos\n            end_row, end_col = end_pos\n            piece =
          self.board[start_row][start_col]\n            self.board[end_row][end_col]
