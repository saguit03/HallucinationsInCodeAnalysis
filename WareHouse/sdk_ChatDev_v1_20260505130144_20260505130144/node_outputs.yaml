          \ import Piece\\n\\nclass CheckersGame:\\n    def __init__(self):\\n   \
          \     self.board = Board()\\n        self.players = [Player(1), Player(2)]\\\
          n        self.current_player = 0\\n\\n    def play(self):\\n        while\
          \ True:\\n            self.print_board()\\n            move = input(f'Player\
          \ {self.current_player + 1}, enter your move (e.g., a1-b2): ').strip().lower()\\\
          n            if move == 'exit':\\n                break\\n            if\
