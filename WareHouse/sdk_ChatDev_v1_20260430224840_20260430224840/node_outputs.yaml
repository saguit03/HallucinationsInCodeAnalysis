          check_game_over(board, turn):\n                print_board(board)\n                piece
          = ''White'' if turn == 2 else ''Black''\n                print(f''{piece}
          wins!'')\n                break\n            turn = 3 - turn  # Switch turns\n        else:\n            print(''Invalid
