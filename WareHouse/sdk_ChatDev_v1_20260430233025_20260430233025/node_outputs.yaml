          2. **Installing Dependencies**\n3. **How to Play**\n\n## 1. Setting Up the\
          \ Environment\n\nTo start playing Checkers (Draughts), you need a suitable\
          \ Python environment with all required packages installed.\n\n### Step-by-Step\
          \ Guide:\n1. Open your terminal or command prompt.\n2. Execute the following\
          \ command to create and activate a Python virtual environment:\n\n```bash\n\
          init_python_env {\"python_version\": \"3.8\"}\n```\n\nThis command initializes\
          \ a new Python 3.8 environment with `uv-lock` and `uv-venv`.\n\n## 2. Installing\
          \ Dependencies\n\nOnce your environment is set up, you need to install the\
          \ necessary Python packages.\n\n### Step-by-Step Guide:\n1. Run the following\
          \ command to install the required Python packages:\n\n```bash\ninstall_python_packages\
          \ {\"packages\": [\"checkers-game\"]}\n```\n\nThis command installs the\
          \ `checkers-game` package which contains all the functionalities needed\
          \ for our Checkers (Draughts) game.\n\n## 3. How to Play\n\nAfter setting\
          \ up the environment and installing dependencies, you can start playing\
          \ Checkers (Draughts).\n\n### Step-by-Step Guide:\n\n1. Open a Python script\
          \ in your IDE or text editor.\n2. Import the `checkers_game` module:\n\n\
          ```python\nimport checkers_game as cg\n```\n\n3. Initialize a new game instance:\n\
          \n```python\ngame = cg.Game()\n```\n\n4. To display the current board state,\
          \ call:\n\n```python\nprint(game.board)\n```\n\n5. To make a move, use the\
          \ following format to specify from-to positions in standard notation (e.g.,\
          \ \"a1-a3\"):\n\n```python\nmove = input(\"Enter your move (from-to): \"\
          )\ngame.make_move(move)\n```\n\n6. To check if the game has ended and determine\
          \ the winner or draw state, call:\n\n```python\nresult = game.check_game_over()\n\
          print(result)\n```\n\n### Example Game Flow\n\nHere's a brief example of\
          \ how to run a simple game:\n\n```python\nimport checkers_game as cg\n\n\
          game = cg.Game()\n\nwhile not game.check_game_over():\n    print(\"Current\
          \ Board:\")\n    print(game.board)\n    \n    move = input(\"Enter your\
          \ move (from-to): \")\n    if game.is_valid_move(move):\n        game.make_move(move)\n\
          \    else:\n        print(\"Invalid move. Please try again.\")\n\nresult\
          \ = game.check_game_over()\nprint(\"Game Over!\")\nprint(f\"Result: {result}\"\
          )\n```\n\n### Important Rules\n- The game uses an 8x8 board.\n- Players\
          \ alternate turns making moves.\n- Capture is mandatory when possible.\n\
          - A piece becomes a king if it reaches the opponent's side of the board.\n\
          - The first player to have no pieces left loses. If both players are stalemated,\
          \ the game ends in a draw.\n\n## Conclusion\n\nCongratulations! You now\
          \ have a fully functional Checkers (Draughts) game ready to play. Enjoy\
