          \      pattern = r'[a-h][1-8]\\s*([-x]+)\\s*[a-h][1-8]'\\n        match\
          \ = re.match(pattern, notation)\\n        if not match:\\n            raise\
          \ ValueError(\\\"Invalid move notation\\\")\\n\\n        start_pos, _, end_pos\
