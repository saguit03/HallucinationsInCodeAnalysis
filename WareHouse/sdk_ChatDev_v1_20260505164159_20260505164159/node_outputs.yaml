          upgrade\": true\n  }\n}\n```\n\n### Step 2: Implement the Core Classes and\
          \ Functions\n\n1. **CheckersGame.py**\n\n```python\n\"\"\"\nThis module\
          \ contains the main game logic for Checkers.\n\"\"\"\n\nfrom board import\
          \ Board\nfrom player import Player\nfrom move import Move\n\nclass CheckersGame:\n\
          \    def __init__(self):\n        self.board = Board()\n        self.players\
          \ = [Player('red'), Player('black')]\n        self.current_player_index\
          \ = 0\n\n    def switch_turn(self):\n        self.current_player_index =\
          \ 1 - self.current_player_index\n\n    def play_game(self):\n        while\
          \ not self.board.is_game_over():\n            current_player = self.players[self.current_player_index]\n\
          \            move_input = input(f\"{current_player.color} player, enter\
          \ your move (from-to): \")\n            try:\n                move = Move.from_notation(move_input)\n\
          \                if move.validate(self.board, self.players[self.current_player_index]):\n\
          \                    self.board.make_move(move)\n                    self.switch_turn()\n\
          \                else:\n                    print(\"Invalid move. Please\
          \ try again.\")\n            except ValueError as e:\n                print(e)\n\
          \n        winner = self.board.get_winner()\n        if winner:\n       \
