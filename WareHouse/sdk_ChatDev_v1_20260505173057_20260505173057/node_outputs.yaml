          \ import *\\n\\n# Initialize Pygame\\npygame.init()\\n\\n# Set up the display\\\
          nWIDTH, HEIGHT = 800, 600\\nscreen = pygame.display.set_mode((WIDTH, HEIGHT))\\\
          npygame.display.set_caption('Checkers')\\n\\n# Colors\\nBLACK = (0, 0, 0)\\\
          nWHITE = (255, 255, 255)\\nRED = (255, 165, 0)\\nGREEN = (0, 255, 0)\\n\\\
          n# Board dimensions and squares\\nBOARD_SIZE = 8\\nSQUARE_SIZE = WIDTH //\
          \ BOARD_SIZE\\n\\n# Player colors\\nPLAYER_COLORS = {1: RED, 2: GREEN}\\\
          n\\n# Piece types\\nclass Piece:\\n    def __init__(self, color, king=False):\\\
          n        self.color = color\\n        self.king = king\\n\\n    def __str__(self):\\\
          n        return 'K' if self.king else '.'\\n\\n# Initialize the board\\\
          ndef init_board():\\n    board = [[None for _ in range(BOARD_SIZE)] for\
          \ _ in range(BOARD_SIZE)]\\n    for row in range(BOARD_SIZE // 2):\\n  \
          \      for col in range((row + row % 2) % 2, BOARD_SIZE, 2):\\n        \
          \    board[row][col] = Piece(PLAYER_COLORS[1])\\n        for col in range((row\
          \ + (row + 1) % 2) % 2, BOARD_SIZE, 2):\\n            board[BOARD_SIZE -\
          \ row - 1][col] = Piece(PLAYER_COLORS[2])\\n    return board\\n\\n# Draw\
          \ the board\\ndef draw_board(board):\\n    screen.fill(BLACK)\\n    for\
          \ row in range(BOARD_SIZE):\\n        for col in range(BOARD_SIZE):\\n \
          \           color = WHITE if (row + col) % 2 else BLACK\\n            pygame.draw.rect(screen,\
          \ color, (col * SQUARE_SIZE, row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE),\
          \ 0)\\n    for row in range(BOARD_SIZE):\\n        for col in range(BOARD_SIZE):\\\
          n            piece = board[row][col]\\n            if piece:\\n        \
          \        center_x = col * SQUARE_SIZE + SQUARE_SIZE // 2\\n            \
          \    center_y = row * SQUARE_SIZE + SQUARE_SIZE // 2\\n                pygame.draw.circle(screen,\
          \ piece.color, (center_x, center_y), SQUARE_SIZE // 2 - 10)\\n         \
          \       if piece.king:\\n                    pygame.draw.circle(screen,\
          \ GREEN, (center_x, center_y), 8)\\n    pygame.display.flip()\\n\\n# Check\
          \ for legal moves\\ndef is_valid_move(board, from_pos, to_pos):\\n    row_from,\
          \ col_from = from_pos\\n    row_to, col_to = to_pos\\n    piece = board[row_from][col_from]\\\
          n    if not piece or piece.color != current_player:\\n        return False\\\
          n    if abs(row_to - row_from) == 1 and abs(col_to - col_from) == 1:\\n\
          \        return True\\n    elif abs(row_to - row_from) == 2 and abs(col_to\
          \ - col_from) == 2:\\n        intermediate_pos = (row_from + (row_to - row_from)\
          \ // 2, col_from + (col_to - col_from) // 2)\\n        if board[intermediate_pos[0]][intermediate_pos[1]]\
          \ and board[intermediate_pos[0]][intermediate_pos[1]].color != piece.color:\\\
          n            return True\\n    return False\\n\\n# Make a move\\ndef make_move(board,\
          \ from_pos, to_pos):\\n    row_from, col_from = from_pos\\n    row_to, col_to\
          \ = to_pos\\n    board[row_to][col_to] = board[row_from][col_from]\\n  \
          \  board[row_from][col_from] = None\\n    if abs(row_to - row_from) == 2:\\\
          n        intermediate_pos = (row_from + (row_to - row_from) // 2, col_from\
          \ + (col_to - col_from) // 2)\\n        board[intermediate_pos[0]][intermediate_pos[1]]\
          \ = None\\n    if row_to in [0, BOARD_SIZE - 1]:\\n        board[row_to][col_to]\
          \ = Piece(PLAYER_COLORS[current_player], king=True)\\n    return board\\\
          n\\n# Check for game over\\ndef is_game_over(board):\\n    player_has_moves\
          \ = False\\n    for row in range(BOARD_SIZE):\\n        for col in range(BOARD_SIZE):\\\
          n            piece = board[row][col]\\n            if piece and piece.color\
