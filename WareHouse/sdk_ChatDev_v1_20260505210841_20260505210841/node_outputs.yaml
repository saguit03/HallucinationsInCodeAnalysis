      - type: text
        text: "# Manual: Checkers (Draughts) Game\n\n## Introduction\n\nWelcome to\
          \ the Checkers (Draughts) game developed by ChatDev. This manual provides\
          \ detailed instructions on how to set up the environment, install dependencies,\
          \ and play the game.\n\n## Table of Contents\n\n1. [Setting Up the Environment](#setting-up-the-environment)\n\
          2. [Installing Dependencies](#installing-dependencies)\n3. [Playing the\
          \ Game](#playing-the-game)\n\n---\n\n## Setting Up the Environment\n\nTo\
          \ begin playing the Checkers (Draughts) game, you need to set up your development\
          \ environment.\n\n1. **Initialize Python Environment**:\n   Ensure that\
          \ a Python environment is initialized with the required version.\n   ```json\n\
          \   {\n     \"name\": \"init_python_env\",\n     \"arguments\": {\n    \
          \   \"python_version\": \"3.8\"\n     }\n   }\n   ```\n\n2. **Install Required\
          \ Packages**:\n   Install the necessary Python packages for running the\
          \ game.\n   ```json\n   {\n     \"name\": \"install_python_packages\",\n\
          \     \"arguments\": {\n       \"packages\": [\n         \"checkers_game\"\
          \n       ],\n       \"upgrade\": true\n     }\n   }\n   ```\n\n---\n\n##\
          \ Installing Dependencies\n\nTo ensure that all dependencies are correctly\
          \ installed and up-to-date, follow these steps:\n\n1. **Run Python Initialization**:\n\
          \   Execute the initialization of the Python environment to set up a virtual\
          \ environment.\n   ```json\n   {\n     \"name\": \"init_python_env\",\n\
          \     \"arguments\": {\n       \"python_version\": \"3.8\"\n     }\n   }\n\
          \   ```\n\n2. **Install Necessary Packages**:\n   Install the game package\
          \ using `uv add` for dependency management.\n   ```json\n   {\n     \"name\"\
          : \"install_python_packages\",\n     \"arguments\": {\n       \"packages\"\
          : [\n         \"checkers_game\"\n       ],\n       \"upgrade\": true\n \
          \    }\n   }\n   ```\n\n---\n\n## Playing the Game\n\nOnce your environment\
          \ is set up, you can start playing the Checkers (Draughts) game.\n\n1. **Run\
          \ the Game**:\n   Execute the game using `uv run` to start the Checkers\
          \ (Draughts) application.\n   ```json\n   {\n     \"name\": \"uv_run\",\n\
          \     \"arguments\": {\n       \"module\": \"checkers_game.main\"\n    \
          \ }\n   }\n   ```\n\n2. **Game Rules and Controls**:\n   - The game is played\
          \ on an 8x8 grid with alternating light and dark squares.\n   - Players\
          \ take turns moving their pieces diagonally forward to the opponent's side\
          \ of the board.\n   - Capturing opponent pieces is done by jumping over\
          \ them and landing on an unoccupied square beyond.\n   - Pieces can be promoted\
          \ to kings when they reach the opposite end of the board.\n   - The game\
          \ ends in a win if one player captures all of the opponent's pieces or by\
          \ agreement.\n\n3. **Move Notation**:\n   - Enter moves using standard algebraic\
          \ notation (e.g., \"a1-b2\").\n\n4. **Game Management**:\n   - The game\
          \ automatically checks for legal moves and enforces rules.\n   - The game\
          \ state is updated after each valid move, showing the current positions\
          \ of all pieces.\n\n5. **Win or Draw Detection**:\n   - The game detects\
          \ win or draw conditions based on the game state.\n\n---\n\nEnjoy playing\
          \ Checkers (Draughts) with ChatDev's game!"
      metadata:
        source: Chief Product Officer
