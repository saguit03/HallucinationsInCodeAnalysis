          \ and board[nx][ny] == ' ':\n                        return True\n    \n\
          \    return False\n\ndef check_winner(board):\n    white_count = sum(row.count('R')\
          \ for row in board) + sum(row.count('Q') for row in board)\n    black_count\
          \ = sum(row.count('r') for row in board) + sum(row.count('q') for row in\
