          \ = ' '\n    \n    if piece == 'P' and x2 == 7:\n        board[x2][y2] =\
          \ 'Q'\n    if piece == 'p' and x2 == 0:\n        board[x2][y2] = 'q'\n```\n\
          \n### Step 4: Detect Win or Draw States\n\nFinally, we detect win or draw\
          \ states.\n\n```python\ndef has_legal_moves(board):\n    for i in range(8):\n\
          \        for j in range(8):\n            if (board[i][j] == 'P' and i <\
          \ 7) or (board[i][j] == 'p' and i > 0):\n                for dx, dy in [(2,\
