          \ player2):\n        self.player1 = player1\n        self.player2 = player2\n\
          \        self.board = Board()\n        self.current_player = player1\n\n\
          \    def switch_turn(self):\n        # Switch turns between players\n  \
          \      if self.current_player == self.player1:\n            self.current_player\
          \ = self.player2\n        else:\n            self.current_player = self.player1\n\
          \n    def play(self):\n        # Main game loop\n        while True:\n \
