          \ y1)\n        if not piece:\n            raise ValueError(\"No piece at\
          \ the specified position.\")\n        \n        if piece.color != self.color:\n\
          \            raise ValueError(\"It's not your turn to move this piece.\"\
          )\n        \n        # Implement move validation and execution\n       \
