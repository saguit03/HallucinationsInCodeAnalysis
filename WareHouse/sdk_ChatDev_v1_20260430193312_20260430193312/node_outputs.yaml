          #### File: checkers/game.py\n```python\nfrom .board import Board\nfrom .player\
          \ import Player\n\nclass Game:\n    def __init__(self):\n        self.board\
          \ = Board()\n        self.players = [Player('black'), Player('white')]\n\
          \        self.current_player = 0\n\n    def switch_turn(self):\n       \
