          \ is already occupied\\n        if self.board[to_pos[0]][to_pos[1]] is not\
          \ None:\\n            return False\\n\\n        # Check if it's the correct\
          \ player's turn\\n        piece = self.board[from_pos[0]][from_pos[1]]\\\
          n        if (piece == 'r' and self.turn != 'red') or (piece == 'b' and self.turn\
          \ != 'black'):\\n            return False\\n\\n        # Check if the move\
          \ is a valid single step\\n        if row_diff in [1, 2] and col_diff in\
          \ [1]:\\n            return True\\n\\n        # Check for jumps\\n     \
          \   if row_diff == 2 and col_diff == 2:\\n            middle_pos = ((from_pos[0]\
          \ + to_pos[0]) // 2, (from_pos[1] + to_pos[1]) // 2)\\n            if self.board[middle_pos[0]][middle_pos[1]]\
          \ is not None and self.turn != 'b' == (self.board[from_pos[0]][from_pos[1]]\
          \ in ['r', 'R']):\\n                return True\\n\\n        return False\\\
