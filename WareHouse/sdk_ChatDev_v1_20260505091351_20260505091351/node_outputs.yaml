          The game is played on an 8x8 board with alternating light and dark squares.\n  -
          Dark squares are where pieces can be placed.\n\n- **Piece Placement:**\n  -
          Players start with 12 pieces each, typically placed in the two back ranks
          of their opponent''s side.\n\n- **Move Mechanics:**\n  - Pieces move diagonally
          forward to an unoccupied square.\n  - Double jumps (jumping over another
          piece) are allowed if they result in capturing a piece. Multiple captures
          can be made by continuing to jump over pieces.\n\n- **Kings:**\n  - A piece
          becomes a king when it reaches the opponent''s starting row.\n  - Kings
          can move diagonally in any direction and capture multiple pieces at once
          without having to land on an intervening square.\n\n- **Winning the Game:**\n  -
          The game is won by capturing all of your opponent''s pieces.\n  - If neither
          player has legal moves, the game is a draw.\n\n## Commands\nHere are some
