          \  \"packages\": [\"checkers\"],\n       \"upgrade\": true\n     }\n   }\n\
          \   ```\n\n3. Import and run the game script:\n   ```\n   uv run checkers/game.py\n\
          \   ```\n\n4. Follow the on-screen prompts to enter your moves.\n\n## Conclusion\n\
          \nThis manual provides a comprehensive guide on how to set up and play our\
          \ Checkers (Draughts) game using Python. Whether you’re a seasoned programmer\
          \ or just starting out, this should help you quickly get up to speed with\
          \ the game’s features and rules. Enjoy playing!"
