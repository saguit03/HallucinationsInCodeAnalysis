          This will add the `chess` library to your environment. The `chess` library
          is widely used for playing and analyzing chess games, which we''ll use for
          our Checkers (Draughts) game.


          ## Using the Software


          ### Starting the Game

          To start a new game, navigate to the game''s directory in your workspace
          and run:


          ```json

          {"name": "uv_run", "arguments": {"module": "chess_game"}}

          ```


          This will execute the `chess_game` module inside your workspace.


          ### Making Moves

          During your turn, you need to enter moves in standard algebraic notation.
          For example, moving a piece from square e2 to e4 would be written as `e2-e4`.


          - **Simple Move**: Use `from-to` positions. Example: `e2-e4`.

          - **Capture Move**: Add an ''x'' between the positions and capture the opponent''s
          piece. Example: `e4xe5`.

          - **Kinging**: When a piece reaches the opposite end of the board, it can
          be kinged using the notation `nomenclature` or by special rules.


          ### Exiting the Game

          To exit the game at any time, press `Ctrl + C`.


          ## Game Rules Summary

          - **Objective**: Capture all of your opponent''s pieces.

          - **Turns**: Players take turns moving their pieces. A player cannot move
          a piece that has been captured.

          - **Capture**: Captures are mandatory when possible. Multiple captures can
          be made in one turn.

          - **Kings**: Pieces reach the other side and become kings, allowing diagonal
          movement.


          ## Error Handling

          If you make an invalid move or use incorrect notation, the game will prompt
          you to re-enter the move.


          ## Example Game Session

          ```

          Welcome to Checkers (Draughts)!


          Your turn, Player 1. Enter your move in algebraic notation: e2-e4

          ```


          Enter a valid move and press `Enter`. Continue making moves until the game
          ends with either a win or a draw.


          By following these instructions, you should be able to play a fully functional
          Checkers (Draughts) game using the provided software.'
