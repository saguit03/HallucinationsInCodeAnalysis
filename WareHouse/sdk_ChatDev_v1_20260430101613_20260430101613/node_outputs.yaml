          \ (Draughts) game! This manual provides instructions on how to set up and\
          \ play the game using our provided code.\n\n## Main Functions\n\n### 1.\
          \ `init_python_env`\n\nInitializes a Python environment with a specific\
          \ version inside the workspace.\n```json\n{\"name\": \"init_python_env\"\
          , \"arguments\": {\"python_version\": \"3.8\"}}\n```\n\n### 2. `install_python_packages`\n\
          \nInstalls necessary Python packages using `uv add`.\n```json\n{\"name\"\
          : \"install_python_packages\", \"arguments\": {\"packages\": [\"pygame\"\
          ], \"upgrade\": true}}\n```\n\n### 3. `uv_run`\n\nExecutes a Python script\
          \ inside the workspace root.\n```json\n{\"name\": \"uv_run\", \"arguments\"\
          : {\"module\": \"checkers_game\"}}\n```\n\n## Installing Environment Dependencies\n\
          \n1. **Initialize Python Environment:**\n   Use the `init_python_env` function\
          \ to set up a Python environment with the desired version (e.g., 3.8).\n\
          \   \n   ```json\n   {\"name\": \"init_python_env\", \"arguments\": {\"\
          python_version\": \"3.8\"}}\n   ```\n\n2. **Install Necessary Packages:**\n\
          \   Use the `install_python_packages` function to install required packages,\
          \ such as Pygame.\n   \n   ```json\n   {\"name\": \"install_python_packages\"\
          , \"arguments\": {\"packages\": [\"pygame\"], \"upgrade\": true}}\n   ```\n\
          \n## How to Play\n\n1. **Start the Game:**\n   Use the `uv_run` function\
          \ to execute the Checkers game script.\n   \n   ```json\n   {\"name\": \"\
          uv_run\", \"arguments\": {\"module\": \"checkers_game\"}}\n   ```\n\n2.\
          \ **Gameplay Instructions:**\n   - Players will be prompted to enter their\
          \ moves in algebraic notation (e.g., `e2-e4`).\n   - The game will alternate\
          \ turns between the two players.\n   - Standard capture and kinging rules\
          \ will be applied automatically.\n   - The game will detect win or draw\
          \ states and announce the outcome.\n\n3. **Exit Game:**\n   You can exit\
          \ the game by simply closing the terminal window where the script is running.\n\
          \n## Example of a Valid Move\n\n- Player 1 moves from square `e2` to `e4`:\
          \ Enter `e2-e4`\n- Player 2 captures a piece at square `c3`: Enter `d5xc3`\n\
          \n## Troubleshooting\n\n- If you encounter any issues, ensure that all dependencies\
          \ are installed correctly by running the installation commands.\n- If the\
          \ game does not update the board or accepts invalid moves, double-check\
          \ the input format and rules.\n\nFor further assistance, please contact\
