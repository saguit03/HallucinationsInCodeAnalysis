          a New Game\nto start a new game, run the following command:\n\n```json\n{\"name\":
          \"start_new_game\", \"arguments\": {}}\n```\nThis will initialize a new
          Checkers game with an 8x8 board and alternate turns between two players.\n\n###
          Step 2: Making Moves\nPlayers will be prompted to enter their moves in notation
          (e.g., from-to positions) as the game progresses. For example, moving a
          piece from \"A1\" to \"B2\":\n\n```json\n{\"name\": \"make_move\", \"arguments\":
          {\"move\": \"A1-B2\"}}\n```\n\n### Step 3: Capture and Kinging\nIf a capture
          is available, you can make it by specifying both the move and the captured
          position. For example:\n\n```json\n{\"name\": \"make_move\", \"arguments\":
          {\"move\": \"A1-C3 B4-A6\"}}\n```\nThis will move a piece from \"A1\" to
          \"C3\" and capture an opponent''s piece on \"B4\".\n\nIf your piece reaches
          the opponent''s side of the board, it will be automatically promoted to
