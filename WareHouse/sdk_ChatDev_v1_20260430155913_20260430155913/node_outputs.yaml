          \ self.current_player.color):\n                    print(f\"{self.current_player.name}\
          \ wins!\")\n                    self.game_over = True\n                elif\
          \ GameRules.check_draw_condition(self.board):\n                    print(\"\
          Game is a draw!\")\n                    self.game_over = True\n        \
          \        else:\n                    self.switch_turns()\n            else:\n\
          \                print(\"Invalid move. Try again.\")\n\n    def switch_turns(self):\n\
          \        if self.current_player == self.player1:\n            self.current_player\
          \ = self.player2\n        else:\n            self.current_player = self.player1\n\
          \nif __name__ == \"__main__\":\n    game = CheckersGame()\n    game.play()\n\
          ```\n\n##### board.py\n\n```python\n\"\"\"\nThis module contains the Board\
          \ class which represents the checkers board.\n\"\"\"\n\nfrom piece import\
          \ Piece, Color\n\nclass Board:\n    def __init__(self):\n        self.grid\
          \ = [[None for _ in range(8)] for _ in range(8)]\n        self.initialize_board()\n\
          \n    def initialize_board(self):\n        colors = [Color.RED, Color.BLACK]\n\
          \        positions = [(i, j) for i in range(3) for j in range(4) if (i +\
          \ j) % 2 == 1] + \\\n                    [(i, j) for i in range(5, 8) for\
          \ j in range(4) if (i + j) % 2 == 1]\n        for pos, color in zip(positions,\
          \ colors * len(positions)):\n            self.grid[pos[0]][pos[1]] = Piece(color)\n\
          \n    def apply_move(self, move, player_color):\n        from_pos = move.from_position\n\
          \        to_pos = move.to_position\n        piece = self.grid[from_pos[0]][from_pos[1]]\n\
