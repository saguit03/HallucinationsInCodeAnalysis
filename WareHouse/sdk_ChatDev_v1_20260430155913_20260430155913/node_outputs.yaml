          and captures based on player input.\n6. **Kingship Promotion**: Promotes
          a piece to a king when it reaches the opponent''s side of the board.\n7.
          **Win/Draw Detection**: Determines when the game has been won (one player
          has no more pieces) or drawn (no legal moves are available for either player).\n\n##
          Installation\n### Step 1: Initialize Python Environment\nBefore you can
          play Checkers, you need to set up a Python environment with all necessary
          packages.\n\n```json\n{\"name\": \"init_python_env\", \"arguments\": {\"python_version\":
          \"3.8\"}}\n```\nThis command will create a virtual environment using Python
          version 3.8.\n\n### Step 2: Install Python Packages\nAfter setting up the
          environment, install the required packages to run the Checkers game.\n\n```json\n{\"name\":
          \"install_python_packages\", \"arguments\": {\"packages\": [\"checkers_game\"]}}\n```\nThis
          command will install the `checkers_game` package using `uv add`. If you
          need any additional packages or upgrades, simply list them in the `packages`
