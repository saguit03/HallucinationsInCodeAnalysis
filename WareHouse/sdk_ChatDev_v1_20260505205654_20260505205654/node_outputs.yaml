          False\n\n    if not piece:\n        return False\n\n    if (piece.color
          == ''black'' and x1 < x2) or (piece.color == ''red'' and x1 > x2):\n        return
          False\n\n    # Check for jumps\n    if abs(dx) == 2 or abs(dy) == 2:\n        jump_piece
          = board[(x1 + x2) // 2][(y1 + y2) // 2]\n        if not jump_piece or jump_piece.color
          != piece.color:\n            return False\n\n    return True\n\n# Make a
