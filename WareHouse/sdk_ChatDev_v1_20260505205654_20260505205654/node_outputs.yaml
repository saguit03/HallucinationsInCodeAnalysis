          + y2) // 2]\n        board[(x1 + x2) // 2][(y1 + y2) // 2] = None\n    board[x2][y2]
          = piece\n    board[x1][y1] = None\n\n    # Check for kinging\n    if (piece.color
          == ''black'' and y2 == BOARD_SIZE - 1) or (piece.color == ''red'' and y2
          == 0):\n        piece.king_piece()\n\n# Main game loop\ndef main():\n    board
          = initialize_board()\n    current_player = ''black''\n\n    while True:\n        print_board(board)\n        from_pos
          = input(f''{current_player}\''s turn. Enter move (e.g., a1 b2): '').strip()\n        to_pos
          = input(''Enter destination: '').strip()\n\n        try:\n            x1,
          y1 = ord(from_pos[0]) - ord(''a''), int(from_pos[1]) - 1\n            x2,
          y2 = ord(to_pos[0]) - ord(''a''), int(to_pos[1]) - 1\n            if is_valid_move(board,
          (x1, y1), (x2, y2)):\n                make_move(board, (x1, y1), (x2, y2))\n                current_player
          = ''red'' if current_player == ''black'' else ''black''\n            else:\n                print(''Invalid
          move. Try again.'')\n        except Exception as e:\n            print(f''Error:
          {e}. Please enter a valid move.\n'')\n\nif __name__ == ''__main__'':\n    main()",
          "encoding": "utf-8", "mode": "overwrite"}}

          ```


          ### Step 3: Implement game logic

