          \ an outline of the steps and code snippets required:\n\n1. **Define the\
          \ `Piece` class**: Represents each piece on the board (either red or white).\n\
          2. **Define the `Board` class**: Manages the state of the board, including\
          \ pieces and their positions.\n3. **Define the `Game` class**: Handles the\
          \ game logic, including turn management, move validation, captures, and\
          \ kings.\n4. **Define utility functions for move parsing and printing**.\n\
          \nLet's start by implementing these classes step-by-step.\n\n### Step 1:\
          \ Define the `Piece` Class\n\n```python\nclass Piece:\n    def __init__(self,\
          \ color):\n        self.color = color\n        self.king = False\n\n   \
          \ def make_king(self):\n        self.king = True\n\n    def __str__(self):\n\
          \        if self.color == \"red\":\n            return 'R' if not self.king\
          \ else 'r'\n        else:\n            return 'B' if not self.king else\
          \ 'b'\n\n    @staticmethod\n    def from_char(char):\n        if char in\
          \ ['R', 'r']:\n            return Piece(\"red\")\n        elif char in ['B',\
          \ 'b']:\n            return Piece(\"white\")\n        return None\n```\n\
          \n### Step 2: Define the `Board` Class\n\n```python\nclass Board:\n    def\
          \ __init__(self):\n        self.board = [[None] * 8 for _ in range(8)]\n\
          \        self.initialize_board()\n\n    def initialize_board(self):\n  \
          \      for i in range(3):\n            for j in range((i % 2) + 1, 8, 2):\n\
          \                self.board[i][j] = Piece(\"red\")\n        for i in range(5,\
          \ 8):\n            for j in range((i % 2) + 1, 8, 2):\n                self.board[i][j]\
          \ = Piece(\"white\")\n\n    def print_board(self):\n        for row in self.board:\n\
          \            print(\" \".join(str(piece) if piece else '.' for piece in\
          \ row))\n\n    def move_piece(self, start, end):\n        piece = self.board[start[0]][start[1]]\n\
          \        self.board[start[0]][start[1]] = None\n        self.board[end[0]][end[1]]\
          \ = piece\n\n    def is_valid_move(self, start, end):\n        piece = self.board[start[0]][start[1]]\n\
          \        if not piece:\n            return False\n\n        x_dir = 1 if\
          \ piece.color == \"red\" else -1\n        if abs(end[0] - start[0]) != 1\
          \ or abs(end[1] - start[1]) not in [1, 2]:\n            return False\n\n\
          \        if end[1] < 0 or end[1] >= 8:\n            return False\n\n   \
          \     destination = self.board[end[0]][end[1]]\n        if destination is\
          \ not None:\n            return False\n\n        # Check for capture\n \
          \       if abs(end[1] - start[1]) == 2 and self.is_capture(start, end):\n\
          \            mid_x = (start[0] + end[0]) // 2\n            mid_y = (start[1]\
          \ + end[1]) // 2\n            captured_piece = self.board[mid_x][mid_y]\n\
          \            if not captured_piece or captured_piece.color == piece.color:\n\
          \                return False\n\n        # Check for valid non-capture move\n\
          \        if abs(end[1] - start[1]) == 1 and piece.king:\n            mid_x\
          \ = (start[0] + end[0]) // 2\n            mid_y = (start[1] + end[1]) //\
          \ 2\n            if self.board[mid_x][mid_y]:\n                return False\n\
          \n        return True\n\n    def is_capture(self, start, end):\n       \
          \ x_dir = 1 if piece.color == \"red\" else -1\n        mid_x = (start[0]\
          \ + end[0]) // 2\n        mid_y = (start[1] + end[1]) // 2\n        return\
          \ self.board[mid_x][mid_y] is not None and self.board[mid_x][mid_y].color\
          \ != piece.color\n```\n\n### Step 3: Define the `Game` Class\n\n```python\n\
          class Game:\n    def __init__(self):\n        self.board = Board()\n   \
          \     self.current_player = \"red\"\n\n    def print_board(self):\n    \
          \    self.board.print_board()\n\n    def switch_turn(self):\n        self.current_player\
          \ = \"white\" if self.current_player == \"red\" else \"red\"\n\n    def\
          \ make_move(self, start, end):\n        if not self.board.is_valid_move(start,\
          \ end):\n            raise ValueError(\"Invalid move\")\n\n        self.board.move_piece(start,\
          \ end)\n        piece = self.board.board[end[0]][end[1]]\n        if abs(end[0]\
          \ - start[0]) == 2:\n            mid_x = (start[0] + end[0]) // 2\n    \
          \        mid_y = (start[1] + end[1]) // 2\n            self.board.board[mid_x][mid_y]\
          \ = None\n\n        if end[0] in [0, 7]:\n            piece.make_king()\n\
          \n        self.switch_turn()\n```\n\n### Step 4: Utility Functions for Move\
          \ Parsing and Printing\n\n```python\ndef parse_move(move_str):\n    start\
          \ = (ord(move_str[0]) - ord('a'), int(move_str[1]) - 1)\n    end = (ord(move_str[2])\
          \ - ord('a'), int(move_str[3]) - 1)\n    return start, end\n\ndef main():\n\
          \    game = Game()\n    while True:\n        game.print_board()\n      \
          \  move_str = input(f\"{game.current_player}'s turn. Enter your move (e.g.,\
