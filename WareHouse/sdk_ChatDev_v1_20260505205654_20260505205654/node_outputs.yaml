          = color\n        self.king = False\n\n    def king_piece(self):\n        self.king
          = True\n\ndef print_board(board):\n    for row in board:\n        print(''
          ''.join([str(piece) if piece else ''.'' for piece in row]))\n\n# Initialize
          the board\ndef initialize_board():\n    board = [[None] * BOARD_SIZE for
          _ in range(BOARD_SIZE)]\n    for i in range(3):\n        for j in range((i
          % 2) + 1, BOARD_SIZE, 2):\n            board[i][j] = Piece(''black'')\n    for
          i in range(5, BOARD_SIZE - 2):\n        for j in range((i % 2) + 1, BOARD_SIZE,
          2):\n            board[i][j] = Piece(''red'')\n    return board\n\n# Check
