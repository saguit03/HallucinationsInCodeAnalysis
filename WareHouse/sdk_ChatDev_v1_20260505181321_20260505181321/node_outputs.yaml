          \ will include all necessary classes and methods to manage the game state,\
          \ handle player turns, and apply the rules of capture and kinging.\n\nHere's\
          \ the complete implementation:\n\n```python\nclass Piece:\n    def __init__(self,\
          \ color):\n        self.color = color  # 'W' for White, 'B' for Black\n\n\
          \    def is_king(self):\n        return False\n\nclass KingPiece(Piece):\n\
          \    def is_king(self):\n        return True\n\nclass Board:\n    def __init__(self):\n\
          \        self.board = [[None] * 8 for _ in range(8)]\n        self.init_board()\n\
          \n    def init_board(self):\n        for row in range(3):\n            for\
          \ col in range((row % 2), 8, 2):\n                self.board[row][col] =\
          \ Piece('B')\n        for row in range(5, 8):\n            for col in range((row\
          \ % 2), 8, 2):\n                self.board[row][col] = Piece('W')\n\n  \
          \  def print_board(self):\n        letters = \" ABCDEFGH\"\n        for\
          \ row in range(8):\n            print(f\"{8 - row} \", end=\"\")\n     \
          \       for col in range(8):\n                piece = self.board[row][col]\n\
          \                if piece:\n                    color = \"W\" if piece.color\
          \ == 'W' else \"B\"\n                    king_symbol = \"K\" if isinstance(piece,\
          \ KingPiece) else \"\"\n                    print(f\"[{color}{king_symbol}]\"\
          , end=\"\")\n                else:\n                    print(\"[  ]\",\
          \ end=\"\")\n            print()\n        print(\"   \" + \"\".join(letters))\n\
          \n    def get_piece(self, row, col):\n        return self.board[row][col]\n\
          \n    def move_piece(self, from_row, from_col, to_row, to_col):\n      \
