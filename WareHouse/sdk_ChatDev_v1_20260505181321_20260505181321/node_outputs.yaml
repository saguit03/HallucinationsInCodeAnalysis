          \           raise ValueError(\"No piece at the source position.\")\n   \
          \     \n        self.board[from_row][from_col] = None\n        self.board[to_row][to_col]\
          \ = piece\n\n        # Promote to king if it reaches the other end of the\
          \ board\n        if (piece.color == 'W' and to_row == 0) or (piece.color\
          \ == 'B' and to_row == 7):\n            self.board[to_row][to_col] = KingPiece(piece.color)\n\
