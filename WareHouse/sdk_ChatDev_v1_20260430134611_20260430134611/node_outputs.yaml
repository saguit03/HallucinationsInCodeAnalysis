          \ y2 = end\n        piece = self.board[x1][y1]\n\n        if not piece:\n\
          \            return False\n        if (x2 - x1) ** 2 != 4 or abs(y2 - y1)\
          \ != 2:\n            return False\n\n        if (x2 < x1 and piece.color\
          \ == 'red') or (x2 > x1 and piece.color == 'black'):\n            return\
          \ False\n\n        intermediate_x = (x1 + x2) // 2\n        intermediate_y\
          \ = (y1 + y2) // 2\n        if not self.board[intermediate_x][intermediate_y]:\n\
          \            return True\n\n        if (intermediate_x < x1 and piece.color\
